              - label: { id: current_temp, text: "-- °C", x: 50, y: 0, text_font: roboto_48_b, text_color: color_temp_max }

              - label: { id: icon_serre, text: "\U000F002D", x: 190, y: 0, text_font: mdi_font_45, text_color: color_text_dim }

              - label: { id: current_serre, text: "-- °C", x: 240, y: 0, text_font: roboto_48_b, text_color: color_temp_max }

        # --- PLANNING (Dynamique) ---

