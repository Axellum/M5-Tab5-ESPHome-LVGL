lvgl:

  pages:

    - id: page_main
      scrollbar_mode: "OFF"

      on_gesture:

        then:

          - lambda: |-

              lv_indev_t * indev = lv_indev_get_act();

              if (indev) {

                  lv_point_t pt;

                  lv_indev_get_point(indev, &pt);

                  lv_dir_t d = lv_indev_get_gesture_dir(indev);

                  if (d == LV_DIR_TOP) {
                      lv_obj_clear_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);
                      lv_obj_move_foreground(id(layer_console_sys));
                  } else if (d == LV_DIR_BOTTOM) {
                      lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);
                  } else if (pt.y > 400) {

                      // Raccourcis pour verifier l'etat

                      bool l1 = !lv_obj_has_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN);

                      bool l2 = !lv_obj_has_flag(id(layer_forecast_2), LV_OBJ_FLAG_HIDDEN);

                      bool l3 = !lv_obj_has_flag(id(layer_forecast_3), LV_OBJ_FLAG_HIDDEN);

                      bool h1 = !lv_obj_has_flag(id(layer_forecast_hourly_1), LV_OBJ_FLAG_HIDDEN);

                      bool h2 = !lv_obj_has_flag(id(layer_forecast_hourly_2), LV_OBJ_FLAG_HIDDEN);

                      bool h3 = !lv_obj_has_flag(id(layer_forecast_hourly_3), LV_OBJ_FLAG_HIDDEN);

                      // Si on est dans un etat incoherent (rien d'affiche), on reset.

                      if(!l1 && !l2 && !l3 && !h1 && !h2 && !h3) l1 = true;

                      auto hide_all = [&]() {

                         lv_obj_add_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_2), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_3), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_hourly_1), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_hourly_2), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_hourly_3), LV_OBJ_FLAG_HIDDEN);

                      };

                      if (d == LV_DIR_LEFT) {

                          hide_all();

                          if(h3) lv_obj_clear_flag(id(layer_forecast_hourly_2), LV_OBJ_FLAG_HIDDEN);

                          else if(h2) lv_obj_clear_flag(id(layer_forecast_hourly_1), LV_OBJ_FLAG_HIDDEN);

                          else if(h1) lv_obj_clear_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN);

                          else if(l1) lv_obj_clear_flag(id(layer_forecast_2), LV_OBJ_FLAG_HIDDEN);

                          else if(l2) lv_obj_clear_flag(id(layer_forecast_3), LV_OBJ_FLAG_HIDDEN);

                          else if(l3) lv_obj_clear_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN); // Retour accueil

                      } else if (d == LV_DIR_RIGHT) {

                          hide_all();

                          if(l3) lv_obj_clear_flag(id(layer_forecast_2), LV_OBJ_FLAG_HIDDEN);

                          else if(l2) lv_obj_clear_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN);

                          else if(l1) lv_obj_clear_flag(id(layer_forecast_hourly_1), LV_OBJ_FLAG_HIDDEN);

                          else if(h1) lv_obj_clear_flag(id(layer_forecast_hourly_2), LV_OBJ_FLAG_HIDDEN);

                          else if(h2) lv_obj_clear_flag(id(layer_forecast_hourly_3), LV_OBJ_FLAG_HIDDEN);

                          else if(h3) lv_obj_clear_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN); // Retour accueil

                      }

                  }

              }

      widgets:

        # ==================== TOP ROW (Floating) ====================

        - obj:
            x: 35
            y: 10
            width: 270
            height: 270
            styles: style_transparent
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: icon_actuel_layer1, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_main, text_color: color_text }
              - label: { id: icon_actuel_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_main, text_color: color_text }

        - label: { id: icon_mic_status, text: "\U000F036C", x: 10, y: 5, align: TOP_LEFT, text_font: mdi_font_60, text_color: color_text_dim }

        - button:

            id: btn_assist_trigger

            x: 0

            y: 0

            width: 250

            height: 250

            styles: style_invisible

            on_short_click:

              - voice_assistant.start:

                  id: va

        # --- °Current Temp / Hum ---

        - obj:

            x: 20

