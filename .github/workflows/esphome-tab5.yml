name: ESPHome Tab5 Compilation

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Générer user_entities.yaml et secrets.yaml factices pour la CI
        run: |
          cp Tab5/user_entities.example.yaml Tab5/user_entities.yaml
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "ci_dummy_ssid"
          wifi_password: "ci_dummy_password"
          wifi_ap_password: "ci_dummy_ap_password"
          api_encryption_key: "26IVe/bZ/aI+T8G96D7aYZlM2EH8QUG8JtsZ50HxaCE="
          ota_password: "ci_dummy_ota_password"
          EOF
      - name: Build ESPHome Firmware
        uses: esphome/build-action@v8.0.0
        with:
          yaml-file: tab5-ha-hmi.yaml
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tab5-firmware
          path: .esphome/build/tab5-ha-hmi/.pioenvs/tab5-ha-hmi/firmware.bin
