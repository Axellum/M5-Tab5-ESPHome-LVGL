# ============================================================================
# [AI-CONTEXT]
# @file tab5-sensors.yaml
# @role Déclaration des entités ESPHome (HA sensors, system sensors).
# @architecture_constraint Ce fichier ne DOIT contenir AUCUNE logique de présentation.
#                         Les blocs on_value: doivent se contenter d'appeler des fonctions 
#                         C++ depuis tab5_custom.cpp (ex: update_light_card_ui(...) ).
# @anti_pattern_evité Ne pas utiliser std::string ou to_string() ici (hot-path).
# @ai_instruction Si l'utilisateur demande d'ajouter un nouveau capteur de température, 
#                 génère l'entité platform: homeassistant, et dans on_value, appelle 
#                 simplement update_temp_ui(id(mon_label), x); Ne génère pas de lv_label_set_text ici.
# ============================================================================
wifi:

  ssid: !secret wifi_ssid

  password: !secret wifi_password

  power_save_mode: NONE

  # Point d'accès de secours

  ap:

    ssid: "Tab5 Fallback AP"

    password: !secret wifi_ap_password

switch:

  - platform: gpio

    id: wifi_power

    name: "WiFi Power"

    pin:

      pi4ioe5v6408: pi4ioe2

      number: 0

    restore_mode: ALWAYS_ON

  - platform: gpio

    id: usb_5v_power

    name: "USB Power"

    pin:

      pi4ioe5v6408: pi4ioe2

      number: 3

    restore_mode: ALWAYS_ON

  - platform: gpio

    id: wifi_antenna_int_ext

    pin:

      pi4ioe5v6408: pi4ioe1

      number: 0

  - platform: gpio

    id: speaker_enable

    name: "Speaker Enable"

    pin:

      pi4ioe5v6408: pi4ioe1

      number: 1

    restore_mode: DISABLED

  - platform: gpio

    id: external_5v_power

    name: "External 5V Power"

    pin:

      pi4ioe5v6408: pi4ioe1

      number: 2

    restore_mode: ALWAYS_ON
  - platform: template
    name: "Tab5 Wake Word Active"
    id: tab5_wake_word_active
    icon: mdi:microphone-outline
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - micro_wake_word.start:
      - lambda: |-
          if (id(lbl_ok_nabu) != nullptr) {
            lv_label_set_text(id(lbl_ok_nabu), "Ok Nabu: ON");
            lv_obj_set_style_text_color(id(lbl_ok_nabu), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);
          }
    on_turn_off:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - micro_wake_word.stop:
      - lambda: |-
          if (id(lbl_ok_nabu) != nullptr) {
            lv_label_set_text(id(lbl_ok_nabu), "Ok Nabu: OFF");
            lv_obj_set_style_text_color(id(lbl_ok_nabu), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
          }

binary_sensor:

  - platform: gpio

    id: headphone_detect

    name: "Headphone Detect"

    pin:

      pi4ioe5v6408: pi4ioe1

      number: 7

  - platform: status

    name: "HA API Status"

    id: status_ha

    on_state:

      - lambda: |-

          if (id(icon_ha) == nullptr) return;

          if(x) {

            lv_obj_set_style_text_color(id(icon_ha), lv_color_hex(UIColor::INFO), LV_PART_MAIN);

          } else {

            lv_obj_set_style_text_color(id(icon_ha), lv_color_hex(UIColor::INACTIVE), LV_PART_MAIN);

          }

text_sensor:

  - platform: homeassistant

    id: pc_status

    entity_id: ${entity_tracker_pc}

    on_value:

      - lambda: |-

          if (id(icon_pc) == nullptr || id(icon_card_pc) == nullptr) return;

          if(x == "home") {

            lv_obj_set_style_text_color(id(icon_pc), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);

            lv_obj_set_style_text_color(id(icon_card_pc), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);

            if (id(icon_sw0) != nullptr && id(lbl_sw0_state) != nullptr) {
              lv_obj_set_style_text_color(id(icon_sw0), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);
              lv_label_set_text(id(lbl_sw0_state), "Allumé");
              lv_obj_set_style_text_color(id(lbl_sw0_state), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);
            }

          } else {

            lv_obj_set_style_text_color(id(icon_pc), lv_color_hex(0xFFFFFF), LV_PART_MAIN);

            lv_obj_set_style_text_color(id(icon_card_pc), lv_color_hex(0xFFFFFF), LV_PART_MAIN);

            if (id(icon_sw0) != nullptr && id(lbl_sw0_state) != nullptr) {
              lv_obj_set_style_text_color(id(icon_sw0), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
              lv_label_set_text(id(lbl_sw0_state), "Éteint");
              lv_obj_set_style_text_color(id(lbl_sw0_state), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
            }

          }

  - platform: homeassistant
    id: light_chambre_state
    entity_id: ${entity_light_chambre}
    on_value:
      # Bloc factorise dans update_light_card_ui() (#T164, ex-triplique chambre/salon/led)
      - lambda: |-
          update_light_card_ui(id(icon_card_lit_j2), id(icon_card_light_j2), id(icon_sw2), id(lbl_sw2_state),
              id(btn_light_power_icon), id(current_light_entity), "${entity_light_chambre}", x == "on");

  - platform: homeassistant
    id: light_salon_state
    entity_id: ${entity_light_salon}
    on_value:
      - lambda: |-
          update_light_card_ui(id(icon_card_salon_j3), id(icon_card_light_j3), id(icon_sw3), id(lbl_sw3_state),
              id(btn_light_power_icon), id(current_light_entity), "${entity_light_salon}", x == "on");

  - platform: homeassistant
    id: light_led_state
    entity_id: ${entity_light_bureau}
    on_value:
      - lambda: |-
          update_light_card_ui(id(icon_card_led_j4), id(icon_card_light_j4), id(icon_sw4), id(lbl_sw4_state),
              id(btn_light_power_icon), id(current_light_entity), "${entity_light_bureau}", x == "on");

  - platform: wifi_info

    ip_address:

      id: sys_wifi_ip

      name: "Tab5 IP"

    ssid:

      id: sys_wifi_ssid

      name: "Tab5 SSID"

sensor:

  - platform: homeassistant

    id: phone_battery

    entity_id: ${entity_phone_battery}

    on_value:

      - lambda: |-

          if (id(icon_phone) == nullptr) return;

          if(isnan(x)) {

            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::INACTIVE), LV_PART_MAIN);

          } else if(x > 80.0) {

            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);

          } else if(x > 40.0) {

            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::INFO), LV_PART_MAIN);

          } else if(x >= 20.0) {

            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::WARNING), LV_PART_MAIN);

          } else {

            lv_obj_set_style_text_color(id(icon_phone), lv_color_hex(UIColor::ERROR), LV_PART_MAIN);

          }

  - platform: homeassistant

    id: temp_serre
    entity_id: ${entity_temp_plante}

    on_value:
      - lambda: |-
          update_temp_ui(id(current_serre), x); // AXE1/Phase 3 : helper centralise

  - platform: homeassistant

    id: temp_salon

    entity_id: ${entity_temp_salon}

    on_value:

      - lambda: |-

          update_temp_ui(id(val_temp_salon), x); // Gradient continu colorimetrique (helper centralise)

  - platform: homeassistant

    id: temp_chambre

    entity_id: ${entity_temp_chambre}

    # Capteur conserve pour la console systeme mais plus affiche dans la climate card

  - platform: homeassistant

    id: hum_salon

    entity_id: ${entity_hum_salon}

    on_value:

      - lambda: |-

          if (id(icon_salon) == nullptr) return;

          if(!isnan(x)) {
            uint32_t c = get_humidity_color(x);
            lv_obj_set_style_text_color(id(icon_salon), lv_color_hex(c), LV_PART_MAIN);
            // Afficher la valeur dans la climate card (Desactive car supprime au profit de la serre)
            // char buf[16];
            // sprintf(buf, "%.0f%%", x);
            // lv_label_set_text(id(val_hum_salon_card), buf);
            // lv_obj_set_style_text_color(id(val_hum_salon_card), lv_color_hex(c), LV_PART_MAIN);
          }

  - platform: homeassistant

    id: hum_chambre

    entity_id: ${entity_hum_chambre}

    # Capteur conserve pour HA mais icon_chambre supprime de la climate card

  - platform: homeassistant
    id: moisture_1
    entity_id: ${entity_plante_1}
    on_value: &moisture_on_value
      # Tri dynamique des 4 slots plantes a chaque mise a jour (bloc partage via ancre YAML, cf. #T164)
      - lambda: |-
          float vals[5] = {id(moisture_1).state, id(moisture_2).state, id(moisture_3).state, id(moisture_4).state, id(moisture_5).state};
          const char* icons[5] = {"\U000F0E66", "\U000F09F1", "\U000F0D08", "\U000F024A", "\U000F02E5"};
          MoistureSlotUI slots[4] = {
              {id(icon_pot_s0), id(val_pot_s0)},
              {id(icon_pot_s1), id(val_pot_s1)},
              {id(icon_pot_s2), id(val_pot_s2)},
              {id(icon_pot_s3), id(val_pot_s3)}
          };
          sort_and_update_moisture_slots(vals, icons, slots);

  - platform: homeassistant
    id: moisture_2
    entity_id: ${entity_plante_2}
    on_value: *moisture_on_value

  - platform: homeassistant
    id: moisture_3
    entity_id: ${entity_plante_3}
    on_value: *moisture_on_value

  - platform: homeassistant
    id: moisture_4
    entity_id: ${entity_plante_4}
    on_value: *moisture_on_value

  - platform: homeassistant
    id: moisture_5
    entity_id: ${entity_plante_5}
    on_value: *moisture_on_value


  - platform: uptime

    id: sys_uptime

    name: "Tab5 Uptime"

    update_interval: 60s

    on_value:

      - lambda: |-

          if (id(lbl_sys_uptime_val) != nullptr) {

            int days = x / 86400;

            int hours = ((int)x % 86400) / 3600;

            int mins = ((int)x % 3600) / 60;

            char buf[32];

            if(days > 0) sprintf(buf, "%dj %02dh%02d", days, hours, mins);

            else sprintf(buf, "%02dh%02d", hours, mins);

            lv_label_set_text(id(lbl_sys_uptime_val), buf);

          }

  - platform: wifi_signal

    id: sys_wifi_rssi

    name: "Tab5 WiFi Signal"

    update_interval: 60s

    on_value:

      - lambda: |-

          if (id(lbl_sys_rssi_val) != nullptr) {

            char buf[16];

            sprintf(buf, "%.0f dBm", x);

            lv_label_set_text(id(lbl_sys_rssi_val), buf);

          }

  - platform: internal_temperature

    id: sys_core_temp

    name: "Tab5 Core Temp"

    update_interval: 60s

    on_value:

      - lambda: |-

          if (id(lbl_sys_temp_val) != nullptr) {

            char buf[16];

            sprintf(buf, "%.1f \xC2\xB0", x);

            lv_label_set_text(id(lbl_sys_temp_val), buf);

          }

  - platform: debug

    free:

      id: sys_free_heap

      name: "Tab5 Free Ram"

    loop_time:

      id: sys_loop_time

      name: "Tab5 Loop Time"

select:
  - platform: template

    id: wifi_antenna_select

    name: "WiFi Antenna"

    options:

      - "Internal"

      - "External"

    optimistic: true

    on_value:

      - if:

          condition:

            lambda: return i == 0;

          then:

            - switch.turn_off: wifi_antenna_int_ext

          else:

            - switch.turn_on: wifi_antenna_int_ext

time:

  - platform: sntp

    id: sntp_time

    timezone: Europe/Paris

    on_time:

      - seconds: 0

        minutes: "*"

        then:

          - lambda: |-

              auto t_now = id(sntp_time).now();

              if (t_now.is_valid()) {

                char buf_time[16];

                sprintf(buf_time, "%02d:%02d", t_now.hour, t_now.minute);

                lv_label_set_text(id(lbl_time), buf_time);

                

                const char* days[] = {"Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"};
                const char* months[] = {"Janv", "Févr", "Mars", "Avr", "Mai", "Juin", "Juil", "Août", "Sept", "Oct", "Nov", "Déc"};
                char buf_date[64];

                sprintf(buf_date, "%s %02d %s", days[t_now.day_of_week - 1], t_now.day_of_month, months[t_now.month - 1]);

                lv_label_set_text(id(lbl_date), buf_date);

              }

interval:

  - interval: 5s

    then:

      - if:

          condition:

            wifi.connected:

          then:

            - lambda: 'lv_obj_set_style_text_color(id(icon_wifi), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);'

          else:

            - lambda: 'lv_obj_set_style_text_color(id(icon_wifi), lv_color_hex(UIColor::INACTIVE), LV_PART_MAIN);'

  - interval: 2s

    then:

      - lambda: |-

          // Garde "console visible ?" conservee ici (evite de passer layer_console_sys
          // au helper). Tout le detail (SRAM/PSRAM/frag/loop/IP/SSID) est factorise
          // dans update_console_diagnostics_ui() (tab5_custom.cpp, Phase 3, #T164).
          if (id(layer_console_sys) != nullptr && !lv_obj_has_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN)) {
             update_console_diagnostics_ui(id(lbl_sys_sram_val), id(bar_sys_sram),
                 id(lbl_sys_psram_val), id(bar_sys_psram), id(lbl_sys_frag_val), id(lbl_sys_flash_val),
                 id(sys_loop_time).has_state(), id(sys_loop_time).state, id(lbl_sys_loop_val),
                 id(sys_wifi_ip).has_state(), id(sys_wifi_ip).state.c_str(), id(lbl_sys_ip_val),
                 id(sys_wifi_ssid).has_state(), id(sys_wifi_ssid).state.c_str(), id(lbl_sys_ssid_val));
          }

