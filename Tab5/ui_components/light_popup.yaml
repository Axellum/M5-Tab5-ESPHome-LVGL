# ═══════════════════════════════════════════════════════
# [AI-CONTEXT]
# @file light_popup.yaml
# @role Popup fullscreen contrôle lumière (960×520). Gauche=Luminosité (arc), Droite=Presets
#       couleur (8 boutons) + On/Off. Ouvert par un `on_long_press` sur une des cartes lumière
#       (forecast_daily.yaml j2/j3/j4) qui définit le global `current_light_entity`.
# @architecture_constraint Toutes les actions (`arc_light_brightness`, presets couleur, on/off)
#                          ciblent `id(current_light_entity)` — PAS une entité en dur — car ce
#                          popup est partagé par les 3 lumières (chambre/salon/bureau).
# @ai_instruction Les 8 presets couleur sont factorisés via `light_color_preset_btn.yaml`
#                 (#T164) : pour ajouter une couleur, ajouter un `!include` de plus, ne pas
#                 dupliquer le bloc bouton. Le bouton On/Off garde une action différente
#                 (`light.toggle`) donc reste en clair, non factorisé.
# ═══════════════════════════════════════════════════════
obj:
  id: light_options_popup
  align: CENTER
  width: 100%
  height: 100%
  hidden: true
  styles: style_invisible
  widgets:
    # Overlay fond sombre (cliquable pour fermer)
    - button:
        align: CENTER
        width: 100%
        height: 100%
        styles: style_modal_overlay
        on_short_click:
          - lambda: 'lv_obj_add_flag(id(light_options_popup), LV_OBJ_FLAG_HIDDEN);'

    # Carte modale principale
    - obj:
        align: CENTER
        width: 1130
        height: 650
        styles: style_modal_card
        scrollbar_mode: "OFF"
        widgets:

          # ═══ EN-TÊTE ═══
          - label:
              id: popup_light_title
              text: "Ampoule"
              align: TOP_LEFT
              x: 30
              y: 20
              text_font: roboto_32_b
              text_color: color_text

          # Bouton fermer (X)
          - button:
              align: TOP_RIGHT
              x: -15
              y: 12
              width: 80
              height: 80
              styles: style_transparent
              on_short_click:
                - lambda: 'lv_obj_add_flag(id(light_options_popup), LV_OBJ_FLAG_HIDDEN);'
              widgets:
                - label: { text: "\U000F0156", align: CENTER, text_font: mdi_font_45, text_color: color_console_label }

          # ═══ COLONNE GAUCHE : Luminosité (340px) ═══
          - obj:
              align: LEFT_MID
              x: 20
              y: 15
              width: 340
              height: 440
              styles: style_transparent
              widgets:
                - label:
                    text: "Luminosité"
                    align: TOP_MID
                    y: 0
                    text_font: roboto_22
                    text_color: color_text_dim
                
                # Arc jauge pour la luminosité
                - arc:
                    id: arc_light_brightness
                    align: CENTER
                    y: -10
                    width: 260
                    height: 260
                    min_value: 0
                    max_value: 255
                    value: 128
                    arc_color: color_arc_track
                    arc_width: 16
                    adjustable: true
                    indicator:
                      arc_color: color_info
                      arc_width: 16
                    knob:
                      bg_opa: 100%
                      bg_color: color_text
                      pad_all: 5
                    on_value:
                      - homeassistant.service:
                          service: light.turn_on
                          data:
                            entity_id: !lambda 'return id(current_light_entity);'
                            brightness: !lambda 'return to_string((int)x);'

          # ═══ COLONNE DROITE : Couleurs Prédéfinies (560px) ═══
          - obj:
              align: RIGHT_MID
              x: -20
              y: 15
              width: 560
              height: 440
              styles: style_transparent
              layout:
                type: FLEX
                flex_flow: ROW_WRAP
                flex_align_main: SPACE_EVENLY
                flex_align_cross: CENTER
                flex_align_track: SPACE_EVENLY
                pad_row: 12
                pad_column: 10
              widgets:
                # Ligne 1 : Blancs (2 premiers boutons factorises, #T164) + On/Off (action differente, laisse tel quel)
                - !include { file: light_color_preset_btn.yaml, vars: { color_name: "white", icon_color: "0xFFFFFF", label_text: "Blanc" } }
                - !include { file: light_color_preset_btn.yaml, vars: { color_name: "warmwhite", icon_color: "0xFFC864", label_text: "Chaud" } }
                - button:
                    width: 170
                    height: 60
                    radius: 12
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: !lambda 'return id(current_light_entity);'
                    widgets:
                      - label: { id: btn_light_power_icon, text: "\U000F0425", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "On / Off", align: LEFT_MID, x: 60, text_font: roboto_22, text_color: color_text_dim }

                # Ligne 2 : Couleurs 1 (factorises, #T164)
                - !include { file: light_color_preset_btn.yaml, vars: { color_name: "red", icon_color: "0xFF0000", label_text: "Rouge" } }
                - !include { file: light_color_preset_btn.yaml, vars: { color_name: "green", icon_color: "0x00FF00", label_text: "Vert" } }
                - !include { file: light_color_preset_btn.yaml, vars: { color_name: "blue", icon_color: "0x0000FF", label_text: "Bleu" } }

                # Ligne 3 : Couleurs 2 (factorises, #T164)
                - !include { file: light_color_preset_btn.yaml, vars: { color_name: "magenta", icon_color: "0xFF00FF", label_text: "Rose" } }
                - !include { file: light_color_preset_btn.yaml, vars: { color_name: "orange", icon_color: "0xFFA500", label_text: "Orange" } }
                - !include { file: light_color_preset_btn.yaml, vars: { color_name: "cyan", icon_color: "0x00FFFF", label_text: "Cyan" } }
