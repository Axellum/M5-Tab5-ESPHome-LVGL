                    widgets:
                      - label: { text: "\U000F0335", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: 0xFF0000 }
                      - label: { text: "Rouge", align: LEFT_MID, x: 60, text_font: roboto_22, text_color: color_text_dim }
