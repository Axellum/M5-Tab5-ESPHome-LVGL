# ============================================================================
# [AI-CONTEXT]
# @file forecast_hourly.yaml
# @role Conteneur des 5 cartes prévisions horaires. Visible quand `forecast_page_index`
#       (tab5-globals.yaml) est < 2, piloté par `handle_swipe_gesture()` (tab5_custom.cpp),
#       alterne avec forecast_daily.yaml (sibling, page_index >= 2).
# ============================================================================
obj:
  id: layer_forecast_hourly
  x: 0
  y: 430
  width: 1280
  height: 290
  styles: style_transparent
  scrollbar_mode: "OFF"
  hidden: true

  widgets:
    # 5 cartes identiques factorisees via forecast_hour_card.yaml (#T164) : seul x_pos
    # (position horizontale) et idx (suffixe id hN_*) varient. Note : ordre visuel
    # gauche->droite = index donnees decroissant (carte 0 = index 4, carte 4 = index 0).
    - !include { file: forecast_hour_card.yaml, vars: { x_pos: "25", idx: "4" } }
    - !include { file: forecast_hour_card.yaml, vars: { x_pos: "275", idx: "3" } }
    - !include { file: forecast_hour_card.yaml, vars: { x_pos: "525", idx: "2" } }
    - !include { file: forecast_hour_card.yaml, vars: { x_pos: "775", idx: "1" } }
    - !include { file: forecast_hour_card.yaml, vars: { x_pos: "1025", idx: "0" } }
