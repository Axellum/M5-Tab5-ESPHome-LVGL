obj:
  id: clim_options_popup
  align: CENTER
  width: 100%
  height: 100%
  hidden: true
  styles: style_invisible
  widgets:
    # Background cliquable pour fermer
    - button:
        align: CENTER
        width: 100%
        height: 100%
        styles: style_modal_overlay
        on_short_click:
          - lambda: 'lv_obj_add_flag(id(clim_options_popup), LV_OBJ_FLAG_HIDDEN);'
    
    # Conteneur principal (La "Carte" HA)
    - obj:
        align: CENTER
        width: 960
        height: 540
        styles: style_modal_card
        scrollbar_mode: "OFF"
        widgets:
          # --- EN-TÊTE ---
          - label:
              text: "Salon > Climatisation"
              align: TOP_LEFT
              x: 20
              y: 20
              text_font: roboto_22
              text_color: color_text_dim
              
          # Bouton fermer (X)
          - button:
              align: TOP_RIGHT
              x: -15
              y: 15
              width: 50
              height: 50
              styles: style_invisible
              on_short_click:
                - lambda: 'lv_obj_add_flag(id(clim_options_popup), LV_OBJ_FLAG_HIDDEN);'
              widgets:
                - label: { text: "\U000F0156", align: CENTER, text_font: mdi_font_45, text_color: 0xAAAAAA }

          # --- TEMPÉRATURE ACTUELLE ---
          - label:
              text: "Temp. Actuelle"
              align: TOP_RIGHT
              x: -20
              y: 20
              text_font: roboto_22
              text_color: color_text_dim
          - label:
              id: val_temp_int_popup
              text: "-- °C"
              align: TOP_RIGHT
              x: -20
              y: 50
              text_font: roboto_32_b
              text_color: color_text

          # --- JAUGE (ARC) CENTRALE ---
          - arc:
              id: arc_temp_popup
              align: TOP_MID
              y: 70
              width: 240
              height: 240
              min_value: 16
              max_value: 30
              value: 22
              styles: style_invisible
          - label:
              id: clim_target_popup
              text: "--"
              align: TOP_MID
              y: 150
              text_font: roboto_55_b
              text_color: color_text
              
          # Boutons - et + supprimés de la popup selon la demande

          # --- GRILLE DE BOUTONS (CHIPS) EN BAS ---
          - obj:
              align: BOTTOM_MID
              y: -10
              width: 900
              height: 250
              styles: style_invisible
              scrollbar_mode: "OFF"
              layout:
                type: FLEX
                flex_flow: ROW_WRAP
                flex_align_main: SPACE_EVENLY
                flex_align_cross: CENTER
                flex_align_track: SPACE_BETWEEN
                pad_row: 15
                pad_column: 20
              widgets:
                # Ligne 1
                - button:
                    id: popup_btn_clim_cool
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_hvac_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            hvac_mode: "cool"
                    widgets:
                      - label: { id: popup_icon_clim_cool, text: "\U000F0717", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Froid", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }
                - button:
                    id: popup_btn_clim_heat
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_hvac_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            hvac_mode: "heat"
                    widgets:
                      - label: { id: popup_icon_clim_heat, text: "\U000F0238", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Chaud", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }
                - button:
                    id: popup_btn_clim_off
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.turn_off
                          data:
                            entity_id: ${entity_climate_salon}
                    widgets:
                      - label: { id: popup_icon_clim_off, text: "\U000F0425", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Eteint", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }

                # Ligne 2
                - button:
                    id: popup_btn_clim_fan
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_hvac_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            hvac_mode: "fan_only"
                    widgets:
                      - label: { id: popup_icon_clim_fan, text: "\U000F0210", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Ventilation", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }
                - button:
                    id: popup_btn_clim_dry
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_hvac_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            hvac_mode: "dry"
                    widgets:
                      - label: { id: popup_icon_clim_dry, text: "\U000F058E", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Sec", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }
                - button:
                    id: popup_btn_clim_swing
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_swing_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            swing_mode: !lambda 'return id(clim_swing_mode) == "off" ? std::string("vertical") : std::string("off");'
                    widgets:
                      - label: { id: popup_icon_clim_swing, text: "\U000F0E79", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Oscillation", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }

                # Ligne 3
                - button:
                    id: popup_btn_clim_eco
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_preset_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            preset_mode: !lambda 'return id(clim_preset_mode) == "eco" ? std::string("none") : std::string("eco");'
                    widgets:
                      - label: { id: popup_icon_clim_eco, text: "\U000F032A", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Mode Eco", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }
                - button:
                    id: popup_btn_clim_boost
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_preset_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            preset_mode: !lambda 'return id(clim_preset_mode) == "boost" ? std::string("none") : std::string("boost");'
                    widgets:
                      - label: { id: popup_icon_clim_boost, text: "\U000F14DE", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Boost", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }
                - button:
                    id: popup_btn_clim_quiet
                    width: 280
                    height: 70
                    radius: 10
                    styles: style_clim_btn
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_fan_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            fan_mode: !lambda 'return (id(clim_fan_mode) == "low" || id(clim_fan_mode) == "quiet" || id(clim_fan_mode) == "Silence") ? std::string("auto") : std::string("low");'
                    widgets:
                      - label: { id: popup_icon_clim_quiet, text: "\U000F146D", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Silence", align: LEFT_MID, x: 70, text_font: roboto_22, text_color: color_text_dim }
