# ═══════════════════════════════════════════════════════
# [AI-CONTEXT]
# @file climate_popup.yaml
# @role Popup fullscreen clim (960×520). Gauche=Jauge/Contrôles, Droite=Grille 3×3
#       (mode HVAC + off + swing / preset eco+boost + quiet).
# @architecture_constraint NON factorisable au-delà de ce qui l'est déjà (décision explicite,
#                          #T164, cf. contexte_ia/04_Projets/etat_tab5.md) : chaque bouton de la
#                          grille appelle un service Home Assistant DIFFÉRENT
#                          (climate.set_hvac_mode / set_preset_mode / set_swing_mode / set_fan_mode
#                          / turn_off) avec une logique lambda propre — pas de partie purement
#                          cosmétique séparable de l'action. Seuls 6/9 boutons ont un template
#                          commun (climate_hvac_mode_btn.yaml/climate_preset_toggle_btn.yaml) car
#                          leur service+payload sont réellement identiques (seul le paramètre change).
# @ai_instruction Les couleurs des icônes (popup_icon_clim_*) sont pilotées par le service
#                 `tab5_maj_clim` (tab5-api-logic.yaml) via les globals clim_preset_mode/
#                 clim_fan_mode/clim_swing_mode — ne pas essayer de les dériver localement ici.
#                 `pressed: bg_opa: 30%` est répété sur chaque bouton (pas dans style_definitions)
#                 car ESPHome rejette `pressed:` dans un style partagé — contrainte du framework,
#                 pas un oubli.
# ═══════════════════════════════════════════════════════
obj:
  id: clim_options_popup
  align: CENTER
  width: 100%
  height: 100%
  hidden: true
  styles: style_invisible
  widgets:
    # Overlay fond sombre (cliquable pour fermer)
    - button:
        align: CENTER
        width: 100%
        height: 100%
        styles: style_modal_overlay
        on_short_click:
          - lambda: 'lv_obj_add_flag(id(clim_options_popup), LV_OBJ_FLAG_HIDDEN);'

    # Carte modale principale
    - obj:
        align: CENTER
        width: 1130
        height: 650
        styles: style_modal_card
        scrollbar_mode: "OFF"
        widgets:

          # ═══ EN-TÊTE ═══
          - label:
              text: "Climatisation Salon"
              align: TOP_LEFT
              x: 30
              y: 20
              text_font: roboto_32_b
              text_color: color_text

          # Bouton fermer (X)
          - button:
              align: TOP_RIGHT
              x: -15
              y: 12
              width: 80
              height: 80
              styles: style_transparent
              on_short_click:
                - lambda: 'lv_obj_add_flag(id(clim_options_popup), LV_OBJ_FLAG_HIDDEN);'
              widgets:
                - label: { text: "\U000F0156", align: CENTER, text_font: mdi_font_45, text_color: color_console_label }

          # ═══ COLONNE GAUCHE : Jauge + Contrôles (340px) ═══
          - obj:
              align: LEFT_MID
              x: 20
              y: 15
              width: 340
              height: 440
              styles: style_transparent
              widgets:
                # Température actuelle
                - label:
                    text: "Actuelle"
                    align: TOP_MID
                    y: 0
                    text_font: roboto_22
                    text_color: color_text_dim
                - label:
                    id: val_temp_int_popup
                    text: "-- °"
                    align: TOP_MID
                    y: 28
                    text_font: roboto_32_b
                    text_color: color_text

                # Arc jauge (indicateur visuel de la cible)
                - arc:
                    id: arc_temp_popup
                    align: CENTER
                    y: -10
                    width: 220
                    height: 220
                    min_value: 16
                    max_value: 30
                    value: 22
                    arc_color: color_arc_track
                    arc_width: 16
                    indicator:
                      arc_color: color_info
                      arc_width: 16
                    knob:
                      bg_opa: 100%
                      bg_color: color_text
                      pad_all: 5
                    adjustable: true
                    on_value:
                      - homeassistant.service:
                          service: climate.set_temperature
                          data:
                            entity_id: ${entity_climate_salon}
                            hvac_mode: !lambda 'return (id(clim_hvac_mode) == "off" || id(clim_hvac_mode).empty()) ? std::string("cool") : id(clim_hvac_mode);'
                            temperature: !lambda 'return to_string((int)x);'

                # Température cible (superposée au centre de l'arc)
                - label:
                    id: clim_target_popup
                    text: "--"
                    align: CENTER
                    y: -20
                    text_font: roboto_55_b
                    text_color: color_text
                - label:
                    text: "°"
                    align: CENTER
                    y: 20
                    text_font: roboto_22
                    text_color: color_text_dim

                # Boutons +/- sous l'arc
                - button:
                    align: BOTTOM_MID
                    x: -80
                    y: -10
                    width: 110
                    height: 60
                    radius: 12
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_temperature
                          data:
                            entity_id: ${entity_climate_salon}
                            hvac_mode: !lambda 'return (id(clim_hvac_mode) == "off" || id(clim_hvac_mode).empty()) ? std::string("cool") : id(clim_hvac_mode);'
                            temperature: !lambda "return to_string(id(clim_target_temp) - 0.5);"
                    widgets:
                      - label: { text: "\U000F0374", align: CENTER, text_font: mdi_font_56, text_color: color_text }
                - button:
                    align: BOTTOM_MID
                    x: 80
                    y: -10
                    width: 110
                    height: 60
                    radius: 12
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_temperature
                          data:
                            entity_id: ${entity_climate_salon}
                            hvac_mode: !lambda 'return (id(clim_hvac_mode) == "off" || id(clim_hvac_mode).empty()) ? std::string("cool") : id(clim_hvac_mode);'
                            temperature: !lambda "return to_string(id(clim_target_temp) + 0.5);"
                    widgets:
                      - label: { text: "\U000F0415", align: CENTER, text_font: mdi_font_56, text_color: color_text }

          # ═══ COLONNE DROITE : Grille d'options 3×3 (560px) ═══
          - obj:
              align: RIGHT_MID
              x: -20
              y: 15
              width: 560
              height: 440
              styles: style_transparent
              layout:
                type: FLEX
                flex_flow: ROW_WRAP
                flex_align_main: SPACE_EVENLY
                flex_align_cross: CENTER
                flex_align_track: SPACE_EVENLY
                pad_row: 12
                pad_column: 10
              widgets:
                # ── Ligne 1 : Modes principaux ──
                - !include { file: climate_hvac_mode_btn.yaml, vars: { suffix: "cool", hvac_mode: "cool", icon: "\U000F0717", label_text: "Froid" } }
                - !include { file: climate_hvac_mode_btn.yaml, vars: { suffix: "heat", hvac_mode: "heat", icon: "\U000F0238", label_text: "Chaud" } }
                - button:
                    id: popup_btn_clim_off
                    width: 170
                    height: 60
                    radius: 12
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: climate.turn_off
                          data:
                            entity_id: ${entity_climate_salon}
                    widgets:
                      - label: { id: popup_icon_clim_off, text: "\U000F0425", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Éteint", align: LEFT_MID, x: 60, text_font: roboto_22, text_color: color_text_dim }

                # ── Ligne 2 : Modes secondaires ──
                - !include { file: climate_hvac_mode_btn.yaml, vars: { suffix: "fan", hvac_mode: "fan_only", icon: "\U000F0210", label_text: "Ventil." } }
                - !include { file: climate_hvac_mode_btn.yaml, vars: { suffix: "dry", hvac_mode: "dry", icon: "\U000F058E", label_text: "Sec" } }
                - button:
                    id: popup_btn_clim_swing
                    width: 170
                    height: 60
                    radius: 12
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_swing_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            # Daikin Onecta : modes réels = stop / swing / windnice (pas off/vertical)
                            swing_mode: !lambda 'return id(clim_swing_mode) == "swing" ? std::string("stop") : std::string("swing");'
                    widgets:
                      - label: { id: popup_icon_clim_swing, text: "\U000F0E79", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Oscill.", align: LEFT_MID, x: 60, text_font: roboto_22, text_color: color_text_dim }

                # ── Ligne 3 : Presets ──
                # Daikin : pas de preset "eco" — équivalent = "away"
                - !include { file: climate_preset_toggle_btn.yaml, vars: { suffix: "eco", preset_name: "away", icon: "\U000F032A", label_text: "Éco" } }
                - !include { file: climate_preset_toggle_btn.yaml, vars: { suffix: "boost", preset_name: "boost", icon: "\U000F14DE", label_text: "Boost" } }
                - button:
                    id: popup_btn_clim_quiet
                    width: 170
                    height: 60
                    radius: 12
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: climate.set_fan_mode
                          data:
                            entity_id: ${entity_climate_salon}
                            fan_mode: !lambda 'return (id(clim_fan_mode) == "quiet") ? std::string("auto") : std::string("quiet");'
                    widgets:
                      - label: { id: popup_icon_clim_quiet, text: "\U000F146D", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Silence", align: LEFT_MID, x: 60, text_font: roboto_22, text_color: color_text_dim }
