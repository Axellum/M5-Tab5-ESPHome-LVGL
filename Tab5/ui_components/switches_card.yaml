# ============================================================================
# [AI-CONTEXT]
# @file switches_card.yaml
# @role 5 cartes switches (PC bureau, volet, lumière chambre/salon, LEDs bureau). Alterne
#       avec forecast_daily.yaml/forecast_hourly.yaml via `btn_control_ha` (tab5-lvgl.yaml,
#       global `show_switches`).
# @architecture_constraint Onglet Titre (`switch_card_title_tab.yaml`) et Onglet État
#                          (`switch_card_state_tab.yaml`) sont factorisés (#T164, même motif x5).
#                          Le bouton d'action (`btn_swN_action`) N'EST PAS factorisé : chaque
#                          carte appelle un service Home Assistant différent — même décision
#                          que forecast_daily.yaml (cartes j0-j4), voir etat_tab5.md.
# @ai_instruction `lbl_swN_state`/`icon_swN` sont mis à jour par les fonctions C++ (ex:
#                 `update_light_card_ui()`) ou les lambdas de tab5-sensors.yaml/tab5-api-logic.yaml
#                 — ne pas leur assigner de texte/couleur directement ici.
# ============================================================================
obj:
  id: layer_switches
  x: 0
  y: 430
  width: 1280
  height: 290
  styles: style_transparent
  scrollbar_mode: "OFF"
  hidden: true

  widgets:
    # Card 0 : PC Bureau
    - obj:
        x: 25
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Onglet Titre + Onglet État : factorises (#T164), action du bouton laissee en override ci-dessous
          - !include { file: switch_card_title_tab.yaml, vars: { title: "PC Bureau" } }
          - !include { file: switch_card_state_tab.yaml, vars: { idx: "0", state_text: "Éteint" } }
          # Corps Sombre (chevauche les onglets)
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              widgets:
                - label: { id: icon_sw0, text: "\U000F0379", align: CENTER, text_font: mdi_font_80, text_color: color_text_dim }
                - button:
                    id: btn_sw0_action
                    align: CENTER
                    y: 0
                    width: 130
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - homeassistant.service:
                          service: script.allumer_pc_tv

    # Card 1 : Volet
    - obj:
        x: 275
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Onglet Titre + Onglet État : factorises (#T164), action du bouton laissee en override ci-dessous
          - !include { file: switch_card_title_tab.yaml, vars: { title: "Volet" } }
          - !include { file: switch_card_state_tab.yaml, vars: { idx: "1", state_text: "Fermé" } }
          # Corps Sombre
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              widgets:
                - label: { id: icon_sw1, text: "\U000F111E", align: CENTER, text_font: mdi_font_80, text_color: color_text_dim }
                - button:
                    id: btn_sw1_action
                    align: CENTER
                    y: 0
                    width: 130
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - if:
                          condition:
                            lambda: 'return id(volet_en_mouvement);'
                          then:
                            - homeassistant.service:
                                service: script.tab5_volet_action
                                data:
                                  action: "stop"
                          else:
                            - if:
                                condition:
                                  lambda: 'return id(volet_target_open);'
                                then:
                                  - homeassistant.service:
                                      service: script.tab5_volet_action
                                      data:
                                        action: "open"
                                else:
                                  - homeassistant.service:
                                      service: script.tab5_volet_action
                                      data:
                                        action: "close"

    # Card 2 : Chambre
    - obj:
        x: 525
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Onglet Titre + Onglet État : factorises (#T164), action du bouton laissee en override ci-dessous
          - !include { file: switch_card_title_tab.yaml, vars: { title: "Chambre" } }
          - !include { file: switch_card_state_tab.yaml, vars: { idx: "2", state_text: "Éteint" } }
          # Corps Sombre
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              widgets:
                - label: { id: icon_sw2, text: "\U000F02E3", align: CENTER, text_font: mdi_font_80, text_color: color_text_dim }
                - button:
                    id: btn_sw2_action
                    align: CENTER
                    y: 0
                    width: 130
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: ${entity_light_chambre}

    # Card 3 : Salon
    - obj:
        x: 775
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Onglet Titre + Onglet État : factorises (#T164), action du bouton laissee en override ci-dessous
          - !include { file: switch_card_title_tab.yaml, vars: { title: "Salon" } }
          - !include { file: switch_card_state_tab.yaml, vars: { idx: "3", state_text: "Éteint" } }
          # Corps Sombre
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              widgets:
                - label: { id: icon_sw3, text: "\U000F04B9", align: CENTER, text_font: mdi_font_80, text_color: color_text_dim }
                - button:
                    id: btn_sw3_action
                    align: CENTER
                    y: 0
                    width: 130
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: ${entity_light_salon}

    # Card 4 : LEDs Bureau
    - obj:
        x: 1025
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Onglet Titre + Onglet État : factorises (#T164), action du bouton laissee en override ci-dessous
          - !include { file: switch_card_title_tab.yaml, vars: { title: "LEDs" } }
          - !include { file: switch_card_state_tab.yaml, vars: { idx: "4", state_text: "Éteint" } }
          # Corps Sombre
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              widgets:
                - label: { id: icon_sw4, text: "\U000F1051", align: CENTER, text_font: mdi_font_80, text_color: color_text_dim }
                - button:
                    id: btn_sw4_action
                    align: CENTER
                    y: 0
                    width: 130
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - homeassistant.service:
                          service: script.allumer_leds
