# [AI-CONTEXT] Template paramétré (!include+vars), réutilisé 5x par switches_card.yaml.
# Vars: idx, state_text (texte initial seulement). `lbl_swN_state` recoloré/retexté
# dynamiquement par les lambdas C++ (update_light_card_ui, etc.) — ne pas dupliquer.
obj:
  align: BOTTOM_MID
  y: 0
  width: 130
  height: 45
  styles: style_meteo_tab
  widgets:
    - label: { id: "lbl_sw${idx}_state", text: "${state_text}", align: CENTER, text_font: roboto_32_b, text_color: color_text_dim }
