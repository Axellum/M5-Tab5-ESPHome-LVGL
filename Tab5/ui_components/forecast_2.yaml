obj:

  id: layer_forecast_2

  x: 0

  y: 430

  width: 1280

  height: 290

  styles: style_transparent
  scrollbar_mode: "OFF"
  hidden: true

  widgets:

    # Card 5

    - obj:

        x: 25

        y: 0

        width: 230

        height: 280
        styles: style_meteo_card

        widgets:

          - label: { id: j5_day, text: "5 Jours", align: TOP_MID, y: 0, text_font: roboto_36_b, text_color: color_text }

          - label: { id: j5_icon_layer1, text: "", hidden: true, align: CENTER, y: 0 , text_font: font_meteo_card, text_color: color_text }

          - label: { id: j5_icon_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_card, text_color: color_text }

          - label: { id: j5_icon_layer3, text: "", hidden: true, align: CENTER, y: 0 , text_font: mdi_font_32, text_color: 0x555555 }
          - label: { id: j5_max, text: "-- / ", align: BOTTOM_MID, x: -25, y: -1, text_font: roboto_36_b, text_color: color_temp_max }

          - label: { id: j5_min, text: "-- °C", align: BOTTOM_MID, x: 35, y: -1, text_font: roboto_36_b, text_color: color_temp_min }

          - button:

              id: btn_tj5_toggle

              align: BOTTOM_MID

              x: 0

              y: 0

              width: 200

              height: 60

              bg_opa: 0

              border_width: 0

              outline_width: 0

              shadow_width: 0

              on_short_click:

                - lambda: |-

                    if(!cal_toggled[5]) {

                       lv_label_set_text(id(j5_day), cal_heures[5].c_str());

                       lv_obj_add_flag(id(j5_min), LV_OBJ_FLAG_HIDDEN);

                       lv_obj_add_flag(id(j5_max), LV_OBJ_FLAG_HIDDEN);

                       cal_toggled[5] = true;

                    } else {

                       lv_label_set_text(id(j5_day), cal_jour_nom[5].c_str());

                       lv_obj_clear_flag(id(j5_min), LV_OBJ_FLAG_HIDDEN);

                       lv_obj_clear_flag(id(j5_max), LV_OBJ_FLAG_HIDDEN);

                       cal_toggled[5] = false;

                    }

