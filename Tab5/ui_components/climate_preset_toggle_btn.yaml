# [AI-CONTEXT] Template paramétré (!include+vars), réutilisé 2x par climate_popup.yaml
# (eco/boost — rangée flex Presets de la carte OPTIONS, 164×88). Vars: suffix, preset_name,
# icon, label_text. Toggle : si le preset courant == preset_name, on repasse à "none"
# (clic à bascule), ne pas simplifier. Icône recolorée par tab5_maj_clim.
button:
  id: popup_btn_clim_${suffix}
  width: 164
  height: 88
  radius: 18
  styles: style_clim_btn
  pressed:
    bg_opa: 30%
  on_short_click:
    - homeassistant.service:
        service: climate.set_preset_mode
        data:
          entity_id: ${entity_climate_salon}
          preset_mode: !lambda 'return id(clim_preset_mode) == "${preset_name}" ? std::string("none") : std::string("${preset_name}");'
  widgets:
    - label: { id: "popup_icon_clim_${suffix}", text: "${icon}", align: LEFT_MID, x: 14, text_font: mdi_font_45, text_color: color_text_dim }
    - label: { text: "${label_text}", align: LEFT_MID, x: 72, text_font: roboto_22, text_color: color_text }
