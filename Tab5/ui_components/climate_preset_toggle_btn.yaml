button:
  id: popup_btn_clim_${suffix}
  width: 170
  height: 60
  radius: 12
  styles: style_clim_btn
  pressed:
    bg_opa: 30%
  on_short_click:
    - homeassistant.service:
        service: climate.set_preset_mode
        data:
          entity_id: ${entity_climate_salon}
          preset_mode: !lambda 'return id(clim_preset_mode) == "${preset_name}" ? std::string("none") : std::string("${preset_name}");'
  widgets:
    - label: { id: "popup_icon_clim_${suffix}", text: "${icon}", align: LEFT_MID, x: 10, text_font: mdi_font_45, text_color: color_text_dim }
    - label: { text: "${label_text}", align: LEFT_MID, x: 60, text_font: roboto_22, text_color: color_text_dim }
