# ═══════════════════════════════════════════════════════
# POPUP CONSOLE SYS — Fullscreen modal (960×520)
# ═══════════════════════════════════════════════════════
obj:
  id: layer_console_sys
  align: CENTER
  width: 100%
  height: 100%
  hidden: true
  styles: style_invisible
  widgets:
    # Overlay fond sombre (cliquable pour fermer)
    - button:
        align: CENTER
        width: 100%
        height: 100%
        styles: style_modal_overlay
        on_short_click:
          - lambda: 'lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);'

    # Carte modale principale
    - obj:
        align: CENTER
        width: 1130
        height: 650
        styles: style_modal_card
        scrollbar_mode: "OFF"
        widgets:

          # ═══ EN-TÊTE ═══
          - label:
              text: "\U000F050F"
              align: TOP_MID
              x: -180
              y: 15
              text_font: mdi_font_45
              text_color: color_text
          - label:
              text: "CONSOLE DIAGNOSTIQUE"
              align: TOP_MID
              x: 20
              y: 20
              text_font: roboto_32_b
              text_color: color_text

          # Bouton fermer (X)
          - button:
              align: TOP_RIGHT
              x: -15
              y: 12
              width: 80
              height: 80
              styles: style_transparent
              on_short_click:
                - lambda: 'lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);'
              widgets:
                - label: { text: "\U000F0156", align: CENTER, text_font: mdi_font_45, text_color: color_console_label }

          # ROW 1 (y:80)
          - obj:
              align: TOP_MID
              y: 80
              width: 100%
              height: 50
              styles: style_transparent
              widgets:
                - label: { text: "Temps Actif:", x: 60, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { id: lbl_sys_uptime_val, text: "--", x: 280, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }
                - label: { text: "Temp. CPU:", x: 550, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { id: lbl_sys_temp_val, text: "-- C", x: 780, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }

          # ROW 2 (y:140)
          - obj:
              align: TOP_MID
              y: 140
              width: 100%
              height: 50
              styles: style_transparent
              widgets:
                - label: { text: "SRAM Utilisée:", x: 60, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label, y: -10 }
                - label: { id: lbl_sys_sram_val, text: "--", x: 300, align: LEFT_MID, text_font: roboto_22, text_color: 0xFFFFFF, y: -15 }
                - bar:
                    id: bar_sys_sram
                    x: 270
                    y: 10
                    align: LEFT_MID
                    width: 200
                    height: 15
                    min_value: 0
                    max_value: 100
                    value: 0
                - label: { text: "PSRAM Utilisée:", x: 550, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label, y: -10 }
                - label: { id: lbl_sys_psram_val, text: "--", x: 790, align: LEFT_MID, text_font: roboto_22, text_color: 0xFFFFFF, y: -15 }
                - bar:
                    id: bar_sys_psram
                    x: 760
                    y: 10
                    align: LEFT_MID
                    width: 200
                    height: 15
                    min_value: 0
                    max_value: 100
                    value: 0

          # ROW 3 (y:200)
          - obj:
              align: TOP_MID
              y: 200
              width: 100%
              height: 50
              styles: style_transparent
              widgets:
                - label: { text: "Bloc Max:", x: 60, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { id: lbl_sys_frag_val, text: "--", x: 280, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }
                - label: { text: "Taille Flash:", x: 550, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { id: lbl_sys_flash_val, text: "--", x: 780, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }

          # ROW 4 (y:260)
          - obj:
              align: TOP_MID
              y: 260
              width: 100%
              height: 50
              styles: style_transparent
              widgets:
                - label: { text: "Signal Wi-Fi:", x: 60, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { id: lbl_sys_rssi_val, text: "-- dBm", x: 280, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }
                - label: { text: "IP:", x: 550, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { id: lbl_sys_ip_val, text: "--", x: 780, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }

          # ROW 5 (y:320)
          - obj:
              align: TOP_MID
              y: 320
              width: 100%
              height: 50
              styles: style_transparent
              widgets:
                - label: { text: "SSID:", x: 60, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { id: lbl_sys_ssid_val, text: "--", x: 280, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }
                - label: { text: "Temps Boucle:", x: 550, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { id: lbl_sys_loop_val, text: "-- ms", x: 780, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }

          # ROW 6 (y:380) - Volume
          - obj:
              align: TOP_MID
              y: 380
              width: 100%
              height: 50
              styles: style_transparent
              widgets:
                - label: { text: "Volume:", x: 60, align: LEFT_MID, text_font: roboto_32_b, text_color: color_console_label }
                - label: { text: "\U000F057E", x: 230, align: LEFT_MID, text_font: mdi_font_32, text_color: color_console_label }
                - slider:
                    id: slider_volume
                    x: 270
                    y: 10
                    align: LEFT_MID
                    width: 480
                    height: 15
                    min_value: 0
                    max_value: 100
                    value: 100
                    on_value:
                      - lambda: |-
                          float vol = x / 100.0;
                          id(system_volume) = vol;
                      - media_player.volume_set:
                          id: speaker_player
                          volume: !lambda 'return id(system_volume);'
                - label: { text: "\U000F0580", x: 770, align: LEFT_MID, text_font: mdi_font_32, text_color: color_console_label }

          # FERMER BUTTON
          - button:
              id: btn_close_sys_bottom
              align: BOTTOM_MID
              x: -60
              y: -30
              width: 85
              height: 50
              styles: style_clim_btn
              widgets:
                - label:
                    text: "\U000F0156"
                    align: CENTER
                    text_font: mdi_font_32
                    text_color: color_text
              on_click:
                - lambda: 'lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);'

          # REBOOT BUTTON — Double tap requis
          - button:
              id: btn_reboot_sys
              align: BOTTOM_MID
              x: 60
              y: -30
              width: 85
              height: 50
              styles: style_clim_btn
              widgets:
                - label:
                    id: lbl_reboot_icon
                    text: "\U000F0450"
                    align: CENTER
                    text_font: mdi_font_32
                    text_color: color_text
              on_short_click:
                - lambda: |-
                    static bool armed = false;
                    if(!armed) {
                      armed = true;
                      lv_obj_set_style_bg_color(id(btn_reboot_sys), lv_color_hex(UIColor::ERROR), LV_PART_MAIN);
                    } else {
                      armed = false;
                      id(btn_restart).press();
                    }
              on_long_press:
                - lambda: |-
                    static bool& armed = *reinterpret_cast<bool*>(lv_obj_get_user_data(id(btn_reboot_sys)));
                    armed = false;
                    lv_obj_set_style_bg_color(id(btn_reboot_sys), lv_color_hex(UIColor::INACTIVE), LV_PART_MAIN);
