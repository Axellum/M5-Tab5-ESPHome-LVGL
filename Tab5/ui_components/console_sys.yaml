# ============================================================================
# [AI-CONTEXT]
# @file console_sys.yaml
# @role Popup diagnostic overlay (RAM/PSRAM/frag/uptime/Wi-Fi/loop time) + slider volume
#       + reboot par double-tap. Tous les labels (`lbl_sys_*`) sont remplis par
#       `update_console_diagnostics_ui()` (tab5_custom.cpp), appelée depuis l'interval 2s
#       de tab5-sensors.yaml — ce fichier ne fait QUE déclarer les widgets, aucun calcul ici.
# @ai_instruction Le double-tap reboot (`btn_reboot_sys`) utilise le global `reboot_armed`
#                 (tab5-globals.yaml) partagé entre `on_short_click`/`on_long_press`. NE PAS
#                 remplacer par une variable `static bool` locale à une des deux lambdas :
#                 c'était un bug réel (armement jamais désarmé, cf. audit #B1 du 05/07/2026,
#                 `audit_tab5/audit_global_synthese_2026-07-05.md`), déjà corrigé via ce global.
# @architecture_constraint `slider_volume` passe par `script.tab5_debounce_volume_set`
#                          (tab5-scripts.yaml) — ne pas appeler `media_player.volume_set`
#                          directement dans `on_value` (saturation I2S à chaque tick de glissement).
# ============================================================================
obj:
  id: layer_console_sys
  align: CENTER
  width: 100%
  height: 100%
  hidden: true
  styles: style_invisible
  widgets:
    # Overlay fond sombre (cliquable pour fermer)
    - button:
        align: CENTER
        width: 100%
        height: 100%
        styles: style_modal_overlay
        on_short_click:
          - lambda: 'lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);'

    # Carte modale principale
    - obj:
        align: CENTER
        width: 1130
        height: 650
        styles: style_modal_card
        scrollbar_mode: "OFF"
        widgets:

          # ═══ EN-TÊTE (icône + titre centrés, sans chevauchement) ═══
          - obj:
              align: TOP_MID
              y: 10
              width: 900
              height: 56
              styles: style_transparent
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: CENTER
                flex_align_cross: CENTER
                pad_column: 14
              widgets:
                - label: { text: "\U000F1534", text_font: mdi_font_45, text_color: color_accent }
                - label: { text: "Réglages & diagnostic", text_font: roboto_32_b, text_color: color_text }

          # Bouton fermer (X)
          - button:
              align: TOP_RIGHT
              x: -15
              y: 12
              width: 80
              height: 80
              styles: style_transparent
              on_short_click:
                - lambda: 'lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);'
              widgets:
                - label: { text: "\U000F0156", align: CENTER, text_font: mdi_font_45, text_color: color_console_label }

          # ROW 1 — Infos système (y:78)
          - obj:
              align: TOP_MID
              y: 78
              width: 1000
              height: 44
              styles: style_transparent
              widgets:
                - label: { text: "Temps actif", x: 40, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_uptime_val, text: "--", x: 200, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }
                - label: { text: "Temp. CPU", x: 520, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_temp_val, text: "-- C", x: 680, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }

          # ROW 2 — SRAM (y:132)
          - obj:
              align: TOP_MID
              y: 132
              width: 1000
              height: 58
              styles: style_transparent
              widgets:
                - label: { text: "SRAM utilisée", x: 40, y: 0, align: TOP_LEFT, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_sram_val, text: "--", x: 40, y: 26, align: TOP_LEFT, text_font: roboto_22, text_color: color_text }
                - bar:
                    id: bar_sys_sram
                    x: 40
                    y: 46
                    align: TOP_LEFT
                    width: 420
                    height: 10
                    min_value: 0
                    max_value: 100
                    value: 0

          # ROW 3 — PSRAM (y:200)
          - obj:
              align: TOP_MID
              y: 200
              width: 1000
              height: 58
              styles: style_transparent
              widgets:
                - label: { text: "PSRAM utilisée", x: 40, y: 0, align: TOP_LEFT, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_psram_val, text: "--", x: 40, y: 26, align: TOP_LEFT, text_font: roboto_22, text_color: color_text }
                - bar:
                    id: bar_sys_psram
                    x: 40
                    y: 46
                    align: TOP_LEFT
                    width: 420
                    height: 10
                    min_value: 0
                    max_value: 100
                    value: 0

          # ROW 4 — Mémoire flash / fragmentation (y:268)
          - obj:
              align: TOP_MID
              y: 268
              width: 1000
              height: 44
              styles: style_transparent
              widgets:
                - label: { text: "Bloc max libre", x: 40, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_frag_val, text: "--", x: 240, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }
                - label: { text: "Flash", x: 520, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_flash_val, text: "--", x: 620, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }

          # ROW 5 — Réseau (y:322)
          - obj:
              align: TOP_MID
              y: 322
              width: 1000
              height: 44
              styles: style_transparent
              widgets:
                - label: { text: "Wi-Fi", x: 40, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_rssi_val, text: "-- dBm", x: 140, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }
                - label: { text: "IP", x: 320, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_ip_val, text: "--", x: 380, align: LEFT_MID, text_font: roboto_22, text_color: color_success }
                - label: { text: "SSID", x: 620, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_ssid_val, text: "--", x: 700, align: LEFT_MID, text_font: roboto_22, text_color: color_success, width: 280, long_mode: DOT }

          # ROW 6 — Boucle LVGL (y:376)
          - obj:
              align: TOP_MID
              y: 376
              width: 1000
              height: 44
              styles: style_transparent
              widgets:
                - label: { text: "Temps boucle LVGL", x: 40, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { id: lbl_sys_loop_val, text: "-- ms", x: 280, align: LEFT_MID, text_font: roboto_32_b, text_color: color_success }

          # ROW 7 — Volume (y:430)
          - obj:
              align: TOP_MID
              y: 430
              width: 1000
              height: 56
              styles: style_transparent
              widgets:
                - label: { text: "Volume", x: 40, align: LEFT_MID, text_font: roboto_22, text_color: color_console_label }
                - label: { text: "\U000F057E", x: 150, align: LEFT_MID, text_font: mdi_font_32, text_color: color_console_label }
                - slider:
                    id: slider_volume
                    x: 200
                    y: 0
                    align: LEFT_MID
                    width: 520
                    height: 36
                    min_value: 0
                    max_value: 100
                    value: 100
                    on_value:
                      - lambda: |-
                          float vol = x / 100.0;
                          id(system_volume) = vol;
                      - script.execute: tab5_debounce_volume_set
                - label: { text: "\U000F0580", x: 740, align: LEFT_MID, text_font: mdi_font_32, text_color: color_console_label }

          # FERMER BUTTON
          - button:
              id: btn_close_sys_bottom
              align: BOTTOM_MID
              x: -60
              y: -30
              width: 85
              height: 50
              styles: style_clim_btn
              pressed:
                bg_opa: 30%
              widgets:
                - label:
                    text: "\U000F0156"
                    align: CENTER
                    text_font: mdi_font_32
                    text_color: color_text
              on_click:
                - lambda: 'lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);'

          # REBOOT BUTTON — Double tap requis
          - button:
              id: btn_reboot_sys
              align: BOTTOM_MID
              x: 60
              y: -30
              width: 85
              height: 50
              styles: style_clim_btn
              pressed:
                bg_opa: 30%
              widgets:
                - label:
                    id: lbl_reboot_icon
                    text: "\U000F0450"
                    align: CENTER
                    text_font: mdi_font_32
                    text_color: color_text
              on_short_click:
                - lambda: |-
                    if (!id(reboot_armed)) {
                      id(reboot_armed) = true;
                      lv_obj_set_style_bg_color(id(btn_reboot_sys), lv_color_hex(UIColor::ERROR), LV_PART_MAIN);
                    } else {
                      id(reboot_armed) = false;
                      id(btn_restart).press();
                    }
              on_long_press:
                - lambda: |-
                    id(reboot_armed) = false;
                    lv_obj_set_style_bg_color(id(btn_reboot_sys), lv_color_hex(UIColor::INACTIVE), LV_PART_MAIN);
