# ============================================================================
# [AI-CONTEXT]
# @file moisture_sensors.yaml
# @role 4 slots UI fixes affichant un sous-ensemble dynamique de 5 capteurs d'humidité BLE
#       (plantes). Slot 0 = le plus sec, 1 = 2e plus sec, 2 = médiane ("Moy:"), 3 = le plus
#       humide — PAS un mapping fixe capteur→slot.
# @architecture_constraint Les 4 slots (`icon_pot_sN`/`val_pot_sN`) sont remplis par
#                          `sort_and_update_moisture_slots()` (tab5_custom.cpp), appelée à
#                          chaque mise à jour de n'importe lequel des 5 capteurs
#                          (`moisture_1`..`moisture_5`, ancre YAML `&moisture_on_value` dans
#                          tab5-sensors-domotique.yaml). Ne jamais assigner icône/texte/couleur ici :
#                          quel capteur physique tombe dans quel slot change à chaque update.
# ============================================================================
obj:
  id: moisture_sensors_card
  align: TOP_MID
  x: 0
  y: 230
  width: 350
  height: 80
  styles: style_transparent
  scrollbar_mode: "OFF"
  layout:
    type: FLEX
    flex_flow: ROW
    flex_align_main: SPACE_EVENLY
    flex_align_cross: CENTER

  widgets:
    # Slot 0 : Plus sec (rempli dynamiquement par sort_and_update_moisture_slots)
    - obj:
        width: 90
        height: 80
        styles: style_transparent
        widgets:
          - label: { id: icon_pot_s0, text: "\U000F024A", align: TOP_MID, text_font: mdi_font_45, text_color: color_text_dim }
          - label: { id: val_pot_s0, text: "Pot -", align: BOTTOM_MID, y: -5, text_font: roboto_22, text_color: color_text_dim }

    # Slot 1 : 2e plus sec
    - obj:
        width: 90
        height: 80
        styles: style_transparent
        widgets:
          - label: { id: icon_pot_s1, text: "\U000F0E66", align: TOP_MID, text_font: mdi_font_45, text_color: color_text_dim }
          - label: { id: val_pot_s1, text: "Pot -", align: BOTTOM_MID, y: -5, text_font: roboto_22, text_color: color_text_dim }

    # Slot 2 : Moyenne
    - obj:
        width: 90
        height: 80
        styles: style_transparent
        widgets:
          - label: { id: icon_pot_s2, text: "\U000F02E5", align: TOP_MID, text_font: mdi_font_45, text_color: color_text_dim }
          - label: { id: val_pot_s2, text: "Moy:", align: BOTTOM_MID, y: -5, text_font: roboto_22, text_color: color_text_dim }

    # Slot 3 : Plus humide
    - obj:
        width: 90
        height: 80
        styles: style_transparent
        widgets:
          - label: { id: icon_pot_s3, text: "\U000F09F1", align: TOP_MID, text_font: mdi_font_45, text_color: color_text_dim }
          - label: { id: val_pot_s3, text: "Pot -", align: BOTTOM_MID, y: -5, text_font: roboto_22, text_color: color_text_dim }
