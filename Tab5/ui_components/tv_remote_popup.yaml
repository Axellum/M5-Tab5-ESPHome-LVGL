# ═══════════════════════════════════════════════════════
# [AI-CONTEXT]
# @file tv_remote_popup.yaml
# @role Popup télécommande TV Samsung (1230×670, ~25 px des bords écran 1280×720).
#       Grille symétrique 3 colonnes (290 | 440 | 290) + rangée basse 5 boutons.
#       Ouvert par long-press carte PC (switches_card) ou btn_control_tv.
# @architecture_constraint remote.send_command / remote.toggle sur ${entity_tv_remote}.
# ═══════════════════════════════════════════════════════
obj:
  id: tv_remote_popup
  align: CENTER
  width: 100%
  height: 100%
  hidden: true
  styles: style_invisible
  scrollbar_mode: "OFF"
  widgets:
    # Overlay — opacité renforcée pour ne pas confondre avec le dashboard dessous
    - button:
        align: CENTER
        width: 100%
        height: 100%
        bg_color: color_modal_scrim
        bg_opa: 85%
        border_width: 0
        on_short_click:
          - lambda: 'lv_obj_add_flag(id(tv_remote_popup), LV_OBJ_FLAG_HIDDEN);'

    # Carte modale — 25 px des bords écran (1280×720)
    - obj:
        align: CENTER
        width: 1230
        height: 670
        styles: style_modal_card
        scrollable: false
        scrollbar_mode: "OFF"
        widgets:

          # ═══ EN-TÊTE ═══
          - label:
              text: "Télécommande TV"
              align: TOP_MID
              y: 16
              text_font: roboto_32_b
              text_color: color_text
          - label:
              text: "Samsung S95B — Salon"
              align: TOP_MID
              y: 52
              text_font: roboto_22
              text_color: color_text_dim

          - button:
              align: TOP_RIGHT
              x: -16
              y: 12
              width: 64
              height: 64
              radius: 18
              styles: style_clim_btn
              pressed:
                bg_opa: 30%
              on_short_click:
                - lambda: 'lv_obj_add_flag(id(tv_remote_popup), LV_OBJ_FLAG_HIDDEN);'
              widgets:
                - label: { text: "\U000F0156", align: CENTER, text_font: mdi_font_45, text_color: color_text }

          # ═══ CORPS — grille 1170×432 (laisse place à la rangée basse) ═══
          - obj:
              align: TOP_MID
              y: 88
              width: 1170
              height: 432
              styles: style_transparent
              scrollable: false
              scrollbar_mode: "OFF"
              widgets:

                # ── Colonne gauche (290) ──
                - obj:
                    align: LEFT_MID
                    x: 0
                    width: 290
                    height: 432
                    styles: style_transparent
                    scrollable: false
                    widgets:
                      - button:
                          y: 0
                          width: 290
                          height: 128
                          radius: 18
                          styles: style_clim_btn
                          pressed:
                            bg_opa: 30%
                          on_short_click:
                            - homeassistant.service:
                                service: remote.toggle
                                data:
                                  entity_id: ${entity_tv_remote}
                          widgets:
                            - label: { text: "\U000F0425", align: LEFT_MID, x: 22, text_font: mdi_font_45, text_color: color_error }
                            - label: { text: "Marche / Arrêt", align: LEFT_MID, x: 82, text_font: roboto_22, text_color: color_text }
                      - button:
                          y: 144
                          width: 290
                          height: 128
                          radius: 18
                          styles: style_clim_btn
                          pressed:
                            bg_opa: 30%
                          on_short_click:
                            - homeassistant.service:
                                service: remote.send_command
                                data:
                                  entity_id: ${entity_tv_remote}
                                  command: "KEY_SOURCE"
                          widgets:
                            - label: { text: "\U000F0379", align: LEFT_MID, x: 22, text_font: mdi_font_45, text_color: color_info }
                            - label: { text: "Source", align: LEFT_MID, x: 82, text_font: roboto_22, text_color: color_text }
                      - button:
                          y: 288
                          width: 290
                          height: 128
                          radius: 18
                          styles: style_clim_btn
                          pressed:
                            bg_opa: 30%
                          on_short_click:
                            - homeassistant.service:
                                service: remote.send_command
                                data:
                                  entity_id: ${entity_tv_remote}
                                  command: "KEY_MENU"
                          widgets:
                            - label: { text: "\U000F035C", align: LEFT_MID, x: 22, text_font: mdi_font_45, text_color: color_text_dim }
                            - label: { text: "Menu", align: LEFT_MID, x: 82, text_font: roboto_22, text_color: color_text }

                # ── Colonne centre (440) — anneau directionnel ──
                - obj:
                    align: CENTER
                    width: 440
                    height: 432
                    styles: style_transparent
                    scrollable: false
                    widgets:
                      - obj:
                          align: CENTER
                          width: 360
                          height: 360
                          radius: 180
                          styles: style_meteo_card
                          scrollable: false
                          widgets:
                            - button:
                                align: TOP_MID
                                y: 10
                                width: 138
                                height: 100
                                radius: 36
                                styles: style_invisible
                                bg_color: color_accent
                                pressed:
                                  bg_opa: 25%
                                on_short_click:
                                  - homeassistant.service:
                                      service: remote.send_command
                                      data:
                                        entity_id: ${entity_tv_remote}
                                        command: "KEY_UP"
                                widgets:
                                  - label: { text: "\U000F005D", align: CENTER, text_font: mdi_font_45, text_color: color_text }
                            - button:
                                align: BOTTOM_MID
                                y: -10
                                width: 138
                                height: 100
                                radius: 36
                                styles: style_invisible
                                bg_color: color_accent
                                pressed:
                                  bg_opa: 25%
                                on_short_click:
                                  - homeassistant.service:
                                      service: remote.send_command
                                      data:
                                        entity_id: ${entity_tv_remote}
                                        command: "KEY_DOWN"
                                widgets:
                                  - label: { text: "\U000F0045", align: CENTER, text_font: mdi_font_45, text_color: color_text }
                            - button:
                                align: LEFT_MID
                                x: 10
                                width: 100
                                height: 138
                                radius: 36
                                styles: style_invisible
                                bg_color: color_accent
                                pressed:
                                  bg_opa: 25%
                                on_short_click:
                                  - homeassistant.service:
                                      service: remote.send_command
                                      data:
                                        entity_id: ${entity_tv_remote}
                                        command: "KEY_LEFT"
                                widgets:
                                  - label: { text: "\U000F004D", align: CENTER, text_font: mdi_font_45, text_color: color_text }
                            - button:
                                align: RIGHT_MID
                                x: -10
                                width: 100
                                height: 138
                                radius: 36
                                styles: style_invisible
                                bg_color: color_accent
                                pressed:
                                  bg_opa: 25%
                                on_short_click:
                                  - homeassistant.service:
                                      service: remote.send_command
                                      data:
                                        entity_id: ${entity_tv_remote}
                                        command: "KEY_RIGHT"
                                widgets:
                                  - label: { text: "\U000F0054", align: CENTER, text_font: mdi_font_45, text_color: color_text }
                            - button:
                                align: CENTER
                                width: 148
                                height: 148
                                radius: 74
                                styles: style_pill_accent
                                pressed:
                                  bg_opa: 45%
                                on_short_click:
                                  - homeassistant.service:
                                      service: remote.send_command
                                      data:
                                        entity_id: ${entity_tv_remote}
                                        command: "KEY_ENTER"
                                widgets:
                                  - label: { text: "OK", align: CENTER, text_font: roboto_45_b, text_color: color_text }

                # ── Colonne droite (290) — rocker volume centré ──
                - obj:
                    align: RIGHT_MID
                    x: 0
                    width: 290
                    height: 432
                    styles: style_transparent
                    scrollable: false
                    widgets:
                      - obj:
                          align: CENTER
                          width: 150
                          height: 360
                          radius: 75
                          styles: style_meteo_card
                          scrollable: false
                          widgets:
                            - button:
                                align: TOP_MID
                                y: 0
                                width: 150
                                height: 150
                                radius: 75
                                styles: style_invisible
                                bg_color: color_accent
                                pressed:
                                  bg_opa: 25%
                                on_short_click:
                                  - homeassistant.service:
                                      service: remote.send_command
                                      data:
                                        entity_id: ${entity_tv_remote}
                                        command: "KEY_VOLUP"
                                widgets:
                                  - label: { text: "\U000F0415", align: CENTER, y: 8, text_font: mdi_font_45, text_color: color_text }
                            - label:
                                text: "VOL"
                                align: CENTER
                                text_font: roboto_22
                                text_color: color_text_dim
                            - button:
                                align: BOTTOM_MID
                                y: 0
                                width: 150
                                height: 150
                                radius: 75
                                styles: style_invisible
                                bg_color: color_accent
                                pressed:
                                  bg_opa: 25%
                                on_short_click:
                                  - homeassistant.service:
                                      service: remote.send_command
                                      data:
                                        entity_id: ${entity_tv_remote}
                                        command: "KEY_VOLDOWN"
                                widgets:
                                  - label: { text: "\U000F0374", align: CENTER, y: -6, text_font: mdi_font_45, text_color: color_text }

          # ═══ RANGÉE BASSE — 6 px du bord bas de la popup ═══
          - obj:
              align: BOTTOM_MID
              y: -6
              width: 1170
              height: 102
              styles: style_transparent
              scrollable: false
              widgets:
                - button:
                    x: 0
                    width: 221
                    height: 102
                    radius: 18
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: remote.send_command
                          data:
                            entity_id: ${entity_tv_remote}
                            command: "KEY_PLAY"
                    widgets:
                      - label: { text: "\U000F040A", align: CENTER, text_font: mdi_font_45, text_color: color_success }
                - button:
                    x: 237
                    width: 221
                    height: 102
                    radius: 18
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: remote.send_command
                          data:
                            entity_id: ${entity_tv_remote}
                            command: "KEY_PAUSE"
                    widgets:
                      - label: { text: "\U000F03E4", align: CENTER, text_font: mdi_font_45, text_color: color_text }
                - button:
                    x: 474
                    width: 221
                    height: 102
                    radius: 18
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: remote.send_command
                          data:
                            entity_id: ${entity_tv_remote}
                            command: "KEY_RETURN"
                    widgets:
                      - label: { text: "\U000F054C", align: LEFT_MID, x: 20, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Retour", align: LEFT_MID, x: 72, text_font: roboto_22, text_color: color_text }
                - button:
                    x: 711
                    width: 221
                    height: 102
                    radius: 18
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: remote.send_command
                          data:
                            entity_id: ${entity_tv_remote}
                            command: "KEY_HOME"
                    widgets:
                      - label: { text: "\U000F02DC", align: LEFT_MID, x: 20, text_font: mdi_font_45, text_color: color_text_dim }
                      - label: { text: "Accueil", align: LEFT_MID, x: 72, text_font: roboto_22, text_color: color_text }
                - button:
                    x: 948
                    width: 221
                    height: 102
                    radius: 18
                    styles: style_clim_btn
                    pressed:
                      bg_opa: 30%
                    on_short_click:
                      - homeassistant.service:
                          service: remote.send_command
                          data:
                            entity_id: ${entity_tv_remote}
                            command: "KEY_MUTE"
                    widgets:
                      - label: { text: "\U000F0581", align: CENTER, y: -12, text_font: mdi_font_45, text_color: color_warning }
                      - label: { text: "Muet", align: CENTER, y: 28, text_font: roboto_22, text_color: color_text }
