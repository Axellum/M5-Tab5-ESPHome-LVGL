# ═══════════════════════════════════════════════════════
# CARTE CLIMATISATION — Style modal_card premium
# Layout : Haut=Températures (Salon & Serre) | Centre/Bas=Cible cliquable +/-
# ═══════════════════════════════════════════════════════
obj:
  id: climate_card
  x: 855
  y: 125
  width: 413
  height: 180
  bg_color: 0x222222
  bg_opa: 100%
  border_width: 2
  border_color: 0x444444
  radius: 20
  scrollbar_mode: "OFF"
  pad_all: 0
  widgets:

    # ═══ HAUT : Températures pièces ═══
    - label: { id: icon_salon, text: "\U000F04B9", align: TOP_LEFT, x: 18, y: 12, text_font: mdi_font_45, text_color: color_text_dim }
    - label: { id: val_temp_salon, text: "-- °", align: TOP_LEFT, x: 70, y: 17, text_font: roboto_32_b, text_color: color_temp_max }
    # Serre (remplace l'humidité du salon)
    - label: { id: icon_serre, text: "\U000F002D", align: TOP_RIGHT, x: -130, y: 12, text_font: mdi_font_45, text_color: color_text_dim }
    - label: { id: current_serre, text: "-- °", align: TOP_RIGHT, x: -18, y: 17, text_font: roboto_32_b, text_color: color_temp_max }

    # ═══ CENTRE/BAS : Température cible (cliquable) ═══

    # Fond subtil zone cliquable
    - obj:
        align: BOTTOM_MID
        y: -20
        width: 170
        height: 68
        radius: 12
        styles: style_meteo_tab
        widgets:
          - label:
              id: clim_target
              text: ""
              align: CENTER
              x: 0
              text_font: roboto_55_b
              text_color: color_text

    # Bouton invisible pour ouvrir la popup
    - button:
        id: btn_clim_target_click
        align: BOTTOM_MID
        y: -20
        width: 170
        height: 68
        styles: style_invisible
        on_short_click:
          - lambda: |-
              lv_obj_clear_flag(id(clim_options_popup), LV_OBJ_FLAG_HIDDEN);
              lv_obj_move_foreground(id(clim_options_popup));

    # Bouton -
    - button:
        id: btn_clim_minus
        align: BOTTOM_MID
        x: -130
        y: -23
        width: 62
        height: 62
        radius: 12
        styles: style_clim_btn
        on_short_click:
          - homeassistant.service:
              service: climate.set_temperature
              data:
                entity_id: ${entity_climate_salon}
                temperature: !lambda "return id(clim_target_temp) - 0.5;"
        widgets:
          - label: { text: "\U000F0374", align: CENTER, text_font: mdi_font_56, text_color: color_text }

    # Bouton +
    - button:
        id: btn_clim_plus
        align: BOTTOM_MID
        x: 130
        y: -23
        width: 62
        height: 62
        radius: 12
        styles: style_clim_btn
        on_short_click:
          - homeassistant.service:
              service: climate.set_temperature
              data:
                entity_id: ${entity_climate_salon}
                temperature: !lambda "return id(clim_target_temp) + 0.5;"
        widgets:
          - label: { text: "\U000F0415", align: CENTER, text_font: mdi_font_56, text_color: color_text }
