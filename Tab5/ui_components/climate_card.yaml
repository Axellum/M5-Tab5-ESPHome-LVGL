# ═══════════════════════════════════════════════════════
# [AI-CONTEXT]
# @file climate_card.yaml
# @role Carte compacte clim toujours visible (dashboard principal). Layout :
#       Haut=Températures (Salon & Serre) | Centre/Bas=Cible cliquable +/-.
# @architecture_constraint `clim_target`/`current_serre`/`val_temp_salon` sont mis à jour
#                          par les services `tab5_maj_clim`/helpers C++ (tab5-api-logic.yaml,
#                          tab5-sensors-domotique.yaml) — jamais localement ici.
# @ai_instruction Les boutons +/- et le clic sur la cible dupliquent volontairement ceux de
#                 climate_popup.yaml (même service `climate.set_temperature`/ouverture popup) :
#                 duplication acceptée, chaque bouton ne fait qu'un appel de service en 1 ligne,
#                 pas de logique à factoriser.
# ═══════════════════════════════════════════════════════
obj:
  id: climate_card
  x: 855
  y: 125
  width: 413
  height: 180
  styles: style_meteo_card
  scrollbar_mode: "OFF"
  pad_all: 0
  widgets:

    # ═══ HAUT : Températures pièces ═══
    - label: { id: icon_salon, text: "\U000F04B9", align: TOP_LEFT, x: 18, y: 12, text_font: mdi_font_45, text_color: color_text_dim }
    - label: { id: val_temp_salon, text: "-- °", align: TOP_LEFT, x: 85, y: 17, text_font: roboto_32_b, text_color: color_temp_max }
    # Serre (remplace l'humidité du salon)
    - label: { id: icon_serre, text: "\U000F002D", align: TOP_RIGHT, x: -124, y: 12, text_font: mdi_font_45, text_color: color_text_dim }
    - label: { id: current_serre, text: "-- °", align: TOP_RIGHT, x: -18, y: 17, text_font: roboto_32_b, text_color: color_temp_max }

    # ═══ CENTRE/BAS : Température cible (cliquable) ═══

    # Fond subtil zone cliquable
    - obj:
        align: BOTTOM_MID
        y: -20
        width: 170
        height: 68
        radius: 12
        styles: style_meteo_tab
        widgets:
          - label:
              id: clim_target
              text: ""
              align: CENTER
              x: 0
              text_font: roboto_55_b
              text_color: color_text

    # Bouton invisible pour ouvrir la popup
    - button:
        id: btn_clim_target_click
        align: BOTTOM_MID
        y: -20
        width: 170
        height: 68
        styles: style_invisible
        on_short_click:
          - lambda: |-
              lv_obj_clear_flag(id(clim_options_popup), LV_OBJ_FLAG_HIDDEN);
              lv_obj_move_foreground(id(clim_options_popup));

    # Bouton -
    - button:
        id: btn_clim_minus
        align: BOTTOM_MID
        x: -130
        y: -23
        width: 62
        height: 62
        radius: 12
        styles: style_clim_btn
        pressed:
          bg_opa: 30%
        on_short_click:
          - homeassistant.service:
              service: climate.set_temperature
              data:
                entity_id: ${entity_climate_salon}
                # Si clim éteinte, set_temperature seul ne l'allume pas (Daikin) → forcer cool
                hvac_mode: !lambda 'return (id(clim_hvac_mode) == "off" || id(clim_hvac_mode).empty()) ? std::string("cool") : id(clim_hvac_mode);'
                temperature: !lambda "return to_string(id(clim_target_temp) - 0.5);"
        widgets:
          - label: { text: "\U000F0374", align: CENTER, text_font: mdi_font_56, text_color: color_text }

    # Bouton +
    - button:
        id: btn_clim_plus
        align: BOTTOM_MID
        x: 130
        y: -23
        width: 62
        height: 62
        radius: 12
        styles: style_clim_btn
        pressed:
          bg_opa: 30%
        on_short_click:
          - homeassistant.service:
              service: climate.set_temperature
              data:
                entity_id: ${entity_climate_salon}
                hvac_mode: !lambda 'return (id(clim_hvac_mode) == "off" || id(clim_hvac_mode).empty()) ? std::string("cool") : id(clim_hvac_mode);'
                temperature: !lambda "return to_string(id(clim_target_temp) + 0.5);"
        widgets:
          - label: { text: "\U000F0415", align: CENTER, text_font: mdi_font_56, text_color: color_text }
