obj:

  id: layer_forecast_1

  x: 0

  y: 430

  width: 1280

  height: 290

  styles: style_transparent
  scrollbar_mode: "OFF"
  hidden: false

  widgets:

    # Card 0

    - obj:

        x: 25

        y: 0

        width: 230

        height: 280
        styles: style_meteo_card

        widgets:

          - label: { id: j0_day, text: "Journée", align: TOP_MID, y: 0, text_font: roboto_36_b, text_color: color_text }

          - label: { id: icon_card_pc, text: "\U000F07C0", x: 2, y: 2, align: TOP_LEFT, text_font: mdi_font_32, text_color: color_text_dim }

          - label: { id: j0_icon_layer1, text: "", hidden: true, align: CENTER, y: 0 , text_font: font_meteo_card, text_color: color_text }

          - label: { id: j0_icon_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_card, text_color: color_text }

          - label: { id: j0_icon_layer3, text: "", hidden: true, align: CENTER, y: 0 , text_font: mdi_font_32, text_color: 0x555555 }
          - button:

              id: btn_j0_action

              align: CENTER

              y: 0

              width: 130

              height: 130

              styles: style_invisible

              on_short_click:

                - homeassistant.service:

                    service: script.allumer_pc_tv

          - label: { id: j0_max, text: "-- / ", align: BOTTOM_MID, x: -25, y: -1, text_font: roboto_36_b, text_color: color_temp_max }

          - label: { id: j0_min, text: "-- °C", align: BOTTOM_MID, x: 35, y: -1, text_font: roboto_36_b, text_color: color_temp_min }

          - button:

              id: btn_tj0_toggle

              align: BOTTOM_MID

              x: 0

              y: 0

              width: 200

              height: 60

              bg_opa: 0

              border_width: 0

              outline_width: 0

              shadow_width: 0

              on_short_click:

                - lambda: |-

                    if(!cal_toggled[0]) {

                       lv_label_set_text(id(j0_day), cal_heures[0].c_str());

                       lv_obj_add_flag(id(j0_min), LV_OBJ_FLAG_HIDDEN);

                       lv_obj_add_flag(id(j0_max), LV_OBJ_FLAG_HIDDEN);

                       cal_toggled[0] = true;

                    } else {

                       lv_label_set_text(id(j0_day), cal_jour_nom[0].c_str());

                       lv_obj_clear_flag(id(j0_min), LV_OBJ_FLAG_HIDDEN);

                       lv_obj_clear_flag(id(j0_max), LV_OBJ_FLAG_HIDDEN);

                       cal_toggled[0] = false;

                    }

    # Card 1

    - obj:

        x: 275

        y: 0

        width: 230

        height: 280
        styles: style_meteo_card

        widgets:

          - label: { id: j1_day, text: "Demain", align: TOP_MID, y: 0, text_font: roboto_36_b, text_color: color_text }

          - label: { id: icon_card_shutter1, text: "\U000F111E", x: 2, y: 2, align: TOP_LEFT, text_font: mdi_font_32, text_color: color_text_dim }

          - label: { id: icon_card_shutter_arrow, text: "\U000F005D", x: -2, y: 2, align: TOP_RIGHT, text_font: mdi_font_32, text_color: color_text_dim }

          - button:

              id: btn_j1_dir

              x: 0

              y: 0

              width: 70

              height: 40

              styles: style_invisible

              pad_all: 0

              on_short_click:

                - lambda: |-

                    id(volet_target_open) = !id(volet_target_open);

                    if (!id(volet_en_mouvement)) {

                      if (id(volet_target_open)) {

                        lv_label_set_text(id(icon_card_shutter_arrow), "\U000F005D");

                      } else {

                        lv_label_set_text(id(icon_card_shutter_arrow), "\U000F0045");

                      }

                    }

          - label: { id: j1_icon_layer1, text: "", hidden: true, align: CENTER, y: 0 , text_font: font_meteo_card, text_color: color_text }

          - label: { id: j1_icon_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_card, text_color: color_text }

          - label: { id: j1_icon_layer3, text: "", hidden: true, align: CENTER, y: 0 , text_font: mdi_font_32, text_color: 0x555555 }
          - button:

              id: btn_j1_action

              align: CENTER

              y: 0

              width: 130

              height: 130

              styles: style_invisible

              on_short_click:

                - if:

                    condition:

                      lambda: 'return id(volet_en_mouvement);'

                    then:

                      - homeassistant.service:

                          service: script.tab5_volet_action

                          data:

                            action: "stop"

                    else:

                      - if:

                          condition:

                            lambda: 'return id(volet_target_open);'

                          then:

                            - homeassistant.service:

                                service: script.tab5_volet_action

                                data:

                                  action: "open"

                          else:

                            - homeassistant.service:

                                service: script.tab5_volet_action

                                data:

                                  action: "close"

          - label: { id: j1_max, text: "-- / ", align: BOTTOM_MID, x: -25, y: -1, text_font: roboto_36_b, text_color: color_temp_max }

          - label: { id: j1_min, text: "-- °C", align: BOTTOM_MID, x: 35, y: -1, text_font: roboto_36_b, text_color: color_temp_min }

          - button:

              id: btn_tj1_toggle

              align: BOTTOM_MID

              x: 0

              y: 0

              width: 200

              height: 60

              bg_opa: 0

              border_width: 0

              outline_width: 0

              shadow_width: 0

              on_short_click:

                - lambda: |-

                    if(!cal_toggled[1]) {

                       lv_label_set_text(id(j1_day), cal_heures[1].c_str());

                       lv_obj_add_flag(id(j1_min), LV_OBJ_FLAG_HIDDEN);

                       lv_obj_add_flag(id(j1_max), LV_OBJ_FLAG_HIDDEN);

                       cal_toggled[1] = true;

                    } else {

                       lv_label_set_text(id(j1_day), cal_jour_nom[1].c_str());

                       lv_obj_clear_flag(id(j1_min), LV_OBJ_FLAG_HIDDEN);

                       lv_obj_clear_flag(id(j1_max), LV_OBJ_FLAG_HIDDEN);

                       cal_toggled[1] = false;

                    }

