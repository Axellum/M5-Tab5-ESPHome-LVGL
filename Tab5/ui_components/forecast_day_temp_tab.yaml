# [AI-CONTEXT] Template paramétré (!include+vars), réutilisé 5x par forecast_daily.yaml
# (j0..j4). Vars: idx, toggle_width (largeur du bouton toggle, varie car le texte
# tmax/tmin change de largeur). Tap min/max → planning/horaires du jour dans la
# carte centrale (6s) via get_day_planning_display_text() — index jour =
# (forecast_page_index - 2) * 5 + idx (aligné sur refresh_daily_forecast).
obj:
  align: BOTTOM_MID
  y: 0
  width: 140
  height: 51
  border_width: 0
  styles: style_meteo_tab
  scrollbar_mode: "OFF"
  widgets:
    - label: { id: "j${idx}_max", text: "-- / ", align: BOTTOM_MID, x: -25, y: -7, text_font: roboto_32_b, text_color: color_temp_max }
    - label: { id: "j${idx}_min", text: "-- °", align: BOTTOM_MID, x: 35, y: -7, text_font: roboto_32_b, text_color: color_temp_min }
    - button:
        id: "btn_tj${idx}_toggle"
        align: CENTER
        y: 0
        width: ${toggle_width}
        height: 51
        bg_opa: 0
        border_width: 0
        outline_width: 0
        shadow_width: 0
        on_short_click:
          - lambda: |-
              int page = id(forecast_page_index);
              if (page < 2) page = 2;
              if (page > 4) page = 4;
              int jour = (page - 2) * 5 + ${idx};
              id(temp_planning_text) = get_day_planning_display_text(jour);
          - script.execute: tab5_show_planning_temp
