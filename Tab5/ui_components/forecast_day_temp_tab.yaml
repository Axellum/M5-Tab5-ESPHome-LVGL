# [AI-CONTEXT] Template paramétré (!include+vars), réutilisé 5x par forecast_daily.yaml
# (j0..j4). Vars: idx, toggle_width (largeur du bouton toggle, varie car le texte
# tmax/tmin change de largeur). Tap min/max → planning/horaires du jour dans la
# carte centrale (6s) via show_temporary_planning() — index jour =
# (forecast_page_index - 2) * 5 + idx (aligné sur refresh_daily_forecast).
obj:
  align: BOTTOM_MID
  y: 0
  width: 140
  height: 51
  border_width: 0
  styles: style_meteo_tab
  scrollbar_mode: "OFF"
  widgets:
    - label: { id: "j${idx}_max", text: "-- / ", align: BOTTOM_MID, x: -25, y: -7, text_font: roboto_32_b, text_color: color_temp_max }
    - label: { id: "j${idx}_min", text: "-- °", align: BOTTOM_MID, x: 35, y: -7, text_font: roboto_32_b, text_color: color_temp_min }
    - button:
        id: "btn_tj${idx}_toggle"
        align: CENTER
        y: 0
        width: ${toggle_width}
        height: 51
        bg_opa: 0
        border_width: 0
        outline_width: 0
        shadow_width: 0
        on_short_click:
          - lambda: |-
              int page = id(forecast_page_index);
              if (page < 2) page = 2;
              if (page > 4) page = 4;
              int jour = (page - 2) * 5 + ${idx};
              show_temporary_planning(jour, id(lbl_planning_text), id(planning_wrapper), id(alert_container), id(rain_wrapper),
                                      id(info_wrapper), id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3),
                                      id(page_title_wrapper), id(lbl_page_title), id(forecast_page_index),
                                      id(plan_ligne_1), id(plan_ligne_2), id(is_showing_temp_planning), id(current_central_panel));
