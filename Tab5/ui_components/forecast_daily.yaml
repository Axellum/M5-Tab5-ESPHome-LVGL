# ============================================================================
# [AI-CONTEXT]
# @file forecast_daily.yaml
# @role 5 cartes prévisions journalières (fenêtre glissante sur 15 jours, cf.
#       `cal_jours_data[15]`/`refresh_daily_forecast()` dans tab5_custom.cpp). Visible quand
#       `forecast_page_index` (tab5-globals.yaml) est >= 2, piloté par `handle_swipe_gesture()`.
# @architecture_constraint Onglet Titre (`forecast_day_title_tab.yaml`) et Onglet Température
#                          (`forecast_day_temp_tab.yaml`) sont factorisés (#T164, même motif x5).
#                          Le "Corps Sombre" (icônes météo + bouton action j0-j4) N'EST PAS
#                          factorisé : chaque carte a une action Home Assistant DIFFÉRENTE
#                          (PC bureau / volet serre / lumière chambre / lumière salon / LEDs
#                          bureau) — décision explicite (#T164, cf. etat_tab5.md), pas un oubli.
# @ai_instruction Les icônes météo (`jN_icon_layer1/2/3`) sont mises à jour par
#                 `update_meteo_icon()`/`refresh_daily_forecast()` (tab5_custom.cpp) — ne jamais
#                 leur assigner de texte/couleur directement ici.
# ============================================================================
obj:
  id: layer_forecast_daily
  x: 0
  y: 430
  width: 1280
  height: 290
  styles: style_transparent
  scrollbar_mode: "OFF"
  hidden: false

  widgets:
    # Card 0
    - obj:
        x: 25
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Corps Sombre (recouvre les onglets)
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              scrollbar_mode: "OFF"
              widgets:
                - label: { id: j0_icon_layer1, text: "", hidden: true, align: CENTER, y: 0 , text_font: font_meteo_card, text_color: color_text }
                - label: { id: j0_icon_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_card, text_color: color_text }
                - label: { id: j0_icon_layer3, text: "", hidden: true, align: CENTER, y: 0 , text_font: mdi_font_32, text_color: color_icon_muted }
                - button:
                    id: btn_j0_action
                    align: CENTER
                    y: 0
                    width: 140
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - homeassistant.service:
                          service: script.allumer_pc_tv

          # Onglet Titre + Onglet Température : factorises (#T164), meme motif sur les 5 cartes
          - !include { file: forecast_day_title_tab.yaml, vars: { idx: "0", day_label: "Journee" } }
          - !include { file: forecast_day_temp_tab.yaml, vars: { idx: "0", toggle_width: "140" } }
          # Icône latérale gauche (épaule)
          - label: { id: icon_card_pc, text: "\U000F07C0", align: TOP_LEFT, x: 10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
    # Card 1
    - obj:
        x: 275
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Corps Sombre
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              scrollbar_mode: "OFF"
              widgets:
                - label: { id: j1_icon_layer1, text: "", hidden: true, align: CENTER, y: 0 , text_font: font_meteo_card, text_color: color_text }
                - label: { id: j1_icon_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_card, text_color: color_text }
                - label: { id: j1_icon_layer3, text: "", hidden: true, align: CENTER, y: 0 , text_font: mdi_font_32, text_color: color_icon_muted }
                - button:
                    id: btn_j1_action
                    align: CENTER
                    y: 0
                    width: 140
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - if:
                          condition:
                            lambda: 'return id(volet_en_mouvement);'
                          then:
                            - script.execute: tab5_volet_end_movement
                            - homeassistant.service:
                                service: script.tab5_volet_action
                                data:
                                  action: "stop"
                          else:
                            - if:
                                condition:
                                  lambda: 'return id(volet_target_open);'
                                then:
                                  - homeassistant.service:
                                      service: script.tab5_volet_action
                                      data:
                                        action: "open"
                                else:
                                  - homeassistant.service:
                                      service: script.tab5_volet_action
                                      data:
                                        action: "close"

          # Icônes latérales (épaules)
          - label: { id: icon_card_shutter1, text: "\U000F111E", align: TOP_LEFT, x: 10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
          - label: { id: icon_card_shutter_arrow, text: "\U000F005D", align: TOP_RIGHT, x: -10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
          # Onglet Titre + Onglet Température : factorises (#T164), meme motif sur les 5 cartes
          - !include { file: forecast_day_title_tab.yaml, vars: { idx: "1", day_label: "Demain" } }
          - !include { file: forecast_day_temp_tab.yaml, vars: { idx: "1", toggle_width: "130" } }
          - button:
              id: btn_j1_dir
              align: TOP_MID
              x: 0
              y: 0
              width: 230
              height: 60
              styles: style_invisible
              pad_all: 0
              on_short_click:
                - lambda: |-
                    id(volet_target_open) = !id(volet_target_open);
                    if (!id(volet_en_mouvement)) {
                      if (id(volet_target_open)) {
                        lv_label_set_text(id(icon_card_shutter_arrow), "\U000F005D");
                      } else {
                        lv_label_set_text(id(icon_card_shutter_arrow), "\U000F0045");
                      }
                    }
    # Card 2
    - obj:
        x: 525
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Corps Sombre
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              scrollbar_mode: "OFF"
              widgets:
                - label: { id: j2_icon_layer1, text: "", hidden: true, align: CENTER, y: 0 , text_font: font_meteo_card, text_color: color_text }
                - label: { id: j2_icon_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_card, text_color: color_text }
                - label: { id: j2_icon_layer3, text: "", hidden: true, align: CENTER, y: 0 , text_font: mdi_font_32, text_color: color_icon_muted }
                - button:
                    id: btn_j2_action
                    align: CENTER
                    y: 0
                    width: 140
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: ${entity_light_chambre}
                    on_long_press:
                      # Synchro complète (titre, sélecteur, power, arc) déléguée au script partagé
                      - script.execute: { id: tab5_light_popup_show, light_idx: 0 }

          # Icônes latérales (épaules)
          - label: { id: icon_card_lit_j2, text: "\U000F02E3", align: TOP_LEFT, x: 10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
          - label: { id: icon_card_light_j2, text: "\U000F0335", align: TOP_RIGHT, x: -10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
          # Onglet Titre + Onglet Température : factorises (#T164), meme motif sur les 5 cartes
          - !include { file: forecast_day_title_tab.yaml, vars: { idx: "2", day_label: "2 Jours" } }
          - !include { file: forecast_day_temp_tab.yaml, vars: { idx: "2", toggle_width: "130" } }
    # Card 3
    - obj:
        x: 775
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Corps Sombre
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              scrollbar_mode: "OFF"
              widgets:
                - label: { id: j3_icon_layer1, text: "", hidden: true, align: CENTER, y: 0 , text_font: font_meteo_card, text_color: color_text }
                - label: { id: j3_icon_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_card, text_color: color_text }
                - label: { id: j3_icon_layer3, text: "", hidden: true, align: CENTER, y: 0 , text_font: mdi_font_32, text_color: color_icon_muted }
                - button:
                    id: btn_j3_action
                    align: CENTER
                    y: 0
                    width: 140
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: ${entity_light_salon}
                    on_long_press:
                      - script.execute: { id: tab5_light_popup_show, light_idx: 1 }

          # Icônes latérales (épaules)
          - label: { id: icon_card_salon_j3, text: "\U000F04B9", align: TOP_LEFT, x: 10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
          - label: { id: icon_card_light_j3, text: "\U000F0335", align: TOP_RIGHT, x: -10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
          # Onglet Titre + Onglet Température : factorises (#T164), meme motif sur les 5 cartes
          - !include { file: forecast_day_title_tab.yaml, vars: { idx: "3", day_label: "3 Jours" } }
          - !include { file: forecast_day_temp_tab.yaml, vars: { idx: "3", toggle_width: "130" } }
    # Card 4
    - obj:
        x: 1025
        y: ${meteo_cell_y}
        width: ${meteo_cell_width}
        height: ${meteo_cell_height}
        styles: style_transparent
        scrollbar_mode: "OFF"
        widgets:
          # Corps Sombre
          - obj:
              y: 35
              width: 230
              height: 205
              styles: style_meteo_card
              scrollbar_mode: "OFF"
              widgets:
                - label: { id: j4_icon_layer1, text: "", hidden: true, align: CENTER, y: 0 , text_font: font_meteo_card, text_color: color_text }
                - label: { id: j4_icon_layer2, text: "", hidden: true, align: CENTER, y: 0, text_font: font_meteo_card, text_color: color_text }
                - label: { id: j4_icon_layer3, text: "", hidden: true, align: CENTER, y: 0 , text_font: mdi_font_32, text_color: color_icon_muted }
                - button:
                    id: btn_j4_action
                    align: CENTER
                    y: 0
                    width: 130
                    height: 130
                    styles: style_invisible
                    on_short_click:
                      - homeassistant.service:
                          service: script.allumer_leds
                    on_long_press:
                      - script.execute: { id: tab5_light_popup_show, light_idx: 2 }
          # Icônes latérales (épaules)
          - label: { id: icon_card_led_j4, text: "\U000F1051", align: TOP_LEFT, x: 10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
          - label: { id: icon_card_light_j4, text: "\U000F0335", align: TOP_RIGHT, x: -10, y: 9, text_font: mdi_font_32, text_color: color_text_dim }
          # Onglet Titre + Onglet Température : factorises (#T164), meme motif sur les 5 cartes
          - !include { file: forecast_day_title_tab.yaml, vars: { idx: "4", day_label: "4 Jours" } }
          - !include { file: forecast_day_temp_tab.yaml, vars: { idx: "4", toggle_width: "130" } }
