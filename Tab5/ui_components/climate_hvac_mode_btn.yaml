# [AI-CONTEXT] Template paramétré (!include+vars), réutilisé 4x par climate_popup.yaml
# (cool/heat/dry/fan — pile flex de la carte MODE, 342×88). Vars: suffix, hvac_mode, icon,
# label_text. Ne pas dupliquer manuellement — ajouter un !include supplémentaire pour un
# nouveau mode HVAC. L'icône popup_icon_clim_${suffix} est recolorée par tab5_maj_clim.
button:
  id: popup_btn_clim_${suffix}
  width: 342
  height: 88
  radius: 18
  styles: style_clim_btn
  pressed:
    bg_opa: 30%
  on_short_click:
    - homeassistant.service:
        service: climate.set_hvac_mode
        data:
          entity_id: ${entity_climate_salon}
          hvac_mode: "${hvac_mode}"
  widgets:
    - label: { id: "popup_icon_clim_${suffix}", text: "${icon}", align: LEFT_MID, x: 20, text_font: mdi_font_45, text_color: color_text_dim }
    - label: { text: "${label_text}", align: LEFT_MID, x: 88, text_font: roboto_32_b, text_color: color_text }
