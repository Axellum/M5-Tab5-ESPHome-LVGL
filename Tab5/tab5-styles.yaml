  style_definitions:
    - id: style_card
      bg_color: color_card_bg
      border_width: 2
      border_color: color_border
      radius: 0
    - id: style_meteo_card
      bg_opa: 0
      border_width: 0
      border_color: color_border
      radius: 0
      pad_all: 0
      scrollbar_mode: "OFF"
    - id: style_transparent
      bg_opa: 0
      border_width: 0
      pad_all: 0
      scrollbar_mode: "OFF"
    - id: style_invisible
      bg_opa: 0
      border_width: 0
      shadow_width: 0
      outline_width: 0
