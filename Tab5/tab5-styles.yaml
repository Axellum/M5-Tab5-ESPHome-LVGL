# =============================================================================
# LVGL â Glassmorphism "Slate"
# =============================================================================
lvgl:
  rotation: 270
  color_depth: 16
  byte_order: little_endian
  buffer_size: 100%
  bg_color: color_bg
  style_definitions:
    # --- Panneau structurel plein-cadre ---
    # NB : radius volontairement CONSERVE a 0 (ce style sert de panneau plein-bord ;
    #      l'arrondir laisserait apparaitre le fond aux coins de l'ecran).
    #      On apporte la profondeur par un degrade vertical + liserĂ© fin.
    - id: style_card
      bg_color: color_glass_hi
      bg_grad_color: color_glass_lo
      bg_grad_dir: VER
      bg_main_stop: 0
      bg_grad_stop: 255
      bg_opa: 100%
      border_width: 1
      border_color: color_glass_rim
      border_opa: 22%
      radius: 0

    # --- Carte meteo / tuiles dashboard ---
    # ESSAI C 16/07 : mĂȘme dĂ©coration que les boutons Domo (style_clim_btn) â
    # fond 58%, bordure 1px/35%, radius 18. Couvre horloge, clim, bandeau central,
    # tuiles mĂ©tĂ©o horaires/jours + page HA. pad/scrollbar conservĂ©s (conteneurs).
    # Rollback : docs/essais_design/tab5-styles_avant_meteo_comme_domo.yaml
    - id: style_meteo_card
      bg_color: color_glass_hi
      bg_grad_color: color_glass_lo
      bg_grad_dir: VER
      bg_opa: 58%
      border_width: 1
      border_color: color_glass_rim
      border_opa: 35%
      radius: 18
      shadow_width: 0
      outline_width: 0
      pad_all: 0
      scrollbar_mode: "OFF"

    # --- Conteneurs transparents (fonctionnel : inchanges) ---
    - id: style_transparent
      bg_opa: 0
      border_width: 0
      pad_all: 0
      scrollbar_mode: "OFF"
    - id: style_invisible
      bg_opa: 0
      border_width: 0
      shadow_width: 0
      outline_width: 0

    # --- Bouton climatisation : pastille de verre ---
    - id: style_clim_btn
      bg_color: color_glass_hi
      bg_grad_color: color_glass_lo
      bg_grad_dir: VER
      bg_opa: 58%
      border_width: 1
      border_color: color_glass_rim
      border_opa: 35%
      radius: 18
      shadow_width: 0
      outline_width: 0

    # --- Voile modal (scrim sombre, focus accru) ---
    - id: style_modal_overlay
      bg_color: color_modal_scrim
      bg_opa: 72%
      border_width: 0

    # --- Carte modale "verre" flottante ---
    - id: style_modal_card
      bg_color: color_glass_hi
      bg_grad_color: color_glass_lo
      bg_grad_dir: VER
      bg_main_stop: 20
      bg_grad_stop: 245
      bg_opa: 88%
      border_width: 2
      border_color: color_glass_rim
      border_opa: 60%
      radius: 24
      shadow_width: 0

    # --- Onglet meteo "solide" (titre) ---
    # MĂȘme design verre que style_clim_btn (Domo/Discu/HA/Sys/TV) â
    # titres jours + min/max + onglets horaires/switches.
    - id: style_meteo_tab
      bg_color: color_glass_hi
      bg_grad_color: color_glass_lo
      bg_grad_dir: VER
      bg_opa: 58%
      border_width: 1
      border_color: color_glass_rim
      border_opa: 35%
      radius: 18
      shadow_width: 0
      outline_width: 0
      pad_all: 0
      scrollbar_mode: "OFF"

    # --- NOUVEAU : carte de verre generique (reutilisable) ---
    - id: style_glass_card
      bg_color: color_glass_hi
      bg_grad_color: color_glass_lo
      bg_grad_dir: VER
      bg_main_stop: 25
      bg_grad_stop: 240
      bg_opa: 80%
      border_width: 2
      border_color: color_glass_rim
      border_opa: 55%
      radius: 20
      shadow_width: 0
      pad_all: 0
      scrollbar_mode: "OFF"

    # --- NOUVEAU : pastille / chip d'accent (cyan) ---
    - id: style_pill_accent
      bg_color: color_accent
      bg_opa: 18%
      border_width: 1
      border_color: color_accent
      border_opa: 70%
      radius: 999
      pad_all: 0

