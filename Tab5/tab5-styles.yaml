# =============================================================================
# THEME â "Dark Mode Slate" (Glassmorphism)
# -----------------------------------------------------------------------------
# Base ardoise (Tailwind Slate) + accents HSL vibrants (cyan / violet / emeraude).
# L'effet "verre depoli" est simule sur ESP32-P4 (pas de backdrop-blur materiel) :
#   - surfaces semi-transparentes (bg_opa)
#   - degrade vertical (haut clair -> bas sombre) = reflet de verre
#   - liserĂ© fin lumineux (border_opa) = arĂȘte de verre
#   - ombre portee douce = profondeur / flottement
# IMPORTANT : tous les `id:` couleurs et styles existants sont CONSERVES
#             (le YAML HMI principal les reference par nom). Valeurs mises a jour
#             + nouveaux tokens ajoutes en fin de section.
# =============================================================================
color:
  # --- Surfaces ardoise (Slate) ---
  - id: color_bg
    hex: "0B1120"          # Ardoise profonde (fond application)
  - id: color_card_bg
    hex: "1B2536"          # Carte opaque (fallback non-verre)
  - id: color_border
    hex: "5B6B85"          # ArĂȘte ardoise claire (utiliser avec border_opa)
  - id: color_text
    hex: "F1F5F9"          # Blanc ardoise doux (slate-100)
  - id: color_text_dim
    hex: "94A3B8"          # Texte secondaire (slate-400)
  - id: color_temp_max
    hex: "F87171"          # Chaud (red-400)
  - id: color_temp_min
    hex: "38BDF8"          # Froid (sky-400)
  - id: color_bar_active
    hex: "64748B"          # slate-500
  - id: color_bar_inactive
    hex: "334155"          # slate-700
  - id: color_orange_vif
    hex: "FB923C"          # orange-400 vibrant
  # --- Couleurs sĂ©mantiques (Ă©tats) â versions HSL vibrantes ---
  - id: color_success
    hex: "34D399"          # emerald-400
  - id: color_warning
    hex: "FBBF24"          # amber-400
  - id: color_error
    hex: "FB7185"          # rose-400
  - id: color_info
    hex: "38BDF8"          # sky-400
  - id: color_gold
    hex: "FCD34D"          # amber-300
  - id: color_inactive
    hex: "334155"          # slate-700
  # --- Couleurs console ---
  - id: color_console_bg
    hex: "0A0E16"
  - id: color_console_border
    hex: "243047"
  - id: color_console_label
    hex: "8595AD"
  - id: color_reboot
    hex: "F43F5E"          # rose-500 (danger)
  # --- NOUVEAUX tokens "Slate Glass" (accents + matiere verre) ---
  - id: color_accent
    hex: "22D3EE"          # cyan-400 : accent primaire / halo
  - id: color_accent_alt
    hex: "A78BFA"          # violet-400 : accent secondaire
  - id: color_glass_hi
    hex: "2C3A52"          # Haut du degrade verre (reflet)
  - id: color_glass_lo
    hex: "131C2C"          # Bas du degrade verre (ombre interne)
  - id: color_glass_rim
    hex: "93A3BC"          # LiserĂ© lumineux (arĂȘte de verre)
  - id: color_shadow
    hex: "000000"          # Ombre portee
  - id: color_console_value
    hex: "FFFFFF"          # Valeurs numeriques console
  - id: color_icon_muted
    hex: "555555"          # Icone desactivee / placeholder
  - id: color_arc_track
    hex: "2A2D35"          # Fond arcslider clim / lumiere
  - id: color_modal_scrim
    hex: "05080F"          # Voile modal sombre

