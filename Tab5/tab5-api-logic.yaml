    - service: tab5_maj_pluie_1h
      variables:
        index_5mn: string
        intensite: string
      then:
        - lambda: |-
            if (id(rb_0_in) == nullptr) return;
            int idx = atoi(index_5mn.c_str());

            uint32_t c_empty = 0x4A596E;
            uint32_t c_faible = 0x81D4FA;      // Bleu clair
            uint32_t c_modere = 0x29B6F6;      // Bleu moyen
            uint32_t c_forte = 0x0277BD;       // Bleu foncé
            uint32_t c_tres_forte = 0x01579B;  // Bleu très foncé

            uint32_t c = c_empty;
            int h = 0;

            if (intensite == "Pluie faible") { c = c_faible; h = 13; } // ~1/4 hauteur
            else if (intensite == "Pluie modérée") { c = c_modere; h = 25; } // 1/2 hauteur
            else if (intensite == "Pluie forte") { c = c_forte; h = 38; } // 3/4 hauteur
            else if (intensite == "Pluie très forte" || intensite == "Pluie trés forte") { c = c_tres_forte; h = 50; } // hauteur max

            lv_obj_t* target = NULL;

            switch(idx) {
              case 0: target = id(rb_0_in); break;
              case 1: target = id(rb_1_in); break;
              case 2: target = id(rb_2_in); break;
              case 3: target = id(rb_3_in); break;
              case 4: target = id(rb_4_in); break;
              case 5: target = id(rb_5_in); break;
              case 6: target = id(rb_6_in); break;
              case 7: target = id(rb_7_in); break;
              case 8: target = id(rb_8_in); break;
            }

            if(target != NULL) {
              lv_obj_set_style_bg_color(target, lv_color_hex(c), LV_PART_MAIN);
              lv_obj_set_height(target, h);
            }
            
            bool is_raining = false;
            lv_obj_t* targets[] = {id(rb_0_in), id(rb_1_in), id(rb_2_in), id(rb_3_in), id(rb_4_in), id(rb_5_in), id(rb_6_in), id(rb_7_in), id(rb_8_in)};
            for(int i=0; i<9; i++) {
               if (lv_obj_get_height(targets[i]) > 0) is_raining = true;
            }
            id(has_rain) = is_raining;

