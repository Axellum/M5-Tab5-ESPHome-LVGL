# ============================================================================
# [AI-CONTEXT]
# @file tab5-api-logic.yaml
# @role Contrat API avec Home Assistant (api: services:).
# @payload_contract Chaque service tab5_maj_* reçoit un payload d'une automation HA et doit
#                   appeler une fonction de tab5_custom.cpp pour traiter la donnée.
# @ui_mapping Les services mettent à jour l'UI en cascade via les fonctions C++.
# @ai_instruction Ne change pas les noms des services sans mettre à jour les automations 
#                 HomeAssistant_Config/automations_tab5.yaml. Ne mets pas de logique LVGL directe ici.
# ============================================================================
api:

  encryption:

    key: !secret api_encryption_key

  # [Audit F-04] 0s = jamais de reboot si HA injoignable → état "zombie"
  # déconnecté indéfiniment. 15min force un redémarrage propre après perte
  # durable de la connexion API (sans gêner les MAJ courtes de HA).
  reboot_timeout: 15min

  services:

    - service: tab5_maj_previsions_heures_bulk
      variables:
        payload: string
      then:
        - lambda: |-
            if (id(h4_time) == nullptr) return;
            parse_and_update_heures_bulk(payload);
            WeatherHourSlot slots[] = {
                {id(h4_time), id(h4_temp), id(h4_prob), id(h4_icon_layer1), id(h4_icon_layer2)},
                {id(h3_time), id(h3_temp), id(h3_prob), id(h3_icon_layer1), id(h3_icon_layer2)},
                {id(h2_time), id(h2_temp), id(h2_prob), id(h2_icon_layer1), id(h2_icon_layer2)},
                {id(h1_time), id(h1_temp), id(h1_prob), id(h1_icon_layer1), id(h1_icon_layer2)},
                {id(h0_time), id(h0_temp), id(h0_prob), id(h0_icon_layer1), id(h0_icon_layer2)}
            };
            int fp = id(forecast_page_index);
            int hourly_pi = (fp < 2) ? (1 - fp) : 0;
            refresh_hourly_forecast(slots, hourly_pi, id(font_meteo_main), id(font_meteo_card), id(font_meteo_main_small), id(font_meteo_card_small));

    - service: tab5_maj_previsions_jours_bulk
      variables:
        payload: string
      then:
        - lambda: |-
            if (id(j0_day) == nullptr) return;
            parse_and_update_jours_bulk(payload);
            WeatherDaySlot slots[] = {
                {id(j0_day), id(j0_max), id(j0_min), id(j0_icon_layer1), id(j0_icon_layer2), id(btn_j0_action), id(icon_card_pc), nullptr, nullptr},
                {id(j1_day), id(j1_max), id(j1_min), id(j1_icon_layer1), id(j1_icon_layer2), id(btn_j1_action), id(icon_card_shutter1), id(icon_card_shutter_arrow), id(btn_j1_dir)},
                {id(j2_day), id(j2_max), id(j2_min), id(j2_icon_layer1), id(j2_icon_layer2), id(btn_j2_action), id(icon_card_lit_j2), id(icon_card_light_j2), nullptr},
                {id(j3_day), id(j3_max), id(j3_min), id(j3_icon_layer1), id(j3_icon_layer2), id(btn_j3_action), id(icon_card_salon_j3), id(icon_card_light_j3), nullptr},
                {id(j4_day), id(j4_max), id(j4_min), id(j4_icon_layer1), id(j4_icon_layer2), id(btn_j4_action), id(icon_card_led_j4), id(icon_card_light_j4), nullptr}
            };
            int fp = id(forecast_page_index);
            int daily_pi = (fp >= 2) ? (fp - 2) : 0;
            refresh_daily_forecast(slots, daily_pi, id(font_meteo_main), id(font_meteo_card), id(font_meteo_main_small), id(font_meteo_card_small));

    - service: tab5_maj_volet_etat

      variables:

        etat_physique: string

      then:

        - lambda: |-

            if (id(icon_card_shutter_arrow) == nullptr) return;

            if (etat_physique == "En_mouvement") {

              id(volet_en_mouvement) = true;

              lv_label_set_text(id(icon_card_shutter_arrow), "\U000F03E4");

              lv_obj_set_style_text_color(id(icon_card_shutter_arrow), lv_color_hex(UIColor::INFO), LV_PART_MAIN);

              if (id(icon_sw1) != nullptr && id(lbl_sw1_state) != nullptr) {
                lv_obj_set_style_text_color(id(icon_sw1), lv_color_hex(UIColor::INFO), LV_PART_MAIN);
                lv_label_set_text(id(lbl_sw1_state), "Mouvement");
                lv_obj_set_style_text_color(id(lbl_sw1_state), lv_color_hex(UIColor::INFO), LV_PART_MAIN);
              }

            } else {

              id(volet_en_mouvement) = false;

              if (id(volet_target_open)) {

                lv_label_set_text(id(icon_card_shutter_arrow), "\U000F005D");

              } else {

                lv_label_set_text(id(icon_card_shutter_arrow), "\U000F0045");

              }

              lv_obj_set_style_text_color(id(icon_card_shutter_arrow), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);

              

              if (etat_physique == "Ouvert" || etat_physique == "Partiel" || etat_physique == "open") {

                lv_label_set_text(id(icon_card_shutter1), "\U000F111E");

                lv_obj_set_style_text_color(id(icon_card_shutter1), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);

                if (id(icon_sw1) != nullptr && id(lbl_sw1_state) != nullptr) {
                  lv_obj_set_style_text_color(id(icon_sw1), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);
                  lv_label_set_text(id(lbl_sw1_state), "Ouvert");
                  lv_obj_set_style_text_color(id(lbl_sw1_state), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);
                }

              } else if (etat_physique == "Ferme" || etat_physique == "closed") {

                lv_label_set_text(id(icon_card_shutter1), "\U000F111C");

                lv_obj_set_style_text_color(id(icon_card_shutter1), lv_color_hex(UIColor::ERROR), LV_PART_MAIN);

                if (id(icon_sw1) != nullptr && id(lbl_sw1_state) != nullptr) {
                  lv_obj_set_style_text_color(id(icon_sw1), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
                  lv_label_set_text(id(lbl_sw1_state), "Fermé");
                  lv_obj_set_style_text_color(id(lbl_sw1_state), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
                }

              }

            }

        - if:
            condition:
              lambda: 'return etat_physique == "En_mouvement";'
            then:
              - micro_wake_word.enable_model:
                  id: stop
            else:
              - micro_wake_word.disable_model:
                  id: stop

    - service: tab5_maj_clim
      variables:
        target: string
        current: string
        mode: string
        preset: string
        fan: string
        swing: string
      then:
        - lambda: |-
            if (id(clim_target) == nullptr || id(clim_target_popup) == nullptr) return;

            float f_target = atof(target.c_str());
            float f_current = atof(current.c_str());

            id(clim_target_temp) = f_target;
            char buf_target[16];
            sprintf(buf_target, "%.1f", f_target);
            lv_label_set_text(id(clim_target), buf_target);
            lv_label_set_text(id(clim_target_popup), buf_target);
            lv_arc_set_value(id(arc_temp_popup), (int)f_target);

            char buf_curr[16];
            sprintf(buf_curr, "%.1f \xC2\xB0""C", f_current);
            lv_label_set_text(id(val_temp_int_popup), buf_curr);

            id(clim_hvac_mode) = mode;

            id(clim_preset_mode) = preset;

            id(clim_fan_mode) = fan;

            id(clim_swing_mode) = swing;

            uint32_t c_cool_active   = UIColor::CLIM_COOL_ACTIVE; // Bleu vif

            uint32_t c_cool_inactive = UIColor::CLIM_COOL_INACTIVE; // Bleu grisatre inactif

            uint32_t c_heat_active   = UIColor::CLIM_HEAT_ACTIVE; // Rouge vif

            uint32_t c_heat_inactive = UIColor::CLIM_HEAT_INACTIVE; // Rouge grisatre inactif

            uint32_t c_off_active    = UIColor::CLIM_OFF_ACTIVE; // Orange

            uint32_t c_off_inactive  = UIColor::CLIM_OFF_INACTIVE; // Orange grise

            uint32_t c_inactive = UIColor::CLIM_TRACK_INACTIVE; // Gris barre

            uint32_t c_eco = UIColor::CLIM_ECO; // Vert standard

            // Couleur de la temperature cible (Bleu si froid, Rouge si chaud, Blanc si off/autre)
            uint32_t c_target_color = UIColor::TEXT_PRIMARY; // Blanc par defaut
            if(mode == "cool") {
              c_target_color = UIColor::CLIM_COOL_ACTIVE; // Bleu
            } else if(mode == "heat") {
              c_target_color = UIColor::CLIM_HEAT_ACTIVE; // Rouge
            }
            lv_obj_set_style_text_color(id(clim_target), lv_color_hex(c_target_color), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(clim_target_popup), lv_color_hex(c_target_color), LV_PART_MAIN);

            // Mode (Cool/Heat/Dry/Fan/Off)

            lv_obj_set_style_text_color(id(popup_icon_clim_cool), lv_color_hex(c_cool_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_heat), lv_color_hex(c_heat_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_dry), lv_color_hex(c_cool_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_fan), lv_color_hex(c_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_off), lv_color_hex(c_off_inactive), LV_PART_MAIN);

            if(mode == "cool") {
              lv_obj_set_style_text_color(id(popup_icon_clim_cool), lv_color_hex(c_cool_active), LV_PART_MAIN);
            } else if(mode == "heat") {
              lv_obj_set_style_text_color(id(popup_icon_clim_heat), lv_color_hex(c_heat_active), LV_PART_MAIN);
            } else if(mode == "dry") {
              lv_obj_set_style_text_color(id(popup_icon_clim_dry), lv_color_hex(c_cool_active), LV_PART_MAIN);
            } else if(mode == "fan_only") {
              lv_obj_set_style_text_color(id(popup_icon_clim_fan), lv_color_hex(c_eco), LV_PART_MAIN);
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_off), lv_color_hex(c_off_active), LV_PART_MAIN);
            }

            // Eco (carte + popup)

            if(preset == "eco" || preset == "away") {
              lv_obj_set_style_text_color(id(popup_icon_clim_eco), lv_color_hex(c_eco), LV_PART_MAIN);
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_eco), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

            // Boost

            if(preset == "boost") {
              lv_obj_set_style_text_color(id(popup_icon_clim_boost), lv_color_hex(c_heat_active), LV_PART_MAIN);
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_boost), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

            // Quiet / Auto 

            if(fan == "low" || fan == "quiet" || fan == "Silence") {
              lv_obj_set_style_text_color(id(popup_icon_clim_quiet), lv_color_hex(c_cool_active), LV_PART_MAIN); 
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_quiet), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

            // Swing (windnice exclu : il a son propre bouton "Brise" depuis le popup v2)

            if(swing == "swing" || swing == "vertical" || swing == "horizontal" || swing == "both" || swing == "on" || swing == "3d") {
              lv_obj_set_style_text_color(id(popup_icon_clim_swing), lv_color_hex(c_cool_active), LV_PART_MAIN);
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_swing), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

            // Brise (Daikin Onecta "windnice")

            if(swing == "windnice") {
              lv_obj_set_style_text_color(id(popup_icon_clim_windnice), lv_color_hex(c_cool_active), LV_PART_MAIN);
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_windnice), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

    - service: tab5_maj_alerte_meteo_france
      variables:
        payload: string
      then:
        - lambda: |-
            if (id(lbl_proc_pluie) == nullptr) return;
            // 1024 (etait 512) : la phrase de vigilance Meteo-France peut etre longue,
            // un payload complet (11 champs pipe-delimited) depassait parfois 512 et
            // tronquait silencieusement les derniers champs (#T165).
            char buf[1024];
            strncpy(buf, payload.c_str(), sizeof(buf)-1);
            buf[sizeof(buf)-1] = '\0';
            char* saveptr;
            char* phrase_pluie = strtok_r(buf, "|", &saveptr);
            char* globale = strtok_r(NULL, "|", &saveptr);
            char* vent = strtok_r(NULL, "|", &saveptr);
            char* inondation = strtok_r(NULL, "|", &saveptr);
            char* orages = strtok_r(NULL, "|", &saveptr);
            char* pluie_inondation = strtok_r(NULL, "|", &saveptr);
            char* neige_verglas = strtok_r(NULL, "|", &saveptr);
            char* grand_froid = strtok_r(NULL, "|", &saveptr);
            char* vagues_submersion = strtok_r(NULL, "|", &saveptr);
            char* canicule = strtok_r(NULL, "|", &saveptr);
            char* avalanches = strtok_r(NULL, "|", &saveptr);

            if (!phrase_pluie) phrase_pluie = (char*)"";
            if (!globale) globale = (char*)"";
            
            update_rain_phrase_ui(id(lbl_proc_pluie), std::string(phrase_pluie));
            lv_obj_add_flag(id(lbl_pluie_val), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(lbl_pluie_unit), LV_OBJ_FLAG_HIDDEN);

            // Couleur de la date selon vigilance globale
            uint32_t col_date = UIColor::SUCCESS;
            if (strcmp(globale, "Jaune") == 0) col_date = UIColor::ALERT_DATE_YELLOW;
            else if (strcmp(globale, "Orange") == 0) col_date = UIColor::ALERT_DATE_ORANGE;
            else if (strcmp(globale, "Rouge") == 0) col_date = UIColor::ALERT_DATE_RED;
            lv_obj_set_style_text_color(id(lbl_date), lv_color_hex(col_date), LV_PART_MAIN);

            // Filtrage statique
            struct AlertEntry { const char* icon; const char* level; };
            constexpr size_t MAX_ALERTES = 4;
            AlertEntry actives[MAX_ALERTES];
            size_t active_count = 0;

            auto check_alert = [&](const char* state, const char* icon_code) {
              if (active_count >= MAX_ALERTES) return;
              if (!state || strcmp(state, "Vert") == 0 || strlen(state) == 0 || strcmp(state, "unknown") == 0) return;
              actives[active_count].icon  = icon_code;
              actives[active_count].level = state;
              ++active_count;
            };

            check_alert(vent, "\U000F059D");
            check_alert(inondation, "\U000F0EFA");
            check_alert(orages, "\U000F0593");
            check_alert(pluie_inondation, "\U000F0596");
            check_alert(neige_verglas, "\U000F0F36");
            check_alert(grand_froid, "\U000F0F29");
            check_alert(vagues_submersion, "\U000F078D");
            check_alert(canicule, "\U000F0E01");

            id(has_alerts) = (active_count > 0);
            
            lv_obj_t* slots[] = {id(alerte_slot_0), id(alerte_slot_1), id(alerte_slot_2), id(alerte_slot_3)};
            for (size_t i = 0; i < 4; i++) {
              if (i < active_count) {
                lv_label_set_text(slots[i], actives[i].icon);
                uint32_t c = UIColor::ALERT_YELLOW;
                if (strcmp(actives[i].level, "Orange") == 0) c = UIColor::WARNING;
                else if (strcmp(actives[i].level, "Rouge") == 0) c = UIColor::ALERT_RED;
                lv_obj_set_style_text_color(slots[i], lv_color_hex(c), LV_PART_MAIN);
                lv_obj_set_style_text_opa(slots[i], 255, LV_PART_MAIN);
                lv_obj_clear_flag(slots[i], LV_OBJ_FLAG_HIDDEN);
              } else {
                lv_obj_add_flag(slots[i], LV_OBJ_FLAG_HIDDEN);
              }
            }


    - service: tab5_maj_probabilites
      variables:
        uv: string
        gel: string
        neige: string
      then:
        - lambda: |-
            if (id(j0_day) == nullptr) return;
            
            int i_uv = atoi(uv.c_str());
            int i_gel = atoi(gel.c_str());
            int i_neige = atoi(neige.c_str());
            
            id(global_neige) = i_neige;
            
            if(i_neige >= 5) {
              lv_label_set_text(id(icon_rain_predict), "\U000F0598");
              lv_obj_set_style_text_color(id(icon_rain_predict), lv_color_hex(UIColor::WARNING), LV_PART_MAIN);
            } else {
              lv_label_set_text(id(icon_rain_predict), "\U000F0597");
              uint32_t c_hydro = get_humidity_color((float)id(global_humidite));
              lv_obj_set_style_text_color(id(icon_rain_predict), lv_color_hex(c_hydro), LV_PART_MAIN);
            }

