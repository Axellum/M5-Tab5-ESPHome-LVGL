                  lv_label_set_text(id(lbl_sw1_state), "Fermé");
                  lv_obj_set_style_text_color(id(lbl_sw1_state), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
                }

              }

            }

    - service: tab5_maj_clim
      variables:
        target: string
        current: string
        mode: string
        preset: string
        fan: string
        swing: string
      then:
        - lambda: |-
            if (id(clim_target) == nullptr || id(clim_target_popup) == nullptr) return;

            float f_target = atof(target.c_str());
            float f_current = atof(current.c_str());

            id(clim_target_temp) = f_target;
            char buf_target[16];
            sprintf(buf_target, "%.1f", f_target);
            lv_label_set_text(id(clim_target), buf_target);
            lv_label_set_text(id(clim_target_popup), buf_target);
            lv_arc_set_value(id(arc_temp_popup), (int)f_target);

            char buf_curr[16];
            sprintf(buf_curr, "%.1f \xC2\xB0""C", f_current);
            lv_label_set_text(id(val_temp_int_popup), buf_curr);

            id(clim_preset_mode) = preset;

            id(clim_fan_mode) = fan;

            id(clim_swing_mode) = swing;

            uint32_t c_cool_active   = 0x4D94FF; // Bleu vif

            uint32_t c_cool_inactive = 0x60748F; // Bleu grisatre inactif

            uint32_t c_heat_active   = 0xFF4D4D; // Rouge vif

            uint32_t c_heat_inactive = 0x8F6060; // Rouge grisatre inactif

            uint32_t c_off_active    = 0xFFA500; // Orange

            uint32_t c_off_inactive  = 0xB48154; // Orange grise

            uint32_t c_inactive = 0x4A596E; // Gris barre

            uint32_t c_eco = 0x4CD964; // Vert standard

            // Couleur de la temperature cible (Bleu si froid, Rouge si chaud, Blanc si off/autre)
            uint32_t c_target_color = 0xFFFFFF; // Blanc par defaut
            if(mode == "cool") {
              c_target_color = 0x4D94FF; // Bleu
            } else if(mode == "heat") {
              c_target_color = 0xFF4D4D; // Rouge
            }
            lv_obj_set_style_text_color(id(clim_target), lv_color_hex(c_target_color), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(clim_target_popup), lv_color_hex(c_target_color), LV_PART_MAIN);

            // Mode (Cool/Heat/Dry/Fan/Off)

            // lv_obj_set_style_text_color(id(icon_clim_cool), lv_color_hex(c_cool_inactive), LV_PART_MAIN);
            // lv_obj_set_style_text_color(id(icon_clim_heat), lv_color_hex(c_heat_inactive), LV_PART_MAIN);
            // lv_obj_set_style_text_color(id(icon_clim_off), lv_color_hex(c_off_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_cool), lv_color_hex(c_cool_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_heat), lv_color_hex(c_heat_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_dry), lv_color_hex(c_cool_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_fan), lv_color_hex(c_inactive), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(popup_icon_clim_off), lv_color_hex(c_off_inactive), LV_PART_MAIN);

            if(mode == "cool") {
              // lv_obj_set_style_text_color(id(icon_clim_cool), lv_color_hex(c_cool_active), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(popup_icon_clim_cool), lv_color_hex(c_cool_active), LV_PART_MAIN);
            } else if(mode == "heat") {
              // lv_obj_set_style_text_color(id(icon_clim_heat), lv_color_hex(c_heat_active), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(popup_icon_clim_heat), lv_color_hex(c_heat_active), LV_PART_MAIN);
            } else if(mode == "dry") {
              lv_obj_set_style_text_color(id(popup_icon_clim_dry), lv_color_hex(c_cool_active), LV_PART_MAIN);
            } else if(mode == "fan_only") {
              lv_obj_set_style_text_color(id(popup_icon_clim_fan), lv_color_hex(c_eco), LV_PART_MAIN);
            } else {
              // lv_obj_set_style_text_color(id(icon_clim_off), lv_color_hex(c_off_active), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(popup_icon_clim_off), lv_color_hex(c_off_active), LV_PART_MAIN);
            }

            // Eco (carte + popup)

            if(preset == "eco") {
              // lv_obj_set_style_text_color(id(icon_clim_eco), lv_color_hex(c_eco), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(popup_icon_clim_eco), lv_color_hex(c_eco), LV_PART_MAIN);
            } else {
              // lv_obj_set_style_text_color(id(icon_clim_eco), lv_color_hex(c_inactive), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(popup_icon_clim_eco), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

            // Boost

            if(preset == "boost") {
              lv_obj_set_style_text_color(id(popup_icon_clim_boost), lv_color_hex(c_heat_active), LV_PART_MAIN);
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_boost), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

            // Quiet / Auto 

            if(fan == "low" || fan == "quiet" || fan == "Silence") {
              lv_obj_set_style_text_color(id(popup_icon_clim_quiet), lv_color_hex(c_cool_active), LV_PART_MAIN); 
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_quiet), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

            // Swing

            if(swing == "vertical" || swing == "horizontal" || swing == "both" || swing == "on" || swing == "3d") {
              lv_obj_set_style_text_color(id(popup_icon_clim_swing), lv_color_hex(c_cool_active), LV_PART_MAIN);
            } else {
              lv_obj_set_style_text_color(id(popup_icon_clim_swing), lv_color_hex(c_inactive), LV_PART_MAIN);
            }

    - service: tab5_maj_alerte_meteo_france
      variables:
        payload: string
      then:
        - lambda: |-
            if (id(lbl_proc_pluie) == nullptr) return;
            char buf[512];
            strncpy(buf, payload.c_str(), sizeof(buf)-1);
            buf[sizeof(buf)-1] = '\0';
            char* saveptr;
            char* phrase_pluie = strtok_r(buf, "|", &saveptr);
            char* globale = strtok_r(NULL, "|", &saveptr);
            char* vent = strtok_r(NULL, "|", &saveptr);
            char* inondation = strtok_r(NULL, "|", &saveptr);
            char* orages = strtok_r(NULL, "|", &saveptr);
            char* pluie_inondation = strtok_r(NULL, "|", &saveptr);
            char* neige_verglas = strtok_r(NULL, "|", &saveptr);
            char* grand_froid = strtok_r(NULL, "|", &saveptr);
            char* vagues_submersion = strtok_r(NULL, "|", &saveptr);
            char* canicule = strtok_r(NULL, "|", &saveptr);
            char* avalanches = strtok_r(NULL, "|", &saveptr);

            if (!phrase_pluie) phrase_pluie = (char*)"";
            if (!globale) globale = (char*)"";
            
            lv_label_set_text(id(lbl_proc_pluie), phrase_pluie);
            lv_obj_add_flag(id(lbl_pluie_val), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(lbl_pluie_unit), LV_OBJ_FLAG_HIDDEN);

            // Couleur de la date selon vigilance globale
            uint32_t col_date = UIColor::SUCCESS;
            if (strcmp(globale, "Jaune") == 0) col_date = 0xFCF3CF;
            else if (strcmp(globale, "Orange") == 0) col_date = 0xF8C471;
            else if (strcmp(globale, "Rouge") == 0) col_date = 0xF1948A;
            lv_obj_set_style_text_color(id(lbl_date), lv_color_hex(col_date), LV_PART_MAIN);

            // Filtrage statique
            struct AlertEntry { const char* icon; const char* level; };
            constexpr size_t MAX_ALERTES = 4;
            AlertEntry actives[MAX_ALERTES];
            size_t active_count = 0;

            auto check_alert = [&](const char* state, const char* icon_code) {
              if (active_count >= MAX_ALERTES) return;
              if (!state || strcmp(state, "Vert") == 0 || strlen(state) == 0 || strcmp(state, "unknown") == 0) return;
              actives[active_count].icon  = icon_code;
              actives[active_count].level = state;
              ++active_count;
            };

            check_alert(vent, "\U000F059D");
            check_alert(inondation, "\U000F0EFA");
            check_alert(orages, "\U000F0593");
            check_alert(pluie_inondation, "\U000F0596");
            check_alert(neige_verglas, "\U000F0F36");
            check_alert(grand_froid, "\U000F0F29");
            check_alert(vagues_submersion, "\U000F078D");
            check_alert(canicule, "\U000F0E01");

            id(has_alerts) = (active_count > 0);
            
            lv_obj_t* slots[] = {id(alerte_slot_0), id(alerte_slot_1), id(alerte_slot_2), id(alerte_slot_3)};
            for (size_t i = 0; i < 4; i++) {
              if (i < active_count) {
                lv_label_set_text(slots[i], actives[i].icon);
                uint32_t c = UIColor::ALERT_YELLOW;
                if (strcmp(actives[i].level, "Orange") == 0) c = UIColor::WARNING;
                else if (strcmp(actives[i].level, "Rouge") == 0) c = UIColor::ALERT_RED;
                lv_obj_set_style_text_color(slots[i], lv_color_hex(c), LV_PART_MAIN);
                lv_obj_set_style_text_opa(slots[i], 255, LV_PART_MAIN);
                lv_obj_clear_flag(slots[i], LV_OBJ_FLAG_HIDDEN);
              } else {
                lv_obj_add_flag(slots[i], LV_OBJ_FLAG_HIDDEN);
              }
            }


