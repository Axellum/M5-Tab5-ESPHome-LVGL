    - service: tab5_maj_meteo_actuelle

      variables:

        condition: string

        temperature: float

        humidite: float

      then:

        - lambda: |-

            id(global_humidite) = humidite;

            if (id(global_neige) < 5) {

              uint32_t c_hydro = get_humidity_color((float)id(global_humidite)); // AXE2: factorisation

              lv_obj_set_style_text_color(id(icon_rain_predict), lv_color_hex(c_hydro), LV_PART_MAIN);

            }

            char buf_t[32]; sprintf(buf_t, "%.0f °C", temperature);

            lv_label_set_text(id(current_temp), buf_t);

            float t = temperature;

            uint32_t c_temp;

            if (t <= -12) {

                c_temp = 0xFF0000;

            } else if (t <= 0) {

                float step = floor((t + 12) / 2.0) * 2.0;

                float ratio = step / 12.0;

                int b = 255 * ratio;

                c_temp = (255 << 16) | (0 << 8) | b;

            } else if (t <= 14) {

                float step = floor(t / 2.0) * 2.0;

                float ratio = step / 14.0;

                int r = 255 * ratio;

                int g = 255 * ratio;

                c_temp = (r << 16) | (g << 8) | 255;

            } else if (t <= 24) {

                float step = floor((t - 14) / 2.0) * 2.0;

                float ratio = step / 10.0;

                int g = 255 - (255 * ratio);

                c_temp = (255 << 16) | (g << 8) | 255;

            } else {

                float step = floor((t - 24) / 2.0) * 2.0;

                if (step > 11) step = 11;

                float ratio = step / 11.0;

                int b = 255 - (255 * ratio);

                c_temp = (255 << 16) | (0 << 8) | b;

            }

            lv_obj_set_style_text_color(id(current_temp), lv_color_hex(c_temp), LV_PART_MAIN);

            auto apply_weather_icon = [](lv_obj_t* l1_obj, lv_obj_t* l2_obj, std::string state, bool is_card) {
