lvgl:

  pages:

    - id: page_main
      scrollbar_mode: "OFF"

      on_gesture:

        then:

          - lambda: |-

              lv_indev_t * indev = lv_indev_get_act();

              if (indev) {

                  lv_point_t pt;

                  lv_indev_get_point(indev, &pt);

                  lv_dir_t d = lv_indev_get_gesture_dir(indev);

                  if (d == LV_DIR_TOP) {
                      lv_obj_clear_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);
                      lv_obj_move_foreground(id(layer_console_sys));
                  } else if (d == LV_DIR_BOTTOM) {
                      lv_obj_add_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);
                  } else if (pt.y > 400) {

                      // Raccourcis pour verifier l'etat

                      bool l1 = !lv_obj_has_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN);

                      bool l2 = !lv_obj_has_flag(id(layer_forecast_2), LV_OBJ_FLAG_HIDDEN);

                      bool l3 = !lv_obj_has_flag(id(layer_forecast_3), LV_OBJ_FLAG_HIDDEN);

                      bool h1 = !lv_obj_has_flag(id(layer_forecast_hourly_1), LV_OBJ_FLAG_HIDDEN);

                      bool h2 = !lv_obj_has_flag(id(layer_forecast_hourly_2), LV_OBJ_FLAG_HIDDEN);

                      bool h3 = !lv_obj_has_flag(id(layer_forecast_hourly_3), LV_OBJ_FLAG_HIDDEN);

                      // Si on est dans un etat incoherent (rien d'affiche), on reset.

                      if(!l1 && !l2 && !l3 && !h1 && !h2 && !h3) l1 = true;

                      auto hide_all = [&]() {

                         lv_obj_add_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_2), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_3), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_hourly_1), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_hourly_2), LV_OBJ_FLAG_HIDDEN);

                         lv_obj_add_flag(id(layer_forecast_hourly_3), LV_OBJ_FLAG_HIDDEN);

                      };

                      if (d == LV_DIR_LEFT) {

                          hide_all();
                          int page = -1;

                          if(h3) { lv_obj_clear_flag(id(layer_forecast_hourly_2), LV_OBJ_FLAG_HIDDEN); page = 4; }

                          else if(h2) { lv_obj_clear_flag(id(layer_forecast_hourly_1), LV_OBJ_FLAG_HIDDEN); page = 3; }

                          else if(h1) { lv_obj_clear_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN); page = 0; }

                          else if(l1) { lv_obj_clear_flag(id(layer_forecast_2), LV_OBJ_FLAG_HIDDEN); page = 1; }

                          else if(l2) { lv_obj_clear_flag(id(layer_forecast_3), LV_OBJ_FLAG_HIDDEN); page = 2; }

                          else if(l3) { lv_obj_clear_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN); page = 0; }

                          if(page >= 0) {
                            id(forecast_page_index) = page;
                            lv_obj_t* bars[] = {id(pbar_0), id(pbar_1), id(pbar_2), id(pbar_3), id(pbar_4), id(pbar_5)};
                            for(int i = 0; i < 6; i++) {
                              if(i == page) {
                                lv_obj_set_width(bars[i], 30);
                                lv_obj_set_style_bg_opa(bars[i], 255, LV_PART_MAIN);
                              } else {
                                lv_obj_set_width(bars[i], 16);
                                lv_obj_set_style_bg_opa(bars[i], 100, LV_PART_MAIN);
                              }
                            }
                          }

                      } else if (d == LV_DIR_RIGHT) {

                          hide_all();
                          int page = -1;

                          if(l3) { lv_obj_clear_flag(id(layer_forecast_2), LV_OBJ_FLAG_HIDDEN); page = 1; }

                          else if(l2) { lv_obj_clear_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN); page = 0; }

                          else if(l1) { lv_obj_clear_flag(id(layer_forecast_hourly_1), LV_OBJ_FLAG_HIDDEN); page = 3; }

                          else if(h1) { lv_obj_clear_flag(id(layer_forecast_hourly_2), LV_OBJ_FLAG_HIDDEN); page = 4; }

                          else if(h2) { lv_obj_clear_flag(id(layer_forecast_hourly_3), LV_OBJ_FLAG_HIDDEN); page = 5; }

                          else if(h3) { lv_obj_clear_flag(id(layer_forecast_1), LV_OBJ_FLAG_HIDDEN); page = 0; }

                          if(page >= 0) {
                            id(forecast_page_index) = page;
                            lv_obj_t* bars[] = {id(pbar_0), id(pbar_1), id(pbar_2), id(pbar_3), id(pbar_4), id(pbar_5)};
                            for(int i = 0; i < 6; i++) {
                              if(i == page) {
                                lv_obj_set_width(bars[i], 30);
                                lv_obj_set_style_bg_opa(bars[i], 255, LV_PART_MAIN);
                              } else {
                                lv_obj_set_width(bars[i], 16);
                                lv_obj_set_style_bg_opa(bars[i], 100, LV_PART_MAIN);
                              }
                            }
                          }

                      }

                  }

              }

      widgets:

        # Icône météo inline (150px, positionnée à gauche — remplace l'ancienne 270px)
        - label: { id: icon_actuel_layer1, text: "", hidden: true, x: 20, y: 100, text_font: font_meteo_card, text_color: color_text }
        - label: { id: icon_actuel_layer2, text: "", hidden: true, x: 20, y: 100, text_font: font_meteo_card, text_color: color_text }

        # Micro Voice Assistant (icône réduite 32px + zone touch compacte)
        - label: { id: icon_mic_status, text: "\U000F036C", x: 12, y: 10, align: TOP_LEFT, text_font: mdi_font_32, text_color: color_text_dim }
        - button:
            id: btn_assist_trigger
            x: 5
            y: 2
            width: 45
            height: 45
            styles: style_invisible
            on_short_click:
              - voice_assistant.start:
                  id: va

        # --- Temp ext (55px, colorimétrique) + Serre (45px) ---
        - obj:
            x: 190
            y: 100
            width: 560
            height: 120
            styles: style_transparent
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: icon_temp, text: "\U000F050F", x: 0, y: 0, text_font: mdi_font_45, text_color: color_text_dim }
              - label: { id: current_temp, text: "-- °C", x: 50, y: -5, text_font: roboto_55_b, text_color: color_temp_max }
              - label: { id: icon_serre, text: "\U000F002D", x: 0, y: 60, text_font: mdi_font_45, text_color: color_text_dim }
              - label: { id: current_serre, text: "-- °C", x: 50, y: 60, text_font: roboto_45_b, text_color: color_temp_max }

        # --- PLANNING (Dynamique) ---

        - obj:

            x: 400

            y: 305

            width: 380

            height: 55

            styles: style_transparent
            scrollbar_mode: "OFF"

            widgets:

              - label: { id: lbl_planning_text, text: "", align: CENTER, text_font: roboto_32_b, text_color: color_text }

        # --- Top Right: Date, Time & Status Icons ---

        - label: { id: icon_pc, text: "\U000F0379", x: 790, y: 78, text_font: mdi_font_45, text_color: color_text_dim }

        - label: { id: icon_phone, text: "\U000F011E", x: 790, y: 138, text_font: mdi_font_45, text_color: color_text_dim }

        - obj:

            x: 830

            y: 68

            width: 380

            height: 130

            styles: style_transparent
            scrollbar_mode: "OFF"

            widgets:

              - label: { id: lbl_time, text: "19:50", align: CENTER, text_font: roboto_130_b, text_color: color_text }

        - obj:

            x: 795

            y: 12

            width: 450

            height: 60

            styles: style_transparent
            scrollbar_mode: "OFF"

            widgets:

              - label: { id: lbl_date, text: "Jeu 02 Avr", align: CENTER, text_font: roboto_45_b, text_color: color_text }

        # ==================== MOISTURE SENSORS ====================

        - !include ui_components/moisture_sensors.yaml
        - label: { id: icon_wifi, text: "\U000F05A9", x: 1215, y: 78, text_font: mdi_font_45, text_color: color_text_dim }

        - label: { id: icon_ha, text: "\U000F07D0", x: 1215, y: 138, text_font: mdi_font_45, text_color: color_text_dim }

        # ==================== CLIMATE CONTROL (MIDDLE RIGHT) ====================

        - !include ui_components/climate_card.yaml
        - label: { id: icon_rain_predict, text: "\U000F0597", x: 20, y: 356, text_font: mdi_font_alert, text_color: color_temp_min }

        # 9 Rain bars - FLEX container (Phase 5)
        - obj:
            id: rain_bar_container
            x: 100
            y: 361
            width: 385
            height: 50
            styles: style_transparent
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: END
            widgets:
              # 6 barres fines (5min chacune = 30min)
              - obj:
                  id: rb_0
                  width: 25
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_0_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }
              - obj:
                  id: rb_1
                  width: 25
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_1_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }
              - obj:
                  id: rb_2
                  width: 25
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_2_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }
              - obj:
                  id: rb_3
                  width: 25
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_3_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }
              - obj:
                  id: rb_4
                  width: 25
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_4_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }
              - obj:
                  id: rb_5
                  width: 25
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_5_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }
              # 3 barres larges (10min chacune = 30min)
              - obj:
                  id: rb_6
                  width: 55
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_6_in, align: BOTTOM_MID, width: 55, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }
              - obj:
                  id: rb_7
                  width: 55
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_7_in, align: BOTTOM_MID, width: 55, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }
              - obj:
                  id: rb_8
                  width: 55
                  height: 50
                  bg_color: color_bar_inactive
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - obj: { id: rb_8_in, align: BOTTOM_MID, width: 55, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 }

        - obj:

            x: 500

            y: 369

            width: 270

            height: 60

            styles: style_transparent
            scrollbar_mode: "OFF"

            layout:

              type: FLEX

              flex_flow: ROW

              flex_align_main: CENTER

              flex_align_cross: END

              pad_column: 6

            widgets:

              - label: { id: lbl_proc_pluie, text: "Synchronisation...", text_font: roboto_32_b, text_color: color_text, pad_bottom: 4 }

              - label: { id: lbl_pluie_val, text: "", text_font: roboto_45_b, text_color: color_orange_vif }

              - label: { id: lbl_pluie_unit, text: "", text_font: roboto_32_b, text_color: color_text, pad_bottom: 4 }

        # Alertes météo dynamiques (max 4, FLEX, masquées quand tout est vert)
        - obj:
            id: alert_container
            x: 780
            y: 356
            width: 480
            height: 60
            styles: style_transparent
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: END
              flex_align_cross: CENTER
              pad_column: 12
            widgets:
              - label: { id: alerte_slot_0, text: "", text_font: mdi_font_alert, text_color: color_text, hidden: true }
              - label: { id: alerte_slot_1, text: "", text_font: mdi_font_alert, text_color: color_text, hidden: true }
              - label: { id: alerte_slot_2, text: "", text_font: mdi_font_alert, text_color: color_text, hidden: true }
              - label: { id: alerte_slot_3, text: "", text_font: mdi_font_alert, text_color: color_text, hidden: true }

        # ==================== PAGINATION BARS ====================
        - obj:
            id: pagination_container
            x: 480
            y: 420
            width: 310
            height: 10
            styles: style_transparent
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_column: 8
            widgets:
              - obj: { id: pbar_0, width: 30, height: 4, radius: 2, bg_color: color_text, bg_opa: 100%, border_width: 0 }
              - obj: { id: pbar_1, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }
              - obj: { id: pbar_2, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }
              - obj: { id: pbar_3, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }
              - obj: { id: pbar_4, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }
              - obj: { id: pbar_5, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }

        # ==================== BOTTOM CARDS (FORECAST) ====================

        # --- °CK 1: J0 to J4 ---

        - !include ui_components/forecast_1.yaml
        - !include ui_components/forecast_2.yaml
        - !include ui_components/forecast_3.yaml
        - !include ui_components/forecast_hourly_1.yaml
        - !include ui_components/forecast_hourly_2.yaml
        - !include ui_components/forecast_hourly_3.yaml
        - !include ui_components/console_sys.yaml
        - !include ui_components/climate_popup.yaml
