# ============================================================================
# [AI-CONTEXT]
# @file tab5-lvgl.yaml
# @role Layout complet de l'interface LVGL (pages, widgets statiques, grille).
# @architecture_constraint Ne jamais créer de tableaux C++ ou de logique métier complexe 
#                         (comme le calcul de pagination) dans ce fichier YAML.
# @ai_instruction Ce fichier doit rester purement déclaratif (UI). Toute logique de swipe 
#                 doit être déléguée au C++.
# ============================================================================
lvgl:

  pages:

    - id: page_main
      scrollbar_mode: "OFF"

      on_gesture:
        then:
          # [AI-CONTEXT] Pagination previsions (swipe gauche/droite, y>=333 carte centrale)
          # deleguee a handle_swipe_gesture(). Console diag : btn_control_console uniquement.
          - lambda: |-
              lv_indev_t * indev = lv_indev_get_act();
              if (indev) {
                  lv_point_t pt;
                  lv_indev_get_point(indev, &pt);
                  lv_dir_t d = lv_indev_get_gesture_dir(indev);

                  WeatherDaySlot day_slots[] = {
                      {id(j0_day), id(j0_max), id(j0_min), id(j0_icon_layer1), id(j0_icon_layer2), id(btn_j0_action), id(icon_card_pc), nullptr, nullptr},
                      {id(j1_day), id(j1_max), id(j1_min), id(j1_icon_layer1), id(j1_icon_layer2), id(btn_j1_action), id(icon_card_shutter1), id(icon_card_shutter_arrow), id(btn_j1_dir)},
                      {id(j2_day), id(j2_max), id(j2_min), id(j2_icon_layer1), id(j2_icon_layer2), id(btn_j2_action), id(icon_card_lit_j2), id(icon_card_light_j2), nullptr},
                      {id(j3_day), id(j3_max), id(j3_min), id(j3_icon_layer1), id(j3_icon_layer2), id(btn_j3_action), id(icon_card_salon_j3), id(icon_card_light_j3), nullptr},
                      {id(j4_day), id(j4_max), id(j4_min), id(j4_icon_layer1), id(j4_icon_layer2), id(btn_j4_action), id(icon_card_led_j4), id(icon_card_light_j4), nullptr}
                  };
                  WeatherHourSlot hour_slots[] = {
                      {id(h4_time), id(h4_temp), id(h4_prob), id(h4_icon_layer1), id(h4_icon_layer2)},
                      {id(h3_time), id(h3_temp), id(h3_prob), id(h3_icon_layer1), id(h3_icon_layer2)},
                      {id(h2_time), id(h2_temp), id(h2_prob), id(h2_icon_layer1), id(h2_icon_layer2)},
                      {id(h1_time), id(h1_temp), id(h1_prob), id(h1_icon_layer1), id(h1_icon_layer2)},
                      {id(h0_time), id(h0_temp), id(h0_prob), id(h0_icon_layer1), id(h0_icon_layer2)}
                  };
                  lv_obj_t* pbars[] = {id(pbar_0), id(pbar_1), id(pbar_2), id(pbar_3), id(pbar_4)};

                  handle_swipe_gesture(d, pt.y, id(forecast_page_index),
                      id(layer_forecast_daily), id(layer_forecast_hourly),
                      day_slots, hour_slots,
                      id(font_meteo_main), id(font_meteo_card), id(font_meteo_main_small), id(font_meteo_card_small),
                      pbars,
                      id(page_title_wrapper), id(lbl_page_title),
                      id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                      id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3),
                      id(current_central_panel));
              }

      widgets:

        # --- Top Left: Status Icons (Moved lower) ---

        # --- Voice Assistant Panel (Left) ---
        - label: { id: icon_mic_status, text: "\U000F036C", align: TOP_LEFT, x: 146, y: 85, text_font: mdi_font_120, text_color: color_text_dim }
        - button:
            id: btn_assist_trigger
            align: TOP_LEFT
            x: 146
            y: 85
            width: 120
            height: 120
            styles: style_invisible
            on_short_click:
              - logger.log: "DEBUG: BOUTON MICRO CLIQUE !"
              - script.execute: tab5_assist_toggle
        
        # Bouton Domo
        - button:
            id: btn_mode_domo
            align: TOP_LEFT
            x: 30
            y: 120
            width: 85
            height: 60
            styles: style_clim_btn
            on_short_click:
              - globals.set:
                  id: conversation_mode
                  value: 'false'
              - lambda: |-
                  lv_label_set_text(id(icon_mode_status), "\U000F07D0");
                  lv_obj_set_style_text_color(id(icon_mode_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
              - homeassistant.service:
                  service: select.select_option
                  data:
                    entity_id: ${entity_tab5_pipeline_select}
                    option: "preferred"
            widgets:
              - label: { text: "\U000F07D0", align: CENTER, y: -10, text_font: mdi_font_32, text_color: color_text }
              - label: { text: "Domo", align: CENTER, y: 15, text_font: roboto_22, text_color: color_text }

        # Bouton Discu
        - button:
            id: btn_mode_discu
            align: TOP_LEFT
            x: 298
            y: 120
            width: 85
            height: 60
            styles: style_clim_btn
            on_short_click:
              - globals.set:
                  id: conversation_mode
                  value: 'true'
              - lambda: |-
                  lv_label_set_text(id(icon_mode_status), "\U000F0450");
                  lv_obj_set_style_text_color(id(icon_mode_status), lv_color_hex(UIColor::INFO), LV_PART_MAIN);
              - homeassistant.service:
                  service: select.select_option
                  data:
                    entity_id: ${entity_tab5_pipeline_select}
                    option: "Discussion LLM"
            widgets:
              - label: { text: "\U000F0450", align: CENTER, y: -10, text_font: mdi_font_32, text_color: color_text }
              - label: { text: "Discu", align: CENTER, y: 15, text_font: roboto_22, text_color: color_text }

        # Bouton Mute
        - button:
            id: btn_mute
            align: TOP_LEFT
            x: 30
            y: 220
            width: 85
            height: 50
            styles: style_clim_btn
            on_short_click:
              - if:
                  condition:
                    lambda: 'return id(system_muted);'
                  then:
                    - globals.set:
                        id: system_muted
                        value: 'false'
                    - media_player.volume_set:
                        id: speaker_player
                        volume: !lambda 'return id(system_volume);'
                    - lambda: 'lv_label_set_text(id(icon_mute), "\U000F057E"); lv_obj_set_style_text_color(id(icon_mute), lv_color_hex(UIColor::TEXT_SOFT), LV_PART_MAIN);'
                  else:
                    - globals.set:
                        id: system_muted
                        value: 'true'
                    - media_player.volume_set:
                        id: speaker_player
                        volume: 0.0
                    - lambda: 'lv_label_set_text(id(icon_mute), "\U000F0581"); lv_obj_set_style_text_color(id(icon_mute), lv_color_hex(UIColor::ERROR), LV_PART_MAIN);'
            widgets:
              - label: { id: icon_mute, text: "\U000F057E", align: CENTER, text_font: mdi_font_32, text_color: color_text }

        # Bouton OK Nabu
        - button:
            id: btn_ok_nabu
            align: TOP_LEFT
            x: 126
            y: 220
            width: 160
            height: 50
            styles: style_clim_btn
            on_short_click:
              - switch.toggle: tab5_wake_word_active
            widgets:
              - label: { id: lbl_ok_nabu, text: "Ok Nabu: ON", align: CENTER, text_font: roboto_22, text_color: color_success }

        # Label d'état masqué pour la compatibilité
        - label: { id: icon_mode_status, text: "", hidden: true }


        # --- Centre: Horloge (Déplacée légèrement à gauche) ---
        - obj:
            id: clock_tile
            align: TOP_MID
            x: 0
            y: 10
            width: 413
            height: 210
            styles: style_meteo_card
            scrollbar_mode: "OFF"
            widgets:
              - label: { id: lbl_time, text: "19:50", align: TOP_MID, y: 10, text_font: roboto_130_b, text_color: color_text }
              - label: { id: lbl_date, text: "Jeu 02 Avr", align: TOP_MID, y: 145, text_font: roboto_45, text_color: color_text }

        # --- Top Left: Status Icons (Small) ---
        # TV = icon_card_pc (épaule carte J0, moniteur) — pas d'icône TV ici
        - label: { id: icon_pc, text: "\U000F0379", align: TOP_LEFT, x: 10, y: 10, text_font: mdi_font_26, text_color: color_text_dim }
        - label: { id: icon_phone, text: "\U000F011E", align: TOP_LEFT, x: 45, y: 10, text_font: mdi_font_26, text_color: color_text_dim }
        - label: { id: icon_wifi, text: "\U000F05A9", align: TOP_LEFT, x: 80, y: 10, text_font: mdi_font_26, text_color: color_text_dim }

        # --- Top Right Buttons (même habillage verre que Domo/Discu) ---
        - button:
            id: btn_control_ha
            align: TOP_LEFT
            x: 855
            y: 20
            width: 125
            height: 90
            radius: 18
            styles: style_clim_btn
            pressed:
              bg_opa: 30%
            on_short_click:
              - lambda: |-
                  bool state = id(show_switches);
                  id(show_switches) = !state;
                  if (id(show_switches)) {
                      lv_obj_add_flag(id(layer_forecast_daily), LV_OBJ_FLAG_HIDDEN);
                      lv_obj_add_flag(id(layer_forecast_hourly), LV_OBJ_FLAG_HIDDEN);
                      lv_obj_clear_flag(id(layer_switches), LV_OBJ_FLAG_HIDDEN);
                  } else {
                      if (id(forecast_page_index) >= 2) {
                          lv_obj_clear_flag(id(layer_forecast_daily), LV_OBJ_FLAG_HIDDEN);
                      } else {
                          lv_obj_clear_flag(id(layer_forecast_hourly), LV_OBJ_FLAG_HIDDEN);
                      }
                      lv_obj_add_flag(id(layer_switches), LV_OBJ_FLAG_HIDDEN);
                  }
            widgets:
              - label: { id: icon_ha, text: "\U000F07D0", align: CENTER, y: -12, text_font: mdi_font_45, text_color: color_text }
              - label: { text: "HA", align: CENTER, y: 22, text_font: roboto_22, text_color: color_text }

        - button:
            id: btn_control_console
            align: TOP_LEFT
            x: 999
            y: 20
            width: 125
            height: 90
            radius: 18
            styles: style_clim_btn
            pressed:
              bg_opa: 30%
            on_short_click:
              - lambda: |-
                  lv_obj_clear_flag(id(layer_console_sys), LV_OBJ_FLAG_HIDDEN);
                  lv_obj_move_foreground(id(layer_console_sys));
                  refresh_console_status_row_ui(id(lbl_sys_uptime_val), id(lbl_sys_rssi_val), id(lbl_sys_temp_val),
                      id(sys_uptime).has_state(), id(sys_uptime).state,
                      id(sys_wifi_rssi).has_state(), id(sys_wifi_rssi).state,
                      id(sys_core_temp).has_state(), id(sys_core_temp).state);
            widgets:
              - label: { text: "\U000F0717", align: CENTER, y: -12, text_font: mdi_font_45, text_color: color_text }
              - label: { text: "Sys", align: CENTER, y: 22, text_font: roboto_22, text_color: color_text }

        - button:
            id: btn_control_tv
            align: TOP_LEFT
            x: 1143
            y: 20
            width: 125
            height: 90
            radius: 18
            styles: style_clim_btn
            pressed:
              bg_opa: 30%
            on_short_click:
              - lambda: |-
                  lv_obj_clear_flag(id(tv_remote_popup), LV_OBJ_FLAG_HIDDEN);
                  lv_obj_move_foreground(id(tv_remote_popup));
            widgets:
              - label: { text: "\U000F07C0", align: CENTER, y: -12, text_font: mdi_font_45, text_color: color_text }
              - label: { text: "TV", align: CENTER, y: 22, text_font: roboto_22, text_color: color_text }

        # ==================== MOISTURE SENSORS ====================
        - !include ui_components/moisture_sensors.yaml

        # ==================== CLIMATE CONTROL (MIDDLE RIGHT) ====================

        - !include ui_components/climate_card.yaml
        # ==================== CENTRAL CARD (Alertes, Pluie, Planning) ====================
        - obj:
            id: central_card
            x: 20
            y: 333
            width: 1240
            height: 84
            styles: style_meteo_card
            scrollbar_mode: "OFF"
            pad_left: 20
            pad_right: 20
            widgets:
              - obj:
                  id: alert_container
                  align: CENTER
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - obj:
                        align: CENTER
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        styles: style_transparent
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_column: 15
                        widgets:
                          - label: { id: alerte_slot_0, text: "", text_font: mdi_font_alert, text_color: color_text, hidden: true }
                          - label: { id: alerte_slot_1, text: "", text_font: mdi_font_alert, text_color: color_text, hidden: true }
                          - label: { id: alerte_slot_2, text: "", text_font: mdi_font_alert, text_color: color_text, hidden: true }
                          - label: { id: alerte_slot_3, text: "", text_font: mdi_font_alert, text_color: color_text, hidden: true }
                    - button:
                        id: btn_alerts_mf_tap
                        align: CENTER
                        width: 1180
                        height: 80
                        styles: style_invisible
                        on_short_click:
                          - script.execute: tab5_central_panel_next

              # Pluie Wrapper
              - obj:
                  id: rain_wrapper
                  align: CENTER
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - obj:
                        align: CENTER
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        styles: style_transparent
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_column: 15
                        widgets:
                          - label: { id: icon_rain_predict, text: "\U000F0597", text_font: mdi_font_alert, text_color: color_temp_min }
                          - obj:
                              id: rain_bar_container
                              width: SIZE_CONTENT
                              height: 50
                              styles: style_transparent
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: CENTER
                                flex_align_cross: END
                              widgets:
                                - obj: { id: rb_0, width: 25, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_0_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                                - obj: { id: rb_1, width: 25, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_1_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                                - obj: { id: rb_2, width: 25, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_2_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                                - obj: { id: rb_3, width: 25, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_3_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                                - obj: { id: rb_4, width: 25, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_4_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                                - obj: { id: rb_5, width: 25, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_5_in, align: BOTTOM_MID, width: 25, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                                - obj: { id: rb_6, width: 55, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_6_in, align: BOTTOM_MID, width: 55, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                                - obj: { id: rb_7, width: 55, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_7_in, align: BOTTOM_MID, width: 55, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                                - obj: { id: rb_8, width: 55, height: 50, bg_color: color_bar_inactive, border_width: 0, pad_all: 0, widgets: [{ obj: { id: rb_8_in, align: BOTTOM_MID, width: 55, height: 0, bg_color: color_bar_inactive, border_width: 0, radius: 0 } }] }
                          - obj:
                              width: SIZE_CONTENT
                              height: 100%
                              styles: style_transparent
                              layout:
                                type: FLEX
                                flex_flow: ROW
                                flex_align_main: CENTER
                                flex_align_cross: END
                                pad_column: 6
                              widgets:
                                - label: { id: lbl_proc_pluie, text: "Synchronisation...", text_font: roboto_45_b, text_color: color_text, pad_bottom: 15 }
                                - label: { id: lbl_pluie_val, text: "", text_font: roboto_45_b, text_color: color_orange_vif, pad_bottom: 10 }
                                - label: { id: lbl_pluie_unit, text: "", text_font: roboto_45_b, text_color: color_text, pad_bottom: 15 }
                    - button:
                        id: btn_rain_tap
                        align: CENTER
                        width: 1180
                        height: 80
                        styles: style_invisible
                        on_short_click:
                          - script.execute: tab5_central_panel_next

              # Réponse vocale IA (remplace le rotateur 8s le temps de l'affichage)
              - obj:
                  id: vocal_wrapper
                  align: CENTER
                  width: SIZE_CONTENT
                  height: 100%
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - label:
                        id: lbl_vocal_text
                        align: CENTER
                        y: 0
                        width: 1180
                        text: ""
                        text_font: roboto_45_b
                        text_color: color_text

              # Planning Wrapper
              - obj:
                  id: planning_wrapper
                  align: CENTER
                  width: SIZE_CONTENT
                  height: 100%
                  styles: style_transparent
                  widgets:
                    - label: { id: lbl_planning_text, text: "", align: CENTER, y: 0, text_font: roboto_45_b, text_color: color_text }
                    - button:
                        id: btn_planning_tap
                        align: CENTER
                        width: 1180
                        height: 80
                        styles: style_invisible
                        on_short_click:
                          - script.execute: tab5_central_panel_next

              # Titre de page previsions (pages horaires / journalieres 2-3, masque sur accueil)
              - obj:
                  id: page_title_wrapper
                  align: CENTER
                  width: SIZE_CONTENT
                  height: 100%
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - label: { id: lbl_page_title, text: "", align: CENTER, y: 4, text_font: roboto_45_b, text_color: color_text }

              # Info Wrapper (résumé test — panneau 3, tap météo = dismiss définitif)
              - obj:
                  id: info_wrapper
                  align: CENTER
                  width: SIZE_CONTENT
                  height: 100%
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - label: { id: lbl_info_text, text: "", align: CENTER, text_font: roboto_45_b, text_color: color_text }
                    - button:
                        id: btn_info_tap
                        align: CENTER
                        width: 1180
                        height: 80
                        styles: style_invisible
                        on_short_click:
                          - script.execute: tab5_dismiss_info_tap

              # Alertes HA individuelles (panneaux 4-7, tap = lu définitif + ligne suivante)
              - obj:
                  id: ha_alert_wrapper_0
                  align: CENTER
                  width: SIZE_CONTENT
                  height: 100%
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - button:
                        id: btn_ha_alert_tap_0
                        align: CENTER
                        width: 1180
                        height: 80
                        styles: style_invisible
                        on_short_click:
                          - script.execute: tab5_dismiss_ha_alert_0
                        widgets:
                          - label: { id: lbl_ha_alert_0, text: "", align: CENTER, text_font: roboto_45_b, text_color: color_text }

              - obj:
                  id: ha_alert_wrapper_1
                  align: CENTER
                  width: SIZE_CONTENT
                  height: 100%
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - button:
                        id: btn_ha_alert_tap_1
                        align: CENTER
                        width: 1180
                        height: 80
                        styles: style_invisible
                        on_short_click:
                          - script.execute: tab5_dismiss_ha_alert_1
                        widgets:
                          - label: { id: lbl_ha_alert_1, text: "", align: CENTER, text_font: roboto_45_b, text_color: color_text }

              - obj:
                  id: ha_alert_wrapper_2
                  align: CENTER
                  width: SIZE_CONTENT
                  height: 100%
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - button:
                        id: btn_ha_alert_tap_2
                        align: CENTER
                        width: 1180
                        height: 80
                        styles: style_invisible
                        on_short_click:
                          - script.execute: tab5_dismiss_ha_alert_2
                        widgets:
                          - label: { id: lbl_ha_alert_2, text: "", align: CENTER, text_font: roboto_45_b, text_color: color_text }

              - obj:
                  id: ha_alert_wrapper_3
                  align: CENTER
                  width: SIZE_CONTENT
                  height: 100%
                  styles: style_transparent
                  hidden: true
                  widgets:
                    - button:
                        id: btn_ha_alert_tap_3
                        align: CENTER
                        width: 1180
                        height: 80
                        styles: style_invisible
                        on_short_click:
                          - script.execute: tab5_dismiss_ha_alert_3
                        widgets:
                          - label: { id: lbl_ha_alert_3, text: "", align: CENTER, text_font: roboto_45_b, text_color: color_text }

        # ==================== PAGINATION BARS ====================
        - obj:
            id: pagination_container
            x: 480
            y: 424
            width: 310
            height: 10
            styles: style_transparent
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_column: 8
            widgets:
              - obj: { id: pbar_0, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }
              - obj: { id: pbar_1, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }
              - obj: { id: pbar_2, width: 30, height: 4, radius: 2, bg_color: color_text, bg_opa: 100%, border_width: 0 }
              - obj: { id: pbar_3, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }
              - obj: { id: pbar_4, width: 16, height: 4, radius: 2, bg_color: color_text_dim, bg_opa: 40%, border_width: 0 }

        # ==================== BOTTOM CARDS (FORECAST) ====================

