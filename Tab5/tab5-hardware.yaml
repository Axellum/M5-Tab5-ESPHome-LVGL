external_components:
  - source:
      type: local
      path: Tab5/my_components

esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_LWIP_TCP_WND_DEFAULT: "16384"        # AXE7: Fenetre TCP 16Ko pour OTA stable
      CONFIG_SPI_FLASH_YIELD_DURING_ERASE: "y"   # AXE7: Evite gel CPU pendant effacement flash OTA
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_360: "y"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ: "360"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"         # AXE7: WDT 15s (boot long possible si reseau lent)

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1
  sdio_frequency: 20MHz

logger:
  # ═══════════════════════════════════════════════════════════════════════
  # [05/07/2026] NE PAS REPASSER EN INFO SANS RELIRE CE COMMENTAIRE EN ENTIER.
  # ═══════════════════════════════════════════════════════════════════════
  # Bug historique (recurrent, plusieurs sessions, jamais diagnostique avant
  # ce jour) : apres un redemarrage LOGICIEL (OTA, bouton HA, esp_restart),
  # l'ecran reste NOIR alors que TOUT le reste fonctionne parfaitement
  # (WiFi connecte, API HA connectee, donnees meteo/planning recues, uptime
  # stable, aucun crash/watchdog/rollback). Seul un vrai debranchement
  # electrique (power cycle complet du GPIO expander PI4IOE5V6408, qui NE
  # SE RESET PAS avec l'ESP32 lui-meme) ramenait l'ecran de facon fiable.
  #
  # Diagnostic fait le 05/07/2026 (logs serie USB captures en direct
  # pendant plusieurs reboots reels, cf. historique de session) :
  #   - level: INFO (ou meme le niveau normal de prod)  -> ecran NOIR,
  #     reproduit 2 fois de suite ce soir-la.
  #   - level: VERY_VERBOSE                              -> ecran OK,
  #     reproduit 2 fois de suite juste apres.
  #   Dans les DEUX cas, le firmware rapporte un succes complet : "MIPI DSI
  #   setup complete", sequence d'init du panneau envoyee integralement
  #   (~25 commandes), LVGL flush_cb qui envoie bien une image 1280x720.
  #   Donc le firmware CROIT avoir reussi dans les deux cas — la difference
  #   observable n'est QUE le niveau de log.
  #
  # Hypothese la plus probable (NON CONFIRMEE, pas de certitude absolue) :
  #   le reset_pin de l'ecran (display: mipi_dsi:) passe par le GPIO
  #   expander I2C PI4IOE5V6408 (pas un GPIO natif ESP32) — chaque
  #   digital_write() dessus est une transaction I2C, plus lente et moins
  #   deterministe qu'un GPIO natif. Le composant ESPHome mipi_dsi.cpp fait
  #   bien un delai base sur millis() (120ms apres reset avant SLEEP_OUT),
  #   donc en theorie il ne devrait PAS dependre de la vitesse des logs —
  #   mais en pratique, le supplement de temps qu'ajoute VERY_VERBOSE
  #   (formatage + envoi UART de centaines de lignes par boot) semble
  #   laisser le bus I2C partage (touch, DAC ES8388, GPIO expander) se
  #   stabiliser suffisamment avant/pendant la sequence de reset ecran.
  #   A confirmer un jour avec un vrai oscilloscope sur le bus I2C ou en
  #   ouvrant un ticket upstream ESPHome/M5Stack — pas verifiable a distance.
  #
  # DONC : level: VERY_VERBOSE est laisse ACTIF EN PERMANENCE comme
  # garde-fou, pas comme reglage de debug temporaire. Inconvenients connus
  # et acceptes : plus lent, plus de trafic serie, expose plus de details
  # internes sur le port USB (pas un risque reseau, USB seulement).
  # Si vous voulez un jour repasser a INFO/DEBUG pour la proprete des logs :
  # ne le faites qu'apres AU MOINS 10 redemarrages logiciels consecutifs
  # (OTA + bouton HA + esp_restart) confirmes visuellement par un humain
  # regardant l'ecran a chaque fois - pas juste via les capteurs HA
  # (ha_api_status/uptime), qui restent "sains" meme quand l'ecran est noir.
  level: VERY_VERBOSE
  baud_rate: 115200
  hardware_uart: USB_SERIAL_JTAG
  tx_buffer_size: 2048

psram:
  mode: hex
  speed: 200MHz

ota:
  platform: esphome
  password: !secret ota_password
  on_end:
    then:
      - delay: 2s
      - button.press: btn_restart

safe_mode:
  num_attempts: 10
  boot_is_good_after: 30s

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
  - id: pi4ioe2
    address: 0x44

esp_ldo:
  - voltage: 2.5V
    channel: 3

display:
  - platform: mipi_dsi
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    pixel_mode: 16bit
    color_order: RGB
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: st7123
    interrupt_pin: GPIO23
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    update_interval: never
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    id: touch
    on_release:
      then:
        - if:
            condition:
              light.is_off: backlight
            then:
              - light.turn_on: backlight

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    on_turn_on:
      - lvgl.resume:
    on_turn_off:
      - lvgl.pause:


i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

audio_dac:
  - platform: es8388
    id: es8388_dac

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: stereo
    buffer_duration: 100ms
    timeout: 2000ms
    bits_per_sample: 16bit
    sample_rate: 48000

select:
  - platform: es8388
    dac_output:
      id: es8388_dac_output
      internal: true
  - platform: template
    name: "Tab5 DAC Output"
    id: tab5_dac_output_template
    options:
      - "LINE1"
      - "LINE2"
      - "BOTH"
    restore_value: true
    optimistic: true
    on_value:
      then:
        - select.set:
            id: es8388_dac_output
            option: !lambda "return x;"

media_player:
  - platform: speaker
    name: tab5_media_player
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing: tab5_microphone
          then:
            - micro_wake_word.stop:
    on_idle:
      - if:
          condition:
            - and:
                - not:
                    voice_assistant.is_running:
                - switch.is_on: tab5_wake_word_active
          then:
            - micro_wake_word.start:

micro_wake_word:
  id: mww
  models:
    - okay_nabu
  on_wake_word_detected:
    - logger.log: "DEBUG: WAKE WORD DETECTED !!"
    - if:
        condition:
          - switch.is_on: tab5_wake_word_active
          - api.connected:
        then:
          - voice_assistant.start:
              wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: tab5_microphone
  media_player: speaker_player
  micro_wake_word: mww
  on_listening:
    - logger.log: "DEBUG: VOICE_ASSISTANT on_listening"
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);' # Vert (Parlez)
  on_stt_end:
    - logger.log: "DEBUG: VOICE_ASSISTANT on_stt_end"
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::WARNING), LV_PART_MAIN);' # Orange (Analyse)
  on_tts_start:
    - logger.log: "DEBUG: VOICE_ASSISTANT on_tts_start"
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::INFO), LV_PART_MAIN);' # Bleu clair (Réponse)
  on_end:
    - logger.log: "DEBUG: VOICE_ASSISTANT on_end"
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);' # Gris (Repos)
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 3s    # AXE9: Augmente de 0.5s a 3s pour eviter coupure TTS longues
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing: tab5_speaker
    - if:
        condition:
          - switch.is_on: tab5_wake_word_active
        then:
          - micro_wake_word.start:
  on_error:
    - logger.log:
        format: "DEBUG: VOICE_ASSISTANT on_error: %s"
        args: [ "code.c_str()" ]
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::ERROR), LV_PART_MAIN);' # Rouge (Erreur)
    - delay: 2s
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);' # Retour gris
    - if:
        condition:
          - switch.is_on: tab5_wake_word_active
        then:
          - micro_wake_word.start:

button:
  - platform: restart
    id: btn_restart
    name: "Redémarrage Système"

debug:

