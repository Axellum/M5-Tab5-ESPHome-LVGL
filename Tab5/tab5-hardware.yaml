# [AI-CONTEXT]
# @file tab5-hardware.yaml
# @role Configuration bas niveau (I2C, I2S, DSI Display, Audio, DAC).
# @ai_instruction FICHIER CRITIQUE. Ne modifier AUCUNE broche GPIO ou fréquence I2C sans l'accord d'Axel.
# ============================================================================
external_components:
  - source:
      type: local
      path: Tab5/my_components

esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_LWIP_TCP_WND_DEFAULT: "16384"        # AXE7: Fenetre TCP 16Ko pour OTA stable
      CONFIG_SPI_FLASH_YIELD_DURING_ERASE: "y"   # AXE7: Evite gel CPU pendant effacement flash OTA
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_360: "y"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ: "360"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"         # AXE7: WDT 15s (boot long possible si reseau lent)

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1
  sdio_frequency: 20MHz

logger:
  # ═══════════════════════════════════════════════════════════════════════
  # [06/07/2026] CAUSE RACINE CONFIRMEE — ecran noir apres reboot logiciel.
  # ═══════════════════════════════════════════════════════════════════════
  # Bug historique (recurrent, plusieurs sessions) : apres un redemarrage
  # LOGICIEL (OTA, bouton HA, esp_restart), l'ecran restait NOIR alors que
  # TOUT le reste fonctionnait parfaitement (WiFi/API/donnees/uptime sains).
  # Contourne le 05/07/2026 par `level: VERY_VERBOSE` permanent (hasard :
  # les logs verbeux ajoutaient assez de temps pour masquer le vrai probleme).
  #
  # Cause reelle confirmee le 06/07/2026 (Axel present, ecran surveille en
  # direct a chaque reboot, 5 essais OTA) : le reset_pin de l'ecran
  # (display: mipi_dsi:) passe par le GPIO expander I2C PI4IOE5V6408 (pas un
  # GPIO natif) qui a besoin d'un peu de temps pour se stabiliser apres le
  # boot avant que son reset ait un effet fiable. Preuve par elimination :
  #   - INFO + action YAML `delay: 300ms`/`1000ms` entre l'init du GPIO
  #     expander (setup_priority::IO=900) et l'init ecran (DATA=600) ->
  #     ECRAN NOIR dans les 2 cas. Ces essais etaient en fait invalides :
  #     l'action `delay:` d'ESPHome n'est PAS bloquante (programme un
  #     callback via le scheduler et rend la main aussitot), donc l'ecran
  #     demarrait en realite SANS AUCUN delai reel injecte avant lui.
  #   - INFO + `lambda: delay(1000);` (delay() C bloquant, meme fonction que
  #     st7123_touchscreen.cpp utilise pour son propre reset), donc un vrai
  #     delai qui bloque Application::setup() avant l'init ecran -> ECRAN
  #     ALLUME, reproduit 3 fois de suite (voir esphome:on_boot:priority:700
  #     dans tab5-ha-hmi.yaml).
  # Donc : ce n'est pas la verbosite des logs qui compte, c'est le temps reel
  # ecoule avant de toucher le reset_pin. level: INFO peut etre garde (plus
  # rapide, moins de bruit serie) tant que le delai bloquant de 1s reste en
  # place dans tab5-ha-hmi.yaml. Meme si l'oscilloscope sur le bus I2C n'a
  # pas ete fait (pas verifiable a distance), la preuve experimentale directe
  # (delai reel present/absent = ecran OK/noir, teste et reteste) est solide.
  #
  # NE PAS retirer le delai bloquant de tab5-ha-hmi.yaml (esphome:on_boot:
  # priority:700) sans re-tester a fond — c'est lui le vrai garde-fou
  # desormais, pas le niveau de log.
  level: INFO
  baud_rate: 115200
  hardware_uart: USB_SERIAL_JTAG
  tx_buffer_size: 2048

psram:
  mode: hex
  speed: 200MHz

ota:
  platform: esphome
  password: !secret ota_password
  on_end:
    then:
      - delay: 2s
      - button.press: btn_restart

safe_mode:
  num_attempts: 10
  boot_is_good_after: 30s

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
  - id: pi4ioe2
    address: 0x44

esp_ldo:
  - voltage: 2.5V
    channel: 3

display:
  - platform: mipi_dsi
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    pixel_mode: 16bit
    color_order: RGB
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: st7123
    interrupt_pin: GPIO23
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    update_interval: never
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    id: touch
    on_release:
      then:
        - if:
            condition:
              light.is_off: backlight
            then:
              - light.turn_on: backlight

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
    on_turn_on:
      - lvgl.resume:
    on_turn_off:
      - lvgl.pause:


i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

audio_dac:
  - platform: es8388
    id: es8388_dac

speaker:
  - platform: i2s_audio
    id: tab5_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: stereo
    buffer_duration: 100ms
    timeout: 2000ms
    bits_per_sample: 16bit
    sample_rate: 48000

select:
  - platform: es8388
    dac_output:
      id: es8388_dac_output
      internal: true
  - platform: template
    name: "Tab5 DAC Output"
    id: tab5_dac_output_template
    options:
      - "LINE1"
      - "LINE2"
      - "BOTH"
    restore_value: true
    optimistic: true
    on_value:
      then:
        - select.set:
            id: es8388_dac_output
            option: !lambda "return x;"

media_player:
  - platform: speaker
    name: tab5_media_player
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing: tab5_microphone
          then:
            - micro_wake_word.stop:
    on_idle:
      - if:
          condition:
            - and:
                - not:
                    voice_assistant.is_running:
                - switch.is_on: tab5_wake_word_active
          then:
            - micro_wake_word.start:

micro_wake_word:
  id: mww
  stop_after_detection: false
  models:
    - okay_nabu
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true
  on_wake_word_detected:
    - logger.log:
        format: "DEBUG: WAKE WORD DETECTED (%s)"
        args: ['!lambda return wake_word;']
    - if:
        condition:
          lambda: 'return wake_word == "Stop";'
        then:
          - if:
              condition:
                lambda: 'return id(volet_en_mouvement);'
              then:
                - logger.log: "STOP volet local (wake Stop + mouvement)"
                - script.execute: tab5_volet_end_movement
                - homeassistant.service:
                    service: script.tab5_volet_action
                    data:
                      action: stop
                - script.execute: tab5_volet_stop_voice_feedback
                - lambda: |-
                    if (id(icon_mic_status) != nullptr) {
                      lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::WARNING), LV_PART_MAIN);
                    }
              else:
                - if:
                    condition:
                      and:
                        - lambda: 'return id(va_stop_armed);'
                        - or:
                            - speaker.is_playing:
                                id: tab5_speaker
                            - media_player.is_announcing:
                                id: speaker_player
                            - not:
                                voice_assistant.is_running:
                    then:
                      - logger.log: "STOP vocal (interrupt TTS/responding va_stop_armed)"
                      - script.execute: tab5_vocal_interrupt_and_listen
                    else:
                      - logger.log: "STOP wake ignoré (volet immobile, va_stop_armed=false)"
        else:
          - if:
              condition:
                and:
                  - lambda: 'return id(va_stop_armed);'
                  - or:
                      - speaker.is_playing:
                          id: tab5_speaker
                      - media_player.is_announcing:
                          id: speaker_player
                      - not:
                          voice_assistant.is_running:
              then:
                - logger.log: "Okay Nabu -> interrupt TTS/responding + re-ecoute"
                - script.execute: tab5_vocal_interrupt_and_listen
              else:
                - if:
                    condition:
                      and:
                        - switch.is_on: tab5_wake_word_active
                        - api.connected:
                    then:
                      - voice_assistant.start:
                          wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: tab5_microphone
  media_player: speaker_player
  micro_wake_word: mww
  on_listening:
    - logger.log: "DEBUG: VOICE_ASSISTANT on_listening"
    - lambda: |-
        lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN); // Vert (Parlez)
        if (id(lbl_assist_status) != nullptr) {
          lv_label_set_text(id(lbl_assist_status), "Écoute…");
          lv_obj_set_style_text_color(id(lbl_assist_status), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);
        }
    - script.execute: tab5_vocal_arm_stop
  on_stt_end:
    - logger.log: "DEBUG: VOICE_ASSISTANT on_stt_end"
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::WARNING), LV_PART_MAIN);' # Orange (Analyse)
    - script.execute: tab5_vocal_arm_stop
    # Popup assistant : affiche la demande reconnue (STT) + bascule en "Réflexion…"
    - lambda: |-
        assist_set_request(id(lbl_assist_request), x);
        if (id(lbl_assist_status) != nullptr) {
          lv_label_set_text(id(lbl_assist_status), "Analyse…");
          lv_obj_set_style_text_color(id(lbl_assist_status), lv_color_hex(UIColor::WARNING), LV_PART_MAIN);
        }
    - script.execute: tab5_assist_on_request
  on_tts_start:
    - logger.log: "DEBUG: VOICE_ASSISTANT on_tts_start"
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::INFO), LV_PART_MAIN);' # Bleu clair (Réponse)
    - script.execute: tab5_vocal_arm_stop
    # Réponse "par défaut" = texte parlé (TTS). Le moteur peut la remplacer par une
    # version riche (tableaux + image) via le service HA tab5_assist_reponse.
    - lambda: |-
        esphome::font::Font* f = id(assist_text_size) == 0 ? id(roboto_mono_20)
                               : (id(assist_text_size) == 2 ? id(roboto_mono_28) : id(roboto_mono_24));
        assist_set_response(id(lbl_assist_response), x, f);
        if (id(lbl_assist_status) != nullptr) {
          lv_label_set_text(id(lbl_assist_status), "Réponse");
          lv_obj_set_style_text_color(id(lbl_assist_status), lv_color_hex(UIColor::INFO), LV_PART_MAIN);
        }
  on_end:
    - logger.log: "DEBUG: VOICE_ASSISTANT on_end"
    - lambda: |-
        lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN); // Gris (Repos)
        if (id(lbl_assist_status) != nullptr) {
          lv_label_set_text(id(lbl_assist_status), "Prêt");
          lv_obj_set_style_text_color(id(lbl_assist_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
        }
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 3s    # AXE9: Augmente de 0.5s a 3s pour eviter coupure TTS longues
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing: tab5_speaker
    - if:
        condition:
          - switch.is_on: tab5_wake_word_active
        then:
          - micro_wake_word.start:
    - script.execute: tab5_vocal_disarm_stop
  on_error:
    - logger.log:
        format: "DEBUG: VOICE_ASSISTANT on_error: %s"
        args: [ "code.c_str()" ]
    - lambda: |-
        lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::ERROR), LV_PART_MAIN); // Rouge (Erreur)
        if (id(lbl_assist_status) != nullptr) {
          lv_label_set_text(id(lbl_assist_status), "Erreur");
          lv_obj_set_style_text_color(id(lbl_assist_status), lv_color_hex(UIColor::ERROR), LV_PART_MAIN);
        }
    - delay: 2s
    - lambda: 'lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);' # Retour gris
    - if:
        condition:
          - switch.is_on: tab5_wake_word_active
        then:
          - micro_wake_word.start:
    - script.execute: tab5_vocal_disarm_stop

# ─── Image de la réponse assistant (popup) ───────────────────────────────────
# Le moteur (via le service HA tab5_assist_reponse) fournit une URL d'image PNG ;
# le Tab5 la télécharge à la demande (online_image.set_url + update) et l'affiche
# dans le popup. Décodage en PSRAM (RGB565), redimensionné à la zone image.
http_request:
  id: assist_http
  timeout: 12s
  verify_ssl: false
  watchdog_timeout: 20s

online_image:
  - id: assist_response_image
    url: "http://127.0.0.1/placeholder.png"   # remplacé au runtime par set_url
    format: PNG
    type: RGB565
    resize: 760x360
    on_download_finished:
      - lambda: |-
          if (id(assist_img_widget) != nullptr) lv_obj_clear_flag(id(assist_img_widget), LV_OBJ_FLAG_HIDDEN);
          if (id(assist_img_hint) != nullptr) lv_obj_add_flag(id(assist_img_hint), LV_OBJ_FLAG_HIDDEN);
    on_error:
      - lambda: |-
          if (id(assist_img_hint) != nullptr) {
            lv_label_set_text(id(assist_img_hint), "Image indisponible");
            lv_obj_clear_flag(id(assist_img_hint), LV_OBJ_FLAG_HIDDEN);
          }
          if (id(assist_img_widget) != nullptr) lv_obj_add_flag(id(assist_img_widget), LV_OBJ_FLAG_HIDDEN);

button:
  - platform: restart
    id: btn_restart
    name: "Redémarrage Système"

