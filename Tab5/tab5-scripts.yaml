# [AI-CONTEXT]
# @file tab5-scripts.yaml
# @role Scripts ESPHome pour actions complexes (ex: toggle de lampes avec debounce).
# @ai_instruction Garder les scripts simples. La logique d'affichage pure doit aller dans le C++.
# ============================================================================
# tab5-scripts.yaml — Scripts ESPHome reutilisables (sequences temporisees,
# debounce). Preferer un script ici a un delay:+action duplique inline.
script:
  # Active le wake word interne « Stop » (désactivé par défaut par ESPHome, 2e modèle).
  # Uniquement via tab5_maj_volet_etat (push HA) — pas d'état optimiste au tap écran.
  - id: tab5_volet_end_movement
    mode: restart
    then:
      - globals.set:
          id: volet_en_mouvement
          value: 'false'
      - if:
          condition:
            lambda: 'return !id(va_stop_armed);'
          then:
            - micro_wake_word.disable_model:
                id: stop

  # Stop vocal local : annule un pipeline Okay Nabu en cours + TTS court (évite « aucune réponse reçue »).
  - id: tab5_volet_stop_voice_feedback
    mode: restart
    then:
      - voice_assistant.stop:
          id: va
      - homeassistant.service:
          service: assist_satellite.announce
          data:
            entity_id: assist_satellite.m5stack_tab5_home_assistant_hmi_satellite_assist
            message: "Volet arrêté."

  # Arme le flag d'interruption (Stop vocal local ne reçoit pas le micro pendant pipeline HA).
  - id: tab5_vocal_arm_stop
    mode: restart
    then:
      - globals.set:
          id: va_stop_armed
          value: 'true'

  - id: tab5_vocal_disarm_stop
    mode: restart
    then:
      - globals.set:
          id: va_stop_armed
          value: 'false'
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - if:
                condition:
                  lambda: 'return !id(volet_en_mouvement);'
                then:
                  - micro_wake_word.disable_model:
                      id: stop

  # Interruption : coupe pipeline local + satellite HA + TTS (sans relancer l'écoute).
  - id: tab5_vocal_interrupt
    mode: restart
    then:
      - globals.set:
          id: va_stop_armed
          value: 'false'
      - voice_assistant.stop:
          id: va
      - media_player.stop:
          id: speaker_player
      - homeassistant.service:
          service: assist_satellite.stop
          data:
            entity_id: assist_satellite.m5stack_tab5_home_assistant_hmi_satellite_assist
      - homeassistant.service:
          service: media_player.media_stop
          data:
            entity_id: media_player.m5stack_tab5_home_assistant_hmi_media_player
      - homeassistant.service:
          service: media_player.media_stop
          data:
            entity_id: media_player.m5stack_tab5_home_assistant_hmi_tab5_media_player
      - lambda: |-
          if (id(icon_mic_status) != nullptr) {
            lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
          }

  # Interruption puis ré-écoute immédiate (tap micro / barge-in Discussion).
  - id: tab5_vocal_interrupt_and_listen
    mode: restart
    then:
      - script.execute: tab5_vocal_interrupt
      - delay: 500ms
      - voice_assistant.start:
          id: va

  # Tap micro : coupe si assistant actif puis ré-écoute, sinon démarre (Click to Converse).
  - id: tab5_assist_toggle
    mode: restart
    then:
      - if:
          condition:
            or:
              - voice_assistant.is_running
              - lambda: 'return id(va_stop_armed);'
              - speaker.is_playing:
                  id: tab5_speaker
              - media_player.is_announcing:
                  id: speaker_player
          then:
            - logger.log: "Tap micro -> interrupt + re-ecoute"
            - script.execute: tab5_vocal_interrupt_and_listen
          else:
            - logger.log: "Tap micro -> start vocal"
            - voice_assistant.start:
                id: va

  # Debounce du slider volume : chaque glissement redémarre le délai, un seul
  # media_player.volume_set part réellement une fois le doigt immobile.
  - id: tab5_debounce_volume_set
    mode: restart
    then:
      - delay: 150ms
      - media_player.volume_set:
          id: speaker_player
          volume: !lambda 'return id(system_volume);'

  # Rotateur central auto (8s) — mode restart : tout tap/advance remet le délai à zéro.
  - id: tab5_central_rotator_auto
    mode: restart
    then:
      - delay: 8s
      - if:
          condition:
            and:
              - light.is_on: backlight
              - lambda: 'return !id(is_showing_temp_planning) && !id(is_showing_vocal_response) && id(forecast_page_index) == 2;'
          then:
            - lambda: |-
                advance_central_panel_rotator(id(current_central_panel),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
      - script.execute: tab5_central_rotator_auto

  # Réponse vocale IA : pause rotateur 8s, affichage + défilement si long, puis reprise.
  - id: tab5_show_vocal_response
    mode: restart
    parameters:
      texte: string
    then:
      - if:
          condition:
            lambda: 'return id(forecast_page_index) == 2 && texte.size() > 0;'
          then:
            - script.stop: tab5_central_rotator_auto
            - globals.set:
                id: is_showing_vocal_response
                value: 'true'
            - lambda: |-
                show_vocal_response_ui(texte,
                    id(vocal_wrapper), id(lbl_vocal_text),
                    id(page_title_wrapper), id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3),
                    id(current_central_panel), id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(roboto_45_b));
            - delay: 8s
            - lambda: |-
                hide_vocal_response_ui(
                    id(vocal_wrapper), id(lbl_vocal_text),
                    id(current_central_panel), id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - globals.set:
                id: is_showing_vocal_response
                value: 'false'
            - script.execute: tab5_central_rotator_auto

  # Tap navigation : planning / pluie / icônes MF → ligne suivante (sans dismiss HA).
  - id: tab5_central_panel_next
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(forecast_page_index) == 2 && !id(is_showing_temp_planning);'
          then:
            - lambda: |-
                advance_central_panel_rotator(id(current_central_panel),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - script.execute: tab5_central_rotator_auto

  # Tap panneau info (ligne météo HA) : dismiss définitif si vigilance, sinon navigation.
  - id: tab5_dismiss_info_tap
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(forecast_page_index) == 2 && !id(is_showing_temp_planning) && id(has_info);'
          then:
            - if:
                condition:
                  lambda: 'return id(info_meteo_dismiss_id).size() > 0;'
                then:
                  - lambda: |-
                      id(temp_dismiss_alert_id) = id(info_meteo_dismiss_id);
                      tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                      dismiss_central_info_immediate(id(has_info), id(current_central_panel),
                          id(lbl_info_text), id(info_wrapper),
                          id(has_rain), id(has_alerts),
                          id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                          id(planning_wrapper), id(rain_wrapper), id(alert_container),
                          id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
                  - homeassistant.service:
                      service: script.tab5_dismiss_alert
                      data:
                        alert_id: !lambda 'return id(temp_dismiss_alert_id);'
                  - globals.set:
                      id: temp_dismiss_alert_id
                      value: '""'
                else:
                  - lambda: |-
                      advance_central_panel_rotator(id(current_central_panel),
                          id(has_rain), id(has_alerts), id(has_info),
                          id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                          id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                          id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - script.execute: tab5_central_rotator_auto

  # Tap annonce HA (panneaux 4-7) : dismiss définitif + ligne suivante.
  - id: tab5_dismiss_ha_alert_0
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ha_alert_id_0).size() > 0;'
          then:
            - lambda: |-
                id(temp_dismiss_alert_id) = id(ha_alert_id_0);
                tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                dismiss_ha_alert_slot_immediate(0, id(current_central_panel),
                    id(ha_alert_wrapper_0), id(lbl_ha_alert_0), id(has_ha_alert_0), id(ha_alert_id_0),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - homeassistant.service:
                service: script.tab5_dismiss_alert
                data:
                  alert_id: !lambda 'return id(temp_dismiss_alert_id);'
            - script.execute: tab5_central_rotator_auto

  - id: tab5_dismiss_ha_alert_1
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ha_alert_id_1).size() > 0;'
          then:
            - lambda: |-
                id(temp_dismiss_alert_id) = id(ha_alert_id_1);
                tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                dismiss_ha_alert_slot_immediate(1, id(current_central_panel),
                    id(ha_alert_wrapper_1), id(lbl_ha_alert_1), id(has_ha_alert_1), id(ha_alert_id_1),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - homeassistant.service:
                service: script.tab5_dismiss_alert
                data:
                  alert_id: !lambda 'return id(temp_dismiss_alert_id);'
            - script.execute: tab5_central_rotator_auto

  - id: tab5_dismiss_ha_alert_2
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ha_alert_id_2).size() > 0;'
          then:
            - lambda: |-
                id(temp_dismiss_alert_id) = id(ha_alert_id_2);
                tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                dismiss_ha_alert_slot_immediate(2, id(current_central_panel),
                    id(ha_alert_wrapper_2), id(lbl_ha_alert_2), id(has_ha_alert_2), id(ha_alert_id_2),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - homeassistant.service:
                service: script.tab5_dismiss_alert
                data:
                  alert_id: !lambda 'return id(temp_dismiss_alert_id);'
            - script.execute: tab5_central_rotator_auto

  - id: tab5_dismiss_ha_alert_3
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ha_alert_id_3).size() > 0;'
          then:
            - lambda: |-
                id(temp_dismiss_alert_id) = id(ha_alert_id_3);
                tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                dismiss_ha_alert_slot_immediate(3, id(current_central_panel),
                    id(ha_alert_wrapper_3), id(lbl_ha_alert_3), id(has_ha_alert_3), id(ha_alert_id_3),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - homeassistant.service:
                service: script.tab5_dismiss_alert
                data:
                  alert_id: !lambda 'return id(temp_dismiss_alert_id);'
            - script.execute: tab5_central_rotator_auto

