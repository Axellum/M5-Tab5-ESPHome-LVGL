# [AI-CONTEXT]
# @file tab5-scripts.yaml
# @role Scripts ESPHome pour actions complexes (ex: toggle de lampes avec debounce).
# @ai_instruction Garder les scripts simples. La logique d'affichage pure doit aller dans le C++.
# ============================================================================
# tab5-scripts.yaml — Scripts ESPHome reutilisables (sequences temporisees,
# debounce). Preferer un script ici a un delay:+action duplique inline.
script:
  # Active le wake word interne « Stop » (désactivé par défaut par ESPHome, 2e modèle).
  # Uniquement via tab5_maj_volet_etat (push HA) — pas d'état optimiste au tap écran.
  - id: tab5_volet_end_movement
    mode: restart
    then:
      - globals.set:
          id: volet_en_mouvement
          value: 'false'
      - if:
          condition:
            lambda: 'return !id(va_stop_armed);'
          then:
            - micro_wake_word.disable_model:
                id: stop

  # Stop vocal local : annule un pipeline Okay Nabu en cours + TTS court (évite « aucune réponse reçue »).
  - id: tab5_volet_stop_voice_feedback
    mode: restart
    then:
      - voice_assistant.stop:
          id: va
      - homeassistant.service:
          service: assist_satellite.announce
          data:
            entity_id: assist_satellite.m5stack_tab5_home_assistant_hmi_satellite_assist
            message: "Volet arrêté."

  # Arme le flag d'interruption (Stop vocal local ne reçoit pas le micro pendant pipeline HA).
  - id: tab5_vocal_arm_stop
    mode: restart
    then:
      - globals.set:
          id: va_stop_armed
          value: 'true'

  - id: tab5_vocal_disarm_stop
    mode: restart
    then:
      - globals.set:
          id: va_stop_armed
          value: 'false'
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - if:
                condition:
                  lambda: 'return !id(volet_en_mouvement);'
                then:
                  - micro_wake_word.disable_model:
                      id: stop

  # Interruption : coupe pipeline local + satellite HA + TTS (sans relancer l'écoute).
  - id: tab5_vocal_interrupt
    mode: restart
    then:
      - globals.set:
          id: va_stop_armed
          value: 'false'
      - voice_assistant.stop:
          id: va
      - media_player.stop:
          id: speaker_player
      - homeassistant.service:
          service: assist_satellite.stop
          data:
            entity_id: assist_satellite.m5stack_tab5_home_assistant_hmi_satellite_assist
      - homeassistant.service:
          service: media_player.media_stop
          data:
            entity_id: media_player.m5stack_tab5_home_assistant_hmi_media_player
      - homeassistant.service:
          service: media_player.media_stop
          data:
            entity_id: media_player.m5stack_tab5_home_assistant_hmi_tab5_media_player
      - lambda: |-
          if (id(icon_mic_status) != nullptr) {
            lv_obj_set_style_text_color(id(icon_mic_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
          }

  # Interruption puis ré-écoute immédiate (tap micro / barge-in Discussion).
  - id: tab5_vocal_interrupt_and_listen
    mode: restart
    then:
      - script.execute: tab5_vocal_interrupt
      - delay: 500ms
      - voice_assistant.start:
          id: va

  # Tap micro : coupe si assistant actif puis ré-écoute, sinon démarre (Click to Converse).
  - id: tab5_assist_toggle
    mode: restart
    then:
      - if:
          condition:
            or:
              - voice_assistant.is_running
              - lambda: 'return id(va_stop_armed);'
              - speaker.is_playing:
                  id: tab5_speaker
              - media_player.is_announcing:
                  id: speaker_player
          then:
            - logger.log: "Tap micro -> interrupt + re-ecoute"
            - script.execute: tab5_vocal_interrupt_and_listen
          else:
            - logger.log: "Tap micro -> start vocal"
            - voice_assistant.start:
                id: va

  # Debounce du slider volume : chaque glissement redémarre le délai, un seul
  # media_player.volume_set part réellement une fois le doigt immobile.
  - id: tab5_debounce_volume_set
    mode: restart
    then:
      - delay: 150ms
      - media_player.volume_set:
          id: speaker_player
          volume: !lambda 'return id(system_volume);'

  # Debounce de l'arc luminosité du popup lumière : chaque tick de glissement
  # redémarre le délai, un seul light.turn_on part une fois le doigt immobile
  # (même contrainte que le volume — ne pas spammer HA à chaque tick).
  - id: tab5_debounce_light_brightness
    mode: restart
    then:
      - delay: 200ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: !lambda 'return id(current_light_entity);'
            brightness: !lambda 'return to_string(lv_arc_get_value(id(arc_light_brightness)));'

  # Debounce de la cible clim (arc + boutons ± du popup clim) : un seul
  # climate.set_temperature par geste — les taps rapides ± sont groupés, la
  # cible affichée est optimiste (update_clim_target_ui) en attendant le retour
  # HA via tab5_maj_clim. Force le mode "cool" si la clim est éteinte (Daikin
  # refuse set_temperature en mode off), comme les anciens boutons ±.
  - id: tab5_debounce_clim_temp
    mode: restart
    then:
      - delay: 250ms
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: ${entity_climate_salon}
            hvac_mode: !lambda 'return (id(clim_hvac_mode) == "off" || id(clim_hvac_mode).empty()) ? std::string("cool") : id(clim_hvac_mode);'
            temperature: !lambda 'return to_string(id(clim_target_temp));'

  # Recoloration centralisée des icônes clim (source unique de vérité) — lit les 4
  # globals clim_hvac_mode / clim_preset_mode / clim_fan_mode / clim_swing_mode et
  # applique toutes les couleurs (mode, presets, silence, oscillation, brise + couleur
  # de la cible). Appelé par le service tab5_maj_clim (retour HA, autoritaire) ET par
  # chaque bouton du popup (affichage OPTIMISTE au tap, avant le round-trip HA/Daikin
  # cloud qui peut prendre plusieurs secondes). Ainsi taper un bouton recolore l'icône
  # instantanément ; le retour HA re-applique l'état réel et corrige tout écart.
  # NB: display logic exceptionnellement en YAML ici (accès id() requis pour ~12 objets)
  # — même approche que l'ancienne coloration inline de tab5_maj_clim qu'il remplace.
  - id: tab5_clim_recolor
    mode: restart
    then:
      - lambda: |-
          if (id(popup_icon_clim_cool) == nullptr) return;

          const std::string& mode  = id(clim_hvac_mode);
          const std::string& preset = id(clim_preset_mode);
          const std::string& fan   = id(clim_fan_mode);
          const std::string& swing = id(clim_swing_mode);

          uint32_t c_cool_active   = UIColor::CLIM_COOL_ACTIVE;
          uint32_t c_cool_inactive = UIColor::CLIM_COOL_INACTIVE;
          uint32_t c_heat_active   = UIColor::CLIM_HEAT_ACTIVE;
          uint32_t c_heat_inactive = UIColor::CLIM_HEAT_INACTIVE;
          uint32_t c_off_active    = UIColor::CLIM_OFF_ACTIVE;
          uint32_t c_off_inactive  = UIColor::CLIM_OFF_INACTIVE;
          uint32_t c_inactive      = UIColor::CLIM_TRACK_INACTIVE;
          uint32_t c_eco           = UIColor::CLIM_ECO;

          // Couleur de la cible (Bleu si froid, Rouge si chaud, Blanc sinon)
          uint32_t c_target_color = UIColor::TEXT_PRIMARY;
          if (mode == "cool") c_target_color = UIColor::CLIM_COOL_ACTIVE;
          else if (mode == "heat") c_target_color = UIColor::CLIM_HEAT_ACTIVE;
          if (id(clim_target) != nullptr)
            lv_obj_set_style_text_color(id(clim_target), lv_color_hex(c_target_color), LV_PART_MAIN);
          if (id(clim_target_popup) != nullptr)
            lv_obj_set_style_text_color(id(clim_target_popup), lv_color_hex(c_target_color), LV_PART_MAIN);

          // Mode (Cool/Heat/Dry/Fan/Off)
          lv_obj_set_style_text_color(id(popup_icon_clim_cool), lv_color_hex(c_cool_inactive), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(popup_icon_clim_heat), lv_color_hex(c_heat_inactive), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(popup_icon_clim_dry),  lv_color_hex(c_cool_inactive), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(popup_icon_clim_fan),  lv_color_hex(c_inactive), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(popup_icon_clim_off),  lv_color_hex(c_off_inactive), LV_PART_MAIN);

          if (mode == "cool") {
            lv_obj_set_style_text_color(id(popup_icon_clim_cool), lv_color_hex(c_cool_active), LV_PART_MAIN);
          } else if (mode == "heat") {
            lv_obj_set_style_text_color(id(popup_icon_clim_heat), lv_color_hex(c_heat_active), LV_PART_MAIN);
          } else if (mode == "dry") {
            lv_obj_set_style_text_color(id(popup_icon_clim_dry), lv_color_hex(c_cool_active), LV_PART_MAIN);
          } else if (mode == "fan_only") {
            lv_obj_set_style_text_color(id(popup_icon_clim_fan), lv_color_hex(c_eco), LV_PART_MAIN);
          } else {
            lv_obj_set_style_text_color(id(popup_icon_clim_off), lv_color_hex(c_off_active), LV_PART_MAIN);
          }

          // Eco (preset "eco"/"away")
          if (preset == "eco" || preset == "away") {
            lv_obj_set_style_text_color(id(popup_icon_clim_eco), lv_color_hex(c_eco), LV_PART_MAIN);
          } else {
            lv_obj_set_style_text_color(id(popup_icon_clim_eco), lv_color_hex(c_inactive), LV_PART_MAIN);
          }

          // Boost
          if (preset == "boost") {
            lv_obj_set_style_text_color(id(popup_icon_clim_boost), lv_color_hex(c_heat_active), LV_PART_MAIN);
          } else {
            lv_obj_set_style_text_color(id(popup_icon_clim_boost), lv_color_hex(c_inactive), LV_PART_MAIN);
          }

          // Silence / Auto
          if (fan == "low" || fan == "quiet" || fan == "Silence") {
            lv_obj_set_style_text_color(id(popup_icon_clim_quiet), lv_color_hex(c_cool_active), LV_PART_MAIN);
          } else {
            lv_obj_set_style_text_color(id(popup_icon_clim_quiet), lv_color_hex(c_inactive), LV_PART_MAIN);
          }

          // Oscillation (windnice exclu : bouton "Brise" séparé)
          if (swing == "swing" || swing == "vertical" || swing == "horizontal" || swing == "both" || swing == "on" || swing == "3d") {
            lv_obj_set_style_text_color(id(popup_icon_clim_swing), lv_color_hex(c_cool_active), LV_PART_MAIN);
          } else {
            lv_obj_set_style_text_color(id(popup_icon_clim_swing), lv_color_hex(c_inactive), LV_PART_MAIN);
          }

          // Brise (Daikin Onecta "windnice")
          if (swing == "windnice") {
            lv_obj_set_style_text_color(id(popup_icon_clim_windnice), lv_color_hex(c_cool_active), LV_PART_MAIN);
          } else {
            lv_obj_set_style_text_color(id(popup_icon_clim_windnice), lv_color_hex(c_inactive), LV_PART_MAIN);
          }

  # Rotateur central auto (8s) — mode restart : tout tap/advance remet le délai à zéro.
  - id: tab5_central_rotator_auto
    mode: restart
    then:
      - delay: 8s
      - if:
          condition:
            and:
              - light.is_on: backlight
              - lambda: 'return !id(is_showing_temp_planning) && !id(is_showing_vocal_response) && id(forecast_page_index) == 2;'
          then:
            - lambda: |-
                advance_central_panel_rotator(id(current_central_panel),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
      - script.execute: tab5_central_rotator_auto

  # Réponse vocale IA : pause rotateur 8s, affichage + défilement si long, puis reprise.
  - id: tab5_show_vocal_response
    mode: restart
    parameters:
      texte: string
    then:
      - if:
          condition:
            lambda: 'return id(forecast_page_index) == 2 && texte.size() > 0;'
          then:
            - script.stop: tab5_central_rotator_auto
            - globals.set:
                id: is_showing_vocal_response
                value: 'true'
            - lambda: |-
                show_vocal_response_ui(texte,
                    id(vocal_wrapper), id(lbl_vocal_text),
                    id(page_title_wrapper), id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3),
                    id(current_central_panel), id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(roboto_45_b));
            - delay: 8s
            - lambda: |-
                hide_vocal_response_ui(
                    id(vocal_wrapper), id(lbl_vocal_text),
                    id(current_central_panel), id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - globals.set:
                id: is_showing_vocal_response
                value: 'false'
            - script.execute: tab5_central_rotator_auto

  # Tap navigation : planning / pluie / icônes MF → ligne suivante (sans dismiss HA).
  - id: tab5_central_panel_next
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(forecast_page_index) == 2 && !id(is_showing_temp_planning);'
          then:
            - lambda: |-
                advance_central_panel_rotator(id(current_central_panel),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - script.execute: tab5_central_rotator_auto

  # Tap panneau info (ligne météo HA) : dismiss définitif si vigilance, sinon navigation.
  - id: tab5_dismiss_info_tap
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(forecast_page_index) == 2 && !id(is_showing_temp_planning) && id(has_info);'
          then:
            - if:
                condition:
                  lambda: 'return id(info_meteo_dismiss_id).size() > 0;'
                then:
                  - lambda: |-
                      id(temp_dismiss_alert_id) = id(info_meteo_dismiss_id);
                      tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                      dismiss_central_info_immediate(id(has_info), id(current_central_panel),
                          id(lbl_info_text), id(info_wrapper),
                          id(has_rain), id(has_alerts),
                          id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                          id(planning_wrapper), id(rain_wrapper), id(alert_container),
                          id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
                  - homeassistant.service:
                      service: script.tab5_dismiss_alert
                      data:
                        alert_id: !lambda 'return id(temp_dismiss_alert_id);'
                  - globals.set:
                      id: temp_dismiss_alert_id
                      value: '""'
                else:
                  - lambda: |-
                      advance_central_panel_rotator(id(current_central_panel),
                          id(has_rain), id(has_alerts), id(has_info),
                          id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                          id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                          id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - script.execute: tab5_central_rotator_auto

  # Tap annonce HA (panneaux 4-7) : dismiss définitif + ligne suivante.
  - id: tab5_dismiss_ha_alert_0
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ha_alert_id_0).size() > 0;'
          then:
            - lambda: |-
                id(temp_dismiss_alert_id) = id(ha_alert_id_0);
                tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                dismiss_ha_alert_slot_immediate(0, id(current_central_panel),
                    id(ha_alert_wrapper_0), id(lbl_ha_alert_0), id(has_ha_alert_0), id(ha_alert_id_0),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - homeassistant.service:
                service: script.tab5_dismiss_alert
                data:
                  alert_id: !lambda 'return id(temp_dismiss_alert_id);'
            - script.execute: tab5_central_rotator_auto

  - id: tab5_dismiss_ha_alert_1
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ha_alert_id_1).size() > 0;'
          then:
            - lambda: |-
                id(temp_dismiss_alert_id) = id(ha_alert_id_1);
                tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                dismiss_ha_alert_slot_immediate(1, id(current_central_panel),
                    id(ha_alert_wrapper_1), id(lbl_ha_alert_1), id(has_ha_alert_1), id(ha_alert_id_1),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - homeassistant.service:
                service: script.tab5_dismiss_alert
                data:
                  alert_id: !lambda 'return id(temp_dismiss_alert_id);'
            - script.execute: tab5_central_rotator_auto

  - id: tab5_dismiss_ha_alert_2
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ha_alert_id_2).size() > 0;'
          then:
            - lambda: |-
                id(temp_dismiss_alert_id) = id(ha_alert_id_2);
                tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                dismiss_ha_alert_slot_immediate(2, id(current_central_panel),
                    id(ha_alert_wrapper_2), id(lbl_ha_alert_2), id(has_ha_alert_2), id(ha_alert_id_2),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - homeassistant.service:
                service: script.tab5_dismiss_alert
                data:
                  alert_id: !lambda 'return id(temp_dismiss_alert_id);'
            - script.execute: tab5_central_rotator_auto

  # Popup lumière : sélection + synchro complète (titre, surbrillance sélecteur, icônes
  # d'état, icône power, arc luminosité depuis l'attribut brightness HA) puis affichage.
  # Appelé par forecast_daily.yaml (long_press cartes j2/j3/j4) et par les 3 boutons du
  # sélecteur interne du popup. light_idx : 0=Chambre, 1=Salon, 2=LEDs.
  - id: tab5_light_popup_show
    mode: restart
    parameters:
      light_idx: int
    then:
      - lambda: |-
          if (light_idx < 0 || light_idx > 2) return;
          static const char* const kTitles[3] = {"Ampoule Chambre", "Ampoule Salon", "Ampoule LEDs"};
          static const char* const kEntities[3] = {"${entity_light_chambre}", "${entity_light_salon}", "${entity_light_bureau}"};
          id(current_light_entity) = kEntities[light_idx];
          const bool is_on[3] = { id(light_chambre_state).state == "on",
                                  id(light_salon_state).state == "on",
                                  id(light_led_state).state == "on" };
          const float brightness[3] = { id(light_chambre_brightness).state,
                                        id(light_salon_brightness).state,
                                        id(light_led_brightness).state };
          show_light_popup_ui(light_idx, kTitles, is_on, brightness,
              id(light_options_popup), id(popup_light_title),
              id(btn_light_sel_0), id(btn_light_sel_1), id(btn_light_sel_2),
              id(icon_light_sel_0), id(icon_light_sel_1), id(icon_light_sel_2),
              id(btn_light_power_icon), id(arc_light_brightness), id(lbl_light_brightness_val));

  # ═══ Popup calendrier (calendar_popup.yaml) ═══
  # Ouverture (appui long horloge) : vue = mois courant (SNTP), cache vidé pour
  # forcer des données HA fraîches, puis rendu local immédiat + requête HA.
  - id: tab5_calendar_open
    mode: restart
    then:
      - lambda: |-
          auto t = id(sntp_time).now();
          if (!t.is_valid()) return;  // pas d'heure SNTP -> pas de calendrier fiable
          cal_cache_clear();
          id(cal_view_year) = t.year;
          id(cal_view_month) = t.month;
          id(cal_detail_date) = "";
          lv_obj_add_flag(id(cal_day_popup), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(calendar_popup), LV_OBJ_FLAG_HIDDEN);
          lv_obj_move_foreground(id(calendar_popup));
      - script.execute: tab5_cal_render

  # Rendu du mois affiché : grille locale (numéros/aujourd'hui/weekend) tout de
  # suite, enrichissement HA (travail/férié/vacances/RDV) si le mois est en cache,
  # sinon requête script.tab5_calendrier_mois (le push re-déclenche ce rendu).
  - id: tab5_cal_render
    mode: restart
    then:
      - lambda: |-
          if (id(cal_view_year) == 0) return;
          CalCellUI cells[42] = {
              {id(cal_cell_0), id(cal_num_0), id(cal_sub_0), id(cal_dot_0), id(cal_dot2_0)},
              {id(cal_cell_1), id(cal_num_1), id(cal_sub_1), id(cal_dot_1), id(cal_dot2_1)},
