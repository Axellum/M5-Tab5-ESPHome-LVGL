              {id(cal_cell_20), id(cal_num_20), id(cal_sub_20), id(cal_dot_20), id(cal_dot2_20)},
              {id(cal_cell_21), id(cal_num_21), id(cal_sub_21), id(cal_dot_21), id(cal_dot2_21)},
              {id(cal_cell_22), id(cal_num_22), id(cal_sub_22), id(cal_dot_22), id(cal_dot2_22)},
              {id(cal_cell_23), id(cal_num_23), id(cal_sub_23), id(cal_dot_23), id(cal_dot2_23)},
              {id(cal_cell_24), id(cal_num_24), id(cal_sub_24), id(cal_dot_24), id(cal_dot2_24)},
              {id(cal_cell_25), id(cal_num_25), id(cal_sub_25), id(cal_dot_25), id(cal_dot2_25)},
              {id(cal_cell_26), id(cal_num_26), id(cal_sub_26), id(cal_dot_26), id(cal_dot2_26)},
              {id(cal_cell_27), id(cal_num_27), id(cal_sub_27), id(cal_dot_27), id(cal_dot2_27)},
