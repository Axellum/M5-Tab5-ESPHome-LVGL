              {id(cal_cell_12), id(cal_num_12), id(cal_sub_12), id(cal_dot_12), id(cal_dot2_12)},
              {id(cal_cell_13), id(cal_num_13), id(cal_sub_13), id(cal_dot_13), id(cal_dot2_13)},
              {id(cal_cell_14), id(cal_num_14), id(cal_sub_14), id(cal_dot_14), id(cal_dot2_14)},
              {id(cal_cell_15), id(cal_num_15), id(cal_sub_15), id(cal_dot_15), id(cal_dot2_15)},
              {id(cal_cell_16), id(cal_num_16), id(cal_sub_16), id(cal_dot_16), id(cal_dot2_16)},
              {id(cal_cell_17), id(cal_num_17), id(cal_sub_17), id(cal_dot_17), id(cal_dot2_17)},
              {id(cal_cell_18), id(cal_num_18), id(cal_sub_18), id(cal_dot_18), id(cal_dot2_18)},
