              {id(cal_cell_30), id(cal_num_30), id(cal_sub_30), id(cal_dot_30), id(cal_dot2_30)},
              {id(cal_cell_31), id(cal_num_31), id(cal_sub_31), id(cal_dot_31), id(cal_dot2_31)},
              {id(cal_cell_32), id(cal_num_32), id(cal_sub_32), id(cal_dot_32), id(cal_dot2_32)},
              {id(cal_cell_33), id(cal_num_33), id(cal_sub_33), id(cal_dot_33), id(cal_dot2_33)},
              {id(cal_cell_34), id(cal_num_34), id(cal_sub_34), id(cal_dot_34), id(cal_dot2_34)},
              {id(cal_cell_35), id(cal_num_35), id(cal_sub_35), id(cal_dot_35), id(cal_dot2_35)},
              {id(cal_cell_36), id(cal_num_36), id(cal_sub_36), id(cal_dot_36), id(cal_dot2_36)},
              {id(cal_cell_37), id(cal_num_37), id(cal_sub_37), id(cal_dot_37), id(cal_dot2_37)},
              {id(cal_cell_38), id(cal_num_38), id(cal_sub_38), id(cal_dot_38), id(cal_dot2_38)},
              {id(cal_cell_39), id(cal_num_39), id(cal_sub_39), id(cal_dot_39), id(cal_dot2_39)},
              {id(cal_cell_40), id(cal_num_40), id(cal_sub_40), id(cal_dot_40), id(cal_dot2_40)},
              {id(cal_cell_41), id(cal_num_41), id(cal_sub_41), id(cal_dot_41), id(cal_dot2_41)}
          };
          auto t = id(sntp_time).now();
          cal_render_month(cells, id(lbl_cal_month), id(cal_view_year), id(cal_view_month),
              t.is_valid() ? t.year : 0, t.is_valid() ? t.month : 0,
              t.is_valid() ? t.day_of_month : 0);
      - if:
          condition:
            lambda: 'return id(cal_view_year) != 0 && cal_month_needs_fetch(id(cal_view_year), id(cal_view_month));'
          then:
            - homeassistant.service:
                service: script.tab5_calendrier_mois
                data:
                  annee: !lambda 'return to_string(id(cal_view_year));'
                  mois: !lambda 'return to_string(id(cal_view_month));'

  # Navigation ◀ / ▶ / Aujourd'hui (le détail jour est refermé au changement de mois)
  - id: tab5_cal_prev
    mode: restart
    then:
      - lambda: |-
          if (id(cal_view_year) == 0) return;
          int m = id(cal_view_month) - 1;
          if (m < 1) { m = 12; id(cal_view_year) -= 1; }
          id(cal_view_month) = m;
          lv_obj_add_flag(id(cal_day_popup), LV_OBJ_FLAG_HIDDEN);
      - script.execute: tab5_cal_render

  - id: tab5_cal_next
    mode: restart
    then:
      - lambda: |-
          if (id(cal_view_year) == 0) return;
          int m = id(cal_view_month) + 1;
          if (m > 12) { m = 1; id(cal_view_year) += 1; }
          id(cal_view_month) = m;
          lv_obj_add_flag(id(cal_day_popup), LV_OBJ_FLAG_HIDDEN);
      - script.execute: tab5_cal_render

  - id: tab5_cal_today
    mode: restart
    then:
      - lambda: |-
          auto t = id(sntp_time).now();
          if (!t.is_valid()) return;
          id(cal_view_year) = t.year;
          id(cal_view_month) = t.month;
          lv_obj_add_flag(id(cal_day_popup), LV_OBJ_FLAG_HIDDEN);
      - script.execute: tab5_cal_render

  # Tap sur une cellule : ouvre le sous-popup détail ("Chargement..." ou "HA hors
  # ligne") puis demande le contenu du jour à HA (script.tab5_calendrier_jour).
  - id: tab5_cal_day_tap
    mode: restart
    parameters:
      cell_idx: int
    then:
      - lambda: |-
          id(cal_detail_date) = cal_date_for_cell(id(cal_view_year), id(cal_view_month), cell_idx);
          if (id(cal_detail_date).empty()) return;  // cellule vide (hors mois)
          CalDetailLineUI lines[6] = {
              {id(cal_det_icon_0), id(cal_det_txt_0)},
              {id(cal_det_icon_1), id(cal_det_txt_1)},
              {id(cal_det_icon_2), id(cal_det_txt_2)},
              {id(cal_det_icon_3), id(cal_det_txt_3)},
              {id(cal_det_icon_4), id(cal_det_txt_4)},
              {id(cal_det_icon_5), id(cal_det_txt_5)}
          };
          cal_show_day_detail_loading(id(cal_day_popup), id(lbl_cal_day_title),
              id(lbl_cal_day_status), lines, id(cal_detail_date), id(status_ha).state);
      - if:
          condition:
            lambda: 'return !id(cal_detail_date).empty() && id(status_ha).state;'
          then:
            - homeassistant.service:
                service: script.tab5_calendrier_jour
                data:
                  date: !lambda 'return id(cal_detail_date);'

  - id: tab5_dismiss_ha_alert_3
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(ha_alert_id_3).size() > 0;'
          then:
            - lambda: |-
                id(temp_dismiss_alert_id) = id(ha_alert_id_3);
                tab5_dismiss_local_add(id(tab5_dismissed_local), id(temp_dismiss_alert_id));
                dismiss_ha_alert_slot_immediate(3, id(current_central_panel),
                    id(ha_alert_wrapper_3), id(lbl_ha_alert_3), id(has_ha_alert_3), id(ha_alert_id_3),
                    id(has_rain), id(has_alerts), id(has_info),
                    id(has_ha_alert_0), id(has_ha_alert_1), id(has_ha_alert_2), id(has_ha_alert_3),
                    id(planning_wrapper), id(rain_wrapper), id(alert_container), id(info_wrapper),
                    id(ha_alert_wrapper_0), id(ha_alert_wrapper_1), id(ha_alert_wrapper_2), id(ha_alert_wrapper_3));
            - homeassistant.service:
                service: script.tab5_dismiss_alert
                data:
                  alert_id: !lambda 'return id(temp_dismiss_alert_id);'
            - script.execute: tab5_central_rotator_auto

  # ═══════════════════════════════════════════════════════════════════════════
  # Popup Assistant vocal (assistant_popup.yaml) — ouverture, réglages, réponse
  # ═══════════════════════════════════════════════════════════════════════════

  # Ouvre le popup plein écran + resynchronise l'affichage des réglages.
  - id: tab5_assist_open
    mode: restart
    then:
      - globals.set:
          id: assist_popup_open
          value: 'true'
      - lambda: |-
          lv_obj_clear_flag(id(assistant_popup), LV_OBJ_FLAG_HIDDEN);
          lv_obj_move_foreground(id(assistant_popup));
      - script.execute: tab5_assist_sync_settings

  - id: tab5_assist_close
    mode: restart
    then:
      - globals.set:
          id: assist_popup_open
          value: 'false'
      - lambda: 'lv_obj_add_flag(id(assistant_popup), LV_OBJ_FLAG_HIDDEN);'

  # Nouvelle demande reconnue : passe la réponse en "Réflexion..." et masque l'image
  # précédente. N'OUVRE le popup automatiquement qu'en mode Discussion (ou s'il est
  # déjà ouvert) — en mode Domotique, une commande courte ne doit pas voiler le
  # dashboard (le bandeau central 8 s reste le retour rapide). Long-press micro pour
  # ouvrir manuellement dans tous les cas.
  - id: tab5_assist_on_request
    mode: restart
    then:
      - lambda: |-
          esphome::font::Font* f = id(assist_text_size) == 0 ? id(roboto_mono_20)
                                 : (id(assist_text_size) == 2 ? id(roboto_mono_28) : id(roboto_mono_24));
          assist_set_response(id(lbl_assist_response), std::string("Reflexion..."), f);
          if (id(assist_img_widget) != nullptr) lv_obj_add_flag(id(assist_img_widget), LV_OBJ_FLAG_HIDDEN);
          if (id(assist_img_hint) != nullptr) lv_obj_add_flag(id(assist_img_hint), LV_OBJ_FLAG_HIDDEN);
      - if:
          condition:
            lambda: 'return id(conversation_mode) || id(assist_popup_open);'
          then:
            - script.execute: tab5_assist_open

  # Reflète l'état courant (pipeline/mute/wake/volume/taille) sur les contrôles du popup.
  - id: tab5_assist_sync_settings
    mode: restart
    then:
      - lambda: |-
          bool discu = id(conversation_mode);
          auto hl = [](lv_obj_t* b, bool on, uint32_t col){
            if (!b) return;
            lv_obj_set_style_border_color(b, lv_color_hex(on ? col : UIColor::GLASS_RIM), LV_PART_MAIN);
            lv_obj_set_style_border_opa(b, on ? LV_OPA_COVER : LV_OPA_40, LV_PART_MAIN);
            lv_obj_set_style_border_width(b, on ? 2 : 1, LV_PART_MAIN);
          };
          hl(id(btn_assist_pipe_domo), !discu, UIColor::INFO);
          hl(id(btn_assist_pipe_discu), discu, UIColor::SUCCESS);
          if (id(lbl_assist_wake) != nullptr) {
            bool wake = id(tab5_wake_word_active).state;
            lv_label_set_text(id(lbl_assist_wake), wake ? "Ok Nabu : ON" : "Ok Nabu : OFF");
            lv_obj_set_style_text_color(id(lbl_assist_wake),
                lv_color_hex(wake ? UIColor::SUCCESS : UIColor::TEXT_DIM), LV_PART_MAIN);
          }
          if (id(icon_assist_mute) != nullptr) {
            bool m = id(system_muted);
            lv_label_set_text(id(icon_assist_mute), m ? "\U000F0581" : "\U000F057E");
            lv_obj_set_style_text_color(id(icon_assist_mute),
                lv_color_hex(m ? UIColor::ERROR : UIColor::TEXT_SOFT), LV_PART_MAIN);
          }
          if (id(slider_assist_volume) != nullptr)
            lv_slider_set_value(id(slider_assist_volume), (int)(id(system_volume) * 100.0f + 0.5f), LV_ANIM_OFF);
      - lambda: |-
          assist_apply_text_size(id(lbl_assist_response), id(assist_text_size),
              id(roboto_mono_20), id(roboto_mono_24), id(roboto_mono_28),
              id(btn_assist_size_s), id(btn_assist_size_m), id(btn_assist_size_l));

  # Choix du cerveau (pipeline HA). discussion=true => LLM libre, false => domotique.
  # Centralise la mise à jour des boutons du dashboard ET du popup (source unique).
  - id: tab5_set_assist_mode
    mode: restart
    parameters:
      discussion: bool
    then:
      - globals.set:
          id: conversation_mode
          value: !lambda 'return discussion;'
      - homeassistant.service:
          service: select.select_option
          data:
            entity_id: ${entity_tab5_pipeline_select}
            option: !lambda 'return discussion ? std::string("Discussion LLM") : std::string("preferred");'
      - lambda: |-
          auto hl = [](lv_obj_t* b, bool on, uint32_t col){
            if (!b) return;
            lv_obj_set_style_border_color(b, lv_color_hex(on ? col : UIColor::GLASS_RIM), LV_PART_MAIN);
            lv_obj_set_style_border_opa(b, on ? LV_OPA_COVER : LV_OPA_40, LV_PART_MAIN);
            lv_obj_set_style_border_width(b, on ? 2 : 1, LV_PART_MAIN);
          };
          if (discussion) {
            lv_label_set_text(id(icon_mode_status), "\U000F0450");
            lv_obj_set_style_text_color(id(icon_mode_status), lv_color_hex(UIColor::INFO), LV_PART_MAIN);
          } else {
            lv_label_set_text(id(icon_mode_status), "\U000F07D0");
            lv_obj_set_style_text_color(id(icon_mode_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
          }
          hl(id(btn_mode_domo), !discussion, UIColor::INFO);
          hl(id(btn_mode_discu), discussion, UIColor::SUCCESS);
          hl(id(btn_assist_pipe_domo), !discussion, UIColor::INFO);
          hl(id(btn_assist_pipe_discu), discussion, UIColor::SUCCESS);

  # Taille de la police de réponse : 0=S 1=M 2=L (persisté, confort de lecture).
  - id: tab5_assist_set_text_size
    mode: restart
    parameters:
      size: int
    then:
      - globals.set:
          id: assist_text_size
          value: !lambda 'return size;'
      - lambda: |-
          assist_apply_text_size(id(lbl_assist_response), size,
              id(roboto_mono_20), id(roboto_mono_24), id(roboto_mono_28),
              id(btn_assist_size_s), id(btn_assist_size_m), id(btn_assist_size_l));

