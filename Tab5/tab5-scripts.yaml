# [AI-CONTEXT]
# @file tab5-scripts.yaml
# @role Scripts ESPHome pour actions complexes (ex: toggle de lampes avec debounce).
# @ai_instruction Garder les scripts simples. La logique d'affichage pure doit aller dans le C++.
# ============================================================================
# tab5-scripts.yaml — Scripts ESPHome reutilisables (sequences temporisees,
# debounce). Preferer un script ici a un delay:+action duplique inline.
script:
  - id: tab5_show_planning_temp
    mode: restart
    then:
      - lambda: |-
          id(is_showing_temp_planning) = true;
          lv_label_set_text(id(lbl_planning_text), id(temp_planning_text).c_str());
          lv_obj_clear_flag(id(planning_wrapper), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(alert_container), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(rain_wrapper), LV_OBJ_FLAG_HIDDEN);
          id(current_central_panel) = 0;
      - delay: 6s
      - lambda: |-
          id(is_showing_temp_planning) = false;
          std::string combined = id(plan_ligne_1);
          if (id(plan_ligne_2) != "") combined += "   |   " + id(plan_ligne_2);
          lv_label_set_text(id(lbl_planning_text), combined.c_str());

  # Debounce du slider volume : chaque glissement redémarre le délai, un seul
  # media_player.volume_set part réellement une fois le doigt immobile.
  - id: tab5_debounce_volume_set
    mode: restart
    then:
      - delay: 150ms
      - media_player.volume_set:
          id: speaker_player
          volume: !lambda 'return id(system_volume);'

