    type: bool
    initial_value: 'true'
  - id: volet_en_mouvement
    type: bool
    initial_value: 'false'
  - id: va_stop_armed
    type: bool
    initial_value: 'false'
    restore_value: false
  - id: clim_hvac_mode
    type: std::string
    initial_value: '"off"'
  - id: clim_preset_mode
    type: std::string
    initial_value: '"none"'
  - id: clim_fan_mode
    type: std::string
    initial_value: '"auto"'
  - id: clim_swing_mode
    type: std::string
    initial_value: '"stop"'
  - id: global_neige
    type: int
    initial_value: '0'
  - id: global_humidite
