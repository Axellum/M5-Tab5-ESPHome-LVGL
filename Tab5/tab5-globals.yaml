# [AI-CONTEXT]
# @file tab5-globals.yaml
# @role Variables globales de l'interface (état des volets, page courante, mode vocal).
# @ai_instruction Ne déclarer ici que les variables globales pures.
# ============================================================================
# tab5-globals.yaml — État partagé entre tous les packages (voir table complète
# dans Tab5/README.md). Règle : tout état lu/écrit par plus d'un fichier ou par
# deux handlers différents (ex: on_short_click + on_long_press) vit ici, jamais
# en `static` dans une lambda (cf. bug reboot_armed corrige le 05/07/2026).
globals:
  # Variables globales (vide, prêt à l'emploi)
  - id: active_page
    type: int
    initial_value: '0'
    restore_value: false
  - id: clim_target_temp
    type: float
    initial_value: '20.0'
