globals:
  # Variables globales (vide, prêt à l'emploi)
  - id: active_page
    type: int
    initial_value: '0'
    restore_value: false
  - id: clim_target_temp
    type: float
    initial_value: '20.0'
  - id: volet_target_open
    type: bool
    initial_value: 'true'
  - id: volet_en_mouvement
    type: bool
    initial_value: 'false'
  - id: clim_preset_mode
    type: std::string
    initial_value: '"none"'
  - id: clim_fan_mode
    type: std::string
    initial_value: '"auto"'
  - id: clim_swing_mode
    type: std::string
    initial_value: '"off"'
  - id: global_neige
    type: int
    initial_value: '0'
  - id: global_humidite
    type: float
    initial_value: '50.0'
  
  - id: plan_ligne_1
    type: std::string
    initial_value: '""'
  - id: plan_ligne_2
    type: std::string
    initial_value: '""'
  - id: plan_cycle_counter
    type: int
    initial_value: '0'
  - id: boot_complete
    type: bool
    initial_value: 'false'
    restore_value: false
  - id: forecast_page_index
    type: int
    initial_value: '2'
    restore_value: false
  - id: conversation_mode
    type: bool
    initial_value: 'false'
    restore_value: true
  - id: show_switches
    type: bool
    initial_value: 'false'
    restore_value: false

  - id: current_light_entity
    type: std::string
    initial_value: '""'
  - id: has_alerts
    type: bool
    initial_value: 'false'
  - id: has_rain
    type: bool
    initial_value: 'false'
  - id: current_central_panel
    type: int
    initial_value: '0'

interval:
  - interval: 6s
    then:
      - if:
          condition:
            light.is_on: backlight
          then:
            - lambda: |-
                int next_panel = id(current_central_panel);
                int attempts = 0;
                while (attempts < 3) {
                    next_panel = (next_panel + 1) % 3;
                    if (next_panel == 0) {
                        break; // Planning is always active
                    } else if (next_panel == 1 && id(has_rain)) {
                        break;
                    } else if (next_panel == 2 && id(has_alerts)) {
                        break;
                    }
                    attempts++;
                }
                if (next_panel != id(current_central_panel)) {
                    lv_obj_t* out_obj = nullptr;
                    lv_obj_t* in_obj = nullptr;
                    
                    if (id(current_central_panel) == 0) out_obj = id(planning_wrapper);
                    else if (id(current_central_panel) == 1) out_obj = id(rain_wrapper);
                    else if (id(current_central_panel) == 2) out_obj = id(alert_container);
                    
                    if (next_panel == 0) in_obj = id(planning_wrapper);
                    else if (next_panel == 1) in_obj = id(rain_wrapper);
                    else if (next_panel == 2) in_obj = id(alert_container);
                    
                    transition_widgets(out_obj, in_obj);
                    id(current_central_panel) = next_panel;
                }


