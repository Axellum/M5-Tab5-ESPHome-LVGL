# ============================================================================
# [AI-CONTEXT]
# @file user_entities.example.yaml
# @role Modèle public des entity IDs Home Assistant (substitutions ESPHome).
# @ai_instruction Copier vers Tab5/user_entities.yaml puis adapter à votre HA.
#   Ne jamais committer user_entities.yaml (gitignoré, comme secrets.yaml).
# ============================================================================
#
# Setup (une fois après clone) :
#   cp Tab5/user_entities.example.yaml Tab5/user_entities.yaml
# Puis remplacez chaque valeur par vos entity IDs (Réglages → Entités dans HA).

entity_tracker_pc: switch.your_pc_or_device_tracker
entity_tracker_tv: media_player.your_tv
entity_tv_remote: remote.your_tv
entity_phone_battery: sensor.your_phone_battery

# --- Lumières ---
entity_light_chambre: light.your_bedroom_light
entity_light_salon: light.your_living_room_light
entity_light_bureau: light.your_office_light

# --- Climatisation ---
entity_climate_salon: climate.your_living_room_climate

# --- Assistant vocal ---
entity_tab5_pipeline_select: select.your_tab5_assistant_pipeline

# --- Console Système (bouton "MAJ Écran" de la carte GESTION) ---
# Flag qui conditionne les automations de push + automation de push écran
entity_primary_active: input_boolean.your_primary_active_flag
entity_push_automation: automation.your_tab5_push_automation

# --- Température & humidité ---
entity_temp_salon: sensor.your_living_room_temperature
entity_hum_salon: sensor.your_living_room_humidity
entity_temp_chambre: sensor.your_bedroom_temperature
entity_hum_chambre: sensor.your_bedroom_humidity
entity_temp_plante: sensor.your_plant_area_temperature

# --- Plantes (humidité du sol, jusqu'à 5 capteurs) ---
entity_plante_1: sensor.your_plant_1_moisture
entity_plante_2: sensor.your_plant_2_moisture
entity_plante_3: sensor.your_plant_3_moisture
entity_plante_4: sensor.your_plant_4_moisture
entity_plante_5: sensor.your_plant_5_moisture

# --- Détails pots (popup appui long) : conductivité EC, éclairement, température,
#     batterie de chaque capteur. Capteurs BLE type Xiaomi/HHCC Flower Care. ---
entity_plante_1_ec: sensor.your_plant_1_conductivity
entity_plante_1_lux: sensor.your_plant_1_illuminance
entity_plante_1_temp: sensor.your_plant_1_temperature
entity_plante_1_bat: sensor.your_plant_1_battery
entity_plante_2_ec: sensor.your_plant_2_conductivity
entity_plante_2_lux: sensor.your_plant_2_illuminance
entity_plante_2_temp: sensor.your_plant_2_temperature
entity_plante_2_bat: sensor.your_plant_2_battery
entity_plante_3_ec: sensor.your_plant_3_conductivity
entity_plante_3_lux: sensor.your_plant_3_illuminance
entity_plante_3_temp: sensor.your_plant_3_temperature
entity_plante_3_bat: sensor.your_plant_3_battery
entity_plante_4_ec: sensor.your_plant_4_conductivity
entity_plante_4_lux: sensor.your_plant_4_illuminance
entity_plante_4_temp: sensor.your_plant_4_temperature
entity_plante_4_bat: sensor.your_plant_4_battery
entity_plante_5_ec: sensor.your_plant_5_conductivity
entity_plante_5_lux: sensor.your_plant_5_illuminance
entity_plante_5_temp: sensor.your_plant_5_temperature
entity_plante_5_bat: sensor.your_plant_5_battery

# --- Layout météo (généralement inchangé) ---
meteo_cell_width: "230"
meteo_cell_height: "275"
meteo_cell_y: "5"
