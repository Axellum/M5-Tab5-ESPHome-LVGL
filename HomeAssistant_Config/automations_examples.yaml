- alias: "MAJ Ecran Tab5 ESPHome Push"
  mode: single
  id: tab5_ha_hmi_updater
  trigger:
    - platform: state
      entity_id: weather.saint_vincent_de_tyrosse
    - platform: state
      entity_id: climate.daikinap71273_room_temperature
    - platform: state
      entity_id: sensor.saint_vincent_de_tyrosse_next_rain
    - platform: state
      entity_id: sensor.phrase_prochaine_pluie
    - platform: time_pattern
      minutes: "/10"
    - platform: event
      event_type: esphome.tab5_connected
    - platform: state
      entity_id: calendar.axxxums_gmail_com

  action:
    # ====== 1. MISE A JOUR MINUTE PAR MINUTE DE LA PHRASE PLUIE ET ALERTES ======
    - action: esphome.tab5_ha_hmi_tab5_maj_alerte_meteo_france
      data:
        phrase_pluie: "{{ states('sensor.phrase_prochaine_pluie') }}"
        globale: "{{ states('sensor.40_weather_alert') | capitalize }}"
        vent: "{{ state_attr('sensor.40_weather_alert', 'Vent violent') | default('Vert', true) | capitalize }}"
        inondation: "{{ state_attr('sensor.40_weather_alert', 'Crues') | default('Vert', true) | capitalize }}"
        orages: "{{ state_attr('sensor.40_weather_alert', 'Orages') | default('Vert', true) | capitalize }}"
        pluie_inondation: "{{ state_attr('sensor.40_weather_alert', 'Pluie-inondation') | default('Vert', true) | capitalize }}"
        neige_verglas: "{{ state_attr('sensor.40_weather_alert', 'Neige-verglas') | default('Vert', true) | capitalize }}"
        grand_froid: "{{ state_attr('sensor.40_weather_alert', 'Grand-froid') | default('Vert', true) | capitalize }}"
        vagues_submersion: "{{ state_attr('sensor.40_weather_alert', 'Vagues-submersion') | default('Vert', true) | capitalize }}"
        canicule: "{{ state_attr('sensor.40_weather_alert', 'Canicule') | default('Vert', true) | capitalize }}"
        avalanches: "{{ state_attr('sensor.40_weather_alert', 'Avalanches') | default('Vert', true) | capitalize }}"

    - delay: "00:00:00.05"

    # ====== 2. INTERRUPTION SI C'EST JUSTE LE REBOURS MINUTE ======
    - condition: template
      value_template: >
        {{ trigger.platform != 'state' or trigger.entity_id != 'sensor.phrase_prochaine_pluie' }}

    # ====== 3. METEO ACTUELLE ======
    - action: esphome.tab5_ha_hmi_tab5_maj_meteo_actuelle
      data:
        condition: "{{ states('weather.saint_vincent_de_tyrosse') }}"
        temperature: "{{ state_attr('weather.saint_vincent_de_tyrosse', 'temperature') | float(0) }}"
        humidite: "{{ state_attr('weather.saint_vincent_de_tyrosse', 'humidity') | float(0) }}"

    - delay: "00:00:00.05"
    
    # ====== 4. PROBABILITES ======
    - action: esphome.tab5_ha_hmi_tab5_maj_probabilites
      data:
        uv: "{{ states('sensor.saint_vincent_de_tyrosse_uv') | int(0) }}"
        gel: "{{ states('sensor.saint_vincent_de_tyrosse_freeze_chance') | int(0) }}"
        neige: "{{ states('sensor.saint_vincent_de_tyrosse_snow_chance') | int(0) }}"

    - delay: "00:00:00.05"
    # ====== 4. METEO PLUIE 1H (9 barres : 0,5,10,15,20,25 puis 35,45,55) ======
    - repeat:
        count: 9
        sequence:
          - action: esphome.tab5_ha_hmi_tab5_maj_pluie_1h
            data:
              index_5mn: "{{ repeat.index - 1 }}"
              intensite: >
                {% set fc = state_attr('sensor.saint_vincent_de_tyrosse_next_rain', '1_hour_forecast') %}
                {% set keys = ['0 min', '5 min', '10 min', '15 min', '20 min', '25 min', '35 min', '45 min', '55 min'] %}
                {% set k = keys[repeat.index - 1] %}
                {{ fc.get(k, 'Inconnu') if fc is not none else 'Inconnu' }}
          - delay:
              milliseconds: 50

    - delay: "00:00:00.05"
    # ====== 5. 5 JOURS DE PREVISIONS METEO & CALENDRIER ======
    - action: calendar.get_events
      data:
        start_date_time: "{{ now().strftime('%Y-%m-%d 00:00:00') }}"
        end_date_time: "{{ (now() + timedelta(days=15)).strftime('%Y-%m-%d 23:59:59') }}"
      target:
        entity_id: calendar.axxxums_gmail_com
      response_variable: agenda_events
    - action: weather.get_forecasts
      data:
        type: daily
      target:
        entity_id: weather.saint_vincent_de_tyrosse
      response_variable: daily_var
    - repeat:
        count: 15
        sequence:
          - action: esphome.tab5_ha_hmi_tab5_maj_previsions_jours
            data:
              jour: "{{ repeat.index - 1 }}"
              nom_jour: >
                {% set target_dt = now() + timedelta(days=repeat.index - 1) %}
                {% set days = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"] %}
                {% if repeat.index == 1 %}
                  Auj {{ target_dt.strftime('%d') }}
                {% else %}
                  {{ days[target_dt.strftime('%w') | int] }} {{ target_dt.strftime('%d') }}
                {% endif %}
              condition: >
                {% set fcasts = daily_var['weather.saint_vincent_de_tyrosse'].forecast %}
                {{ fcasts[repeat.index - 1].condition | default('unknown') if (repeat.index - 1) < fcasts|length else 'unknown' }}
              tmin: >
                {% set fcasts = daily_var['weather.saint_vincent_de_tyrosse'].forecast %}
                {{ fcasts[repeat.index - 1].templow | float(0) if (repeat.index - 1) < fcasts|length else 0 }}
              tmax: >
                {% set fcasts = daily_var['weather.saint_vincent_de_tyrosse'].forecast %}
                {{ fcasts[repeat.index - 1].temperature | float(0) if (repeat.index - 1) < fcasts|length else 0 }}
              est_passe: >
                {% set fcasts = daily_var['weather.saint_vincent_de_tyrosse'].forecast %}
                {{ 'false' if (repeat.index - 1) < fcasts|length else 'true' }}
              est_repos: >
                {% set target_date = (now() + timedelta(days=repeat.index - 1)).strftime('%Y-%m-%d') %}
                {% set ns = namespace(travail=false) %}
                {% if agenda_events['calendar.axxxums_gmail_com'] is defined %}
                  {% for event in agenda_events['calendar.axxxums_gmail_com'].events %}
                    {% set ev_start = event.start | default(event.start_time, '') | string %}
                    {% set ev_end = event.end | default(event.end_time, '') | string %}
                    {% set ev_msg = event.summary | default(event.message, '') | string %}
                    {% if target_date in ev_start or target_date in ev_end %}
                      {% if 'Travail' in ev_msg %}
                        {% set ns.travail = true %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
                {{ not ns.travail }}
              est_dimanche: >
                {% set target_date = now() + timedelta(days=repeat.index - 1) %}
                {{ target_date.strftime('%w') == '0' }}
              heures_ouverture: >
                {% set target_date = (now() + timedelta(days=repeat.index - 1)).strftime('%Y-%m-%d') %}
                {% set ns = namespace(heures="") %}
                {% if agenda_events['calendar.axxxums_gmail_com'] is defined %}
                  {% for event in agenda_events['calendar.axxxums_gmail_com'].events %}
                    {% set ev_start = event.start | default(event.start_time, '') | string %}
                    {% set ev_end = event.end | default(event.end_time, '') | string %}
                    {% set ev_msg = event.summary | default(event.message, '') | string %}
                    {% if target_date in ev_start %}
                      {% if 'Travail' in ev_msg %}
                        {% set start_dt = ev_start | as_datetime %}
                        {% set end_dt = ev_end | as_datetime %}
                        {% set em = start_dt.strftime('%H:%M') if start_dt else '??' %}
                        {% set de = end_dt.strftime('%H:%M') if end_dt else '??' %}
                        {% set ns.heures = em ~ "-" ~ de %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
                {{ ns.heures }}
          - delay:
              milliseconds: 50

    # ====== 6. CLIMATISATION ======
    - action: esphome.tab5_ha_hmi_tab5_maj_clim
      data:
        target: "{{ state_attr('climate.daikinap71273_room_temperature', 'temperature') | float(20) }}"
        current: "{{ state_attr('climate.daikinap71273_room_temperature', 'current_temperature') | float(20) }}"
        mode: "{{ states('climate.daikinap71273_room_temperature') }}"
        preset: "{{ state_attr('climate.daikinap71273_room_temperature', 'preset_mode') | default('none', true) }}"
        fan: "{{ state_attr('climate.daikinap71273_room_temperature', 'fan_mode') | default('auto', true) }}"
        swing: "{{ state_attr('climate.daikinap71273_room_temperature', 'swing_mode') | default('off', true) }}"
        
    - delay: "00:00:00.05"
    # ====== X. ETAT VOLET ======
    - action: esphome.tab5_ha_hmi_tab5_maj_volet_etat
      data:
        etat_physique: >
          {% if is_state('input_boolean.volet_serre_mouvement', 'on') %}
            En_mouvement
          {% else %}
            {{ states('input_text.volet_serre_etat') }}
          {% endif %}

    - delay: "00:00:00.05"
    # ====== Y. PLANNING HORAIRE (TEXTE TAB5) ======
    - action: esphome.tab5_ha_hmi_tab5_maj_planning
      data:
        ligne1: >
          {% set ns = namespace(lignes=[]) %}
          {% set now_dt = now() %}
          {% if agenda_events['calendar.axxxums_gmail_com'] is defined %}
            {% for event in agenda_events['calendar.axxxums_gmail_com'].events %}
              {% if 'Travail' in event.summary|default(event.message, '') %}
                {% set start_dt = event.start | as_datetime %}
                {% set end_dt = event.end | as_datetime %}
                
                {% set is_auj = start_dt.date() == now_dt.date() %}
                {% set is_demain = start_dt.date() == (now_dt + timedelta(days=1)).date() %}
                
                {% if is_auj %}
                  {% set j_name = "Auj." %}
                {% elif is_demain %}
                  {% set j_name = "Dem." %}
                {% else %}
                  {% set j_name = ["Dim.","Lun.","Mar.","Mer.","Jeu.","Ven.","Sam."][start_dt.strftime('%w')|int] %}
                {% endif %}

                {% set em = start_dt.strftime('%H:%M') %}
                {% set de = end_dt.strftime('%H:%M') %}
                {% set is_early = start_dt.hour < 9 %}
                {% set hex = "ff8888" if is_early else "ffffff" %}
                
                {% if is_demain %}
                  {% set j_name_colored = "#44aaff " ~ j_name ~ "#" %}
                {% else %}
                  {% set j_name_colored = "#" ~ hex ~ " " ~ j_name ~ "#" %}
                {% endif %}
                
                {% set line_str = (ns.lignes|length + 1)|string ~ "/ " ~ j_name_colored ~ " : #" ~ hex ~ " " ~ em ~ "-" ~ de ~ "#" %}
                
                {% if is_auj %}
                   {% if now_dt.timestamp() < start_dt.timestamp() %}
                      {% set ns.lignes = ns.lignes + [line_str] %}
                   {% endif %}
                {% elif start_dt.date() > now_dt.date() %}
                   {% set ns.lignes = ns.lignes + [line_str] %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.lignes[0] if ns.lignes|length > 0 else "#aaaaaa Aucun travail de prevu#" }}
        ligne2: >
          {% set ns = namespace(lignes=[]) %}
          {% set now_dt = now() %}
          {% if agenda_events['calendar.axxxums_gmail_com'] is defined %}
            {% for event in agenda_events['calendar.axxxums_gmail_com'].events %}
              {% if 'Travail' in event.summary|default(event.message, '') %}
                {% set start_dt = event.start | as_datetime %}
                {% set end_dt = event.end | as_datetime %}
                
                {% set is_auj = start_dt.date() == now_dt.date() %}
                {% set is_demain = start_dt.date() == (now_dt + timedelta(days=1)).date() %}
                
                {% if is_auj %}
                  {% set j_name = "Auj." %}
                {% elif is_demain %}
                  {% set j_name = "Dem." %}
                {% else %}
                  {% set j_name = ["Dim.","Lun.","Mar.","Mer.","Jeu.","Ven.","Sam."][start_dt.strftime('%w')|int] %}
                {% endif %}

                {% set em = start_dt.strftime('%H:%M') %}
                {% set de = end_dt.strftime('%H:%M') %}
                {% set is_early = start_dt.hour < 9 %}
                {% set hex = "ff8888" if is_early else "ffffff" %}
                
                {% if is_demain %}
                  {% set j_name_colored = "#44aaff " ~ j_name ~ "#" %}
                {% else %}
                  {% set j_name_colored = "#" ~ hex ~ " " ~ j_name ~ "#" %}
                {% endif %}
                
                {% set line_str = (ns.lignes|length + 1)|string ~ "/ " ~ j_name_colored ~ " : #" ~ hex ~ " " ~ em ~ "-" ~ de ~ "#" %}
                
                {% if is_auj %}
                   {% if now_dt.timestamp() < start_dt.timestamp() %}
                      {% set ns.lignes = ns.lignes + [line_str] %}
                   {% endif %}
                {% elif start_dt.date() > now_dt.date() %}
                   {% set ns.lignes = ns.lignes + [line_str] %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.lignes[1] if ns.lignes|length > 1 else "" }}
        
    - delay: "00:00:00.05"
    # ====== 7. ZONE D'INFO (CALENDRIER ET ALERTES) ======
    - action: esphome.tab5_ha_hmi_tab5_maj_info_texte
      data:
        texte: >
          {% set alerte = states('sensor.40_weather_alert') %}
          {% if alerte == 'Rouge' or alerte == 'Orange' %}
             Alerte Météo {{ alerte }} en cours ! Restez prudent.
          {% else %}
            {% set ns = namespace(texte="") %}
            {% set days = ["Dim.", "Lun.", "Mar.", "Mer.", "Jeu.", "Ven.", "Sam."] %}
            {% for i in range(0, 3) %}
               {% set target_dt = now() + timedelta(days=i) %}
               {% set target_str = target_dt.strftime('%Y-%m-%d') %}
               {% set j_name = "Auj." if i == 0 else ("Dem." if i == 1 else days[target_dt.strftime('%w')|int]) %}
               
               {% set travail = false %}
               {% set em = "" %}
               {% set de = "" %}
               {% if agenda_events['calendar.axxxums_gmail_com'] is defined %}
                 {% for event in agenda_events['calendar.axxxums_gmail_com'].events %}
                   {% set ev_start = event.start | default(event.start_time, '') | string %}
                   {% set ev_end = event.end | default(event.end_time, '') | string %}
                   {% set ev_msg = event.summary | default(event.message, '') | string %}
                   {% if target_str in ev_start %}
                     {% if 'Travail' in ev_msg %}
                        {% set travail = true %}
                        {% set start_dt = ev_start | as_datetime %}
                        {% set end_dt = ev_end | as_datetime %}
                        {% set em = start_dt.strftime('%H:%M') if start_dt else '??' %}
                        {% set de = end_dt.strftime('%H:%M') if end_dt else '??' %}
                     {% endif %}
                   {% endif %}
                 {% endfor %}
               {% endif %}
               
               {% set hex = "ffffff" %}
               {% if i == 0 %}
                 {% set hex = "4d94ff" %}
               {% elif target_dt.strftime('%w') == '0' %}
                 {% set hex = "ffa500" if not travail else "ff4d4d" %}
               {% elif not travail %}
                 {% set hex = "4cd964" %}
               {% elif em != "" and ((em[:2]|int < 9) or (em[:2]|int == 9 and em[3:5]|int == 0)) %}
                 {% set hex = "ff8888" %}
               {% endif %}
               
               {% set ligne = "#" ~ hex ~ " " ~ j_name ~ " : " ~ (em ~ "-" ~ de if travail else "Repos") ~ "#" %}
               {% if i == 0 %}
                 {% set ns.texte = ligne %}
               {% else %}
                 {% set ns.texte = ns.texte ~ "\n" ~ ligne %}
               {% endif %}
            {% endfor %}
            {{ ns.texte }}
          {% endif %}
        couleur: >
          {% set alerte = states('sensor.40_weather_alert') %}
          {% if alerte == 'Rouge' %} Rouge
          {% elif alerte == 'Orange' %} Orange
          {% else %} Blanc {% endif %}

    - delay: "00:00:00.05"
    # ====== 8. PREVISIONS HORAIRES (15 HEURES) ======
    - action: weather.get_forecasts
      data:
        type: hourly
      target:
        entity_id: weather.saint_vincent_de_tyrosse
      response_variable: hourly_var_tab5
    - repeat:
        count: 15
        sequence:
          - action: esphome.tab5_ha_hmi_tab5_maj_previsions_heures
            data:
              heure_index: "{{ repeat.index - 1 }}"
              heure_texte: >
                {% set fcasts = hourly_var_tab5['weather.saint_vincent_de_tyrosse'].forecast %}
                {% if repeat.index - 1 < fcasts|length %}
                  {% set dt = fcasts[repeat.index - 1].datetime | as_datetime %}
                  {{ dt.strftime('%H:00') if dt else '00:00' }}
                {% else %}
                  00:00
                {% endif %}
              condition: >
                {% set fcasts = hourly_var_tab5['weather.saint_vincent_de_tyrosse'].forecast %}
                {{ fcasts[repeat.index - 1].condition | default('unknown') if repeat.index - 1 < fcasts|length else 'unknown' }}
              temp: >
                {% set fcasts = hourly_var_tab5['weather.saint_vincent_de_tyrosse'].forecast %}
                {{ fcasts[repeat.index - 1].temperature | float(0) if repeat.index - 1 < fcasts|length else 0 }}
              pluvio: >
                {% set fcasts = hourly_var_tab5['weather.saint_vincent_de_tyrosse'].forecast %}
                {{ fcasts[repeat.index - 1].precipitation | float(0) if (repeat.index - 1) < fcasts|length else 0 }}
          - delay:
              milliseconds: 50


- id: tab5_volet_updater
  alias: "Sync Tab5 Volet Serre"
  mode: queued
  trigger:
    - platform: state
      entity_id: input_text.volet_serre_etat
    - platform: state
      entity_id: input_boolean.volet_serre_mouvement
  action:
    - action: esphome.tab5_ha_hmi_tab5_maj_volet_etat
      data:
        etat_physique: >
          {% if is_state('input_boolean.volet_serre_mouvement', 'on') %}
            En_mouvement
          {% else %}
            {{ states('input_text.volet_serre_etat') }}
          {% endif %}

- id: tab5_screen_presence_wifi
  alias: "Allumage/Extinction Ecran Tab5 selon WiFi Portable"
  description: "Active ou desactive le retroeclairage selon la presence du telephone"
  mode: single
  trigger:
    - platform: state
      entity_id: device_tracker.pixel_6_pro
      to: 'home'
      id: "connecte"
    - platform: state
      entity_id: device_tracker.pixel_6_pro
      to: 'not_home'
      id: "deconnecte"
  action:
    - choose:
        - conditions:
            - condition: trigger
              id: "connecte"
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.m5stack_tab5_home_assistant_hmi_display_backlight
        - conditions:
            - condition: trigger
              id: "deconnecte"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.m5stack_tab5_home_assistant_hmi_display_backlight

