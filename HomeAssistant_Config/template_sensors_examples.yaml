# ============================================================================
# [AI-CONTEXT]
# @file template_sensors_examples.yaml (généré depuis template_sensors_meteo_tab5.yaml)
# @role Capteurs spécifiques pour écran M5Stack Tab5 (Prévisions Météo France). Pré-traite
#       les données Météo-France en chaînes courtes côté HA, PAS sur le device, pour garder
#       le C++ firmware simple (contrainte SRAM) et contourner la limite de 255 caractères
#       de l'API native ESPHome.
# @ai_instruction Ajouter ce fichier au bloc `template:` de configuration.yaml (ou un
#       template.yaml dédié), pas dans automations_examples.yaml.example.
# ============================================================================

- name: "Phrase Prochaine Pluie"
  unique_id: phrase_prochaine_pluie
  icon: mdi:weather-rainy
  state: >
    {% set ent = 'sensor.VOTRE_VILLE_next_rain' %}
    {% if not has_value(ent) %}
      Temps sec
    {% else %}
      {% set next_rain = states(ent) | as_timestamp(default=0) %}
      {% set ref = state_attr(ent, 'forecast_time_ref') | as_timestamp(default=0) %}
      {% set fc = state_attr(ent, '1_hour_forecast') %}
      
      {% if next_rain > 0 and ref > 0 and fc is not none %}
        {% set act_state = fc.get('0 min', 'Temps sec') %}
        
        {# On raccourcit les termes trop longs et on corrige l'orthographe #}
        {% set map_int = {
          'Pluie forte': 'Averses',
          'Pluie très forte': 'Averses',
          'Pluie trés forte': 'Averses',
          'Temps sec': 'Temps sec'
        } %}
        
        {% if act_state != 'Temps sec' %}
          {# S'il pleut déjà (à l'heure de référence), on ignore le délai résiduel #}
          {{ map_int.get(act_state, act_state) }}
        {% else %}
          {# Il ne pleut pas encore, on calcule la prévision #}
          {% set slot_min = ((next_rain - ref) / 60) | int(0) %}
          {% set slot_key = slot_min ~ ' min' %}
          {% set raw_intensity = fc.get(slot_key, 'Pluie') %}
          {% set intensity = map_int.get(raw_intensity, raw_intensity) %}
          
          {% set delai_actuel = ((next_rain - now().timestamp()) / 60) | int(0) %}
          
          {% if delai_actuel <= 0 %}
            {{ intensity }}
          {% else %}
            {{ intensity }} dans {{ delai_actuel }} mn
          {% endif %}
        {% endif %}
      {% else %}
        Pas de données
      {% endif %}
    {% endif %}
