tab5_volet_action:
  alias: "Action Volet Serre depuis Tab5"
  mode: restart
  sequence:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ action == 'stop' }}"
          sequence:
            - action: cover.stop_cover
              target:
                entity_id: cover.VOTRE_VOLET
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.VOTRE_VOLET_MOUVEMENT
            - action: input_text.set_value
              target:
                entity_id: input_text.VOTRE_VOLET_ETAT
              data:
                value: "Partiel"
        - conditions:
            - condition: template
              value_template: "{{ action == 'open' }}"
          sequence:
            - action: cover.open_cover
              target:
                entity_id: cover.VOTRE_VOLET
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.VOTRE_VOLET_MOUVEMENT
            - action: input_text.set_value
              target:
                entity_id: input_text.VOTRE_VOLET_ETAT
              data:
                value: "En_mouvement"
            - delay:
                seconds: 26
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.VOTRE_VOLET_MOUVEMENT
            - action: input_text.set_value
              target:
                entity_id: input_text.VOTRE_VOLET_ETAT
              data:
                value: "Ouvert"
        - conditions:
            - condition: template
              value_template: "{{ action == 'close' }}"
          sequence:
            - action: cover.close_cover
              target:
                entity_id: cover.VOTRE_VOLET
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.VOTRE_VOLET_MOUVEMENT
            - action: input_text.set_value
              target:
                entity_id: input_text.VOTRE_VOLET_ETAT
              data:
                value: "En_mouvement"
            - delay:
                seconds: 26
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.VOTRE_VOLET_MOUVEMENT
            - action: input_text.set_value
              target:
                entity_id: input_text.VOTRE_VOLET_ETAT
              data:
                value: "Ferme"

allumer_leds:
  alias: "Allumer LEDs depuis Tab5"
  mode: single
  sequence:
    - action: light.toggle
      target:
        entity_id: light.sonoff_1001700057
