# ============================================================================
# [AI-CONTEXT]
# @file tab5-ha-hmi.yaml
# @role Point d'entrée principal ESPHome.
# @architecture_constraint Contient les substitutions, l'inclusion des packages, et le boot.
# @ai_instruction Ne JAMAIS modifier la séquence on_boot sans l'autorisation expresse d'Axel.
# ============================================================================
# Entity IDs HA : fichier local gitignoré (comme secrets.yaml).
# Setup : cp Tab5/user_entities.example.yaml Tab5/user_entities.yaml puis éditer.
substitutions: !include Tab5/user_entities.yaml

esphome:
  name: tab5-ha-hmi
  friendly_name: M5Stack Tab5 Home Assistant HMI
  min_version: 2025.9.3
  includes:
    - Tab5/tab5_custom.h
    - Tab5/tab5_custom.cpp

  on_boot:
    - priority: 700
      then:
        # [AI-WARNING-CRITICAL] INTERDICTION FORMELLE DE SUPPRIMER CE DELAI
        # [06/07/2026] FIX CONFIRME pour le bug "ecran noir apres reboot logiciel".
        # Le GPIO expander I2C (PI4IOE5V6408) a besoin d'une seconde pour se stabiliser
        # avant l'init de l'écran DSI. CE DOIT RESTER UN LAMBDA C++ BLOQUANT, PAS UN `delay:` ESPHome.
        - lambda: |-
            delay(1000);
    - priority: 600
      then:
      # lvgl.resume explicite (05/07/2026) : ajoute comme premiere piste pour
      # le bug "ecran noir apres reboot logiciel" (le light backlight a
      # restore_mode: RESTORE_DEFAULT_ON, qui ne declenche pas on_turn_on/
      # lvgl.resume au boot car pas de vraie transition d'etat). TESTE SEUL
      # -> N'A PAS SUFFI (ecran reste noir). La vraie cause/fix (confirme le
      # 06/07/2026) est le delai bloquant a priority:700 ci-dessus — voir le
      # gros commentaire dans logger: de tab5-hardware.yaml pour le detail.
      # Cette ligne lvgl.resume est gardee car harmless, mais ne sert a rien
      # a elle seule.
      - lvgl.resume:
      - light.turn_on: backlight
      - delay: 1s
      - media_player.volume_set:
          id: speaker_player
          volume: 1.0
      # Allumer l'ampli APRES le media_player pour eviter le bruit I2S
      - switch.turn_on: speaker_enable
      - wait_until:
          condition:
            api.connected:
          timeout: 30s
      - delay: 500ms
      - if:
          condition:
            api.connected:
          then:
            - homeassistant.event:
                event: esphome.tab5_connected
          else:
            - logger.log: "HA injoignable au boot (timeout 30s) - interface locale disponible quand meme"
      - globals.set:
          id: boot_complete
          value: 'true'
      - if:
          condition:
            - switch.is_on: tab5_wake_word_active
          then:
            - micro_wake_word.start:
          else:
            - micro_wake_word.stop:
      # Synchronisation visuelle de l'icône + bordure des boutons du mode d'assistant vocal (Domotique vs Discussion)
      - lambda: |-
          if (id(icon_mode_status) == nullptr) return;
          if (id(conversation_mode)) {
            lv_label_set_text(id(icon_mode_status), "\U000F0450"); // Robot
            lv_obj_set_style_text_color(id(icon_mode_status), lv_color_hex(UIColor::INFO), LV_PART_MAIN);
            lv_obj_set_style_border_color(id(btn_mode_discu), lv_color_hex(UIColor::SUCCESS), LV_PART_MAIN);
            lv_obj_set_style_border_opa(id(btn_mode_discu), LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_border_width(id(btn_mode_discu), 2, LV_PART_MAIN);
            lv_obj_set_style_border_color(id(btn_mode_domo), lv_color_hex(UIColor::GLASS_RIM), LV_PART_MAIN);
            lv_obj_set_style_border_opa(id(btn_mode_domo), LV_OPA_40, LV_PART_MAIN);
            lv_obj_set_style_border_width(id(btn_mode_domo), 1, LV_PART_MAIN);
          } else {
            lv_label_set_text(id(icon_mode_status), "\U000F07D0"); // Home Assistant
            lv_obj_set_style_text_color(id(icon_mode_status), lv_color_hex(UIColor::TEXT_DIM), LV_PART_MAIN);
            lv_obj_set_style_border_color(id(btn_mode_domo), lv_color_hex(UIColor::INFO), LV_PART_MAIN);
            lv_obj_set_style_border_opa(id(btn_mode_domo), LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_border_width(id(btn_mode_domo), 2, LV_PART_MAIN);
            lv_obj_set_style_border_color(id(btn_mode_discu), lv_color_hex(UIColor::GLASS_RIM), LV_PART_MAIN);
            lv_obj_set_style_border_opa(id(btn_mode_discu), LV_OPA_40, LV_PART_MAIN);
            lv_obj_set_style_border_width(id(btn_mode_discu), 1, LV_PART_MAIN);
          }
      - script.execute: tab5_central_rotator_auto

interval:
  - interval: 5min
    then:
      - if:
          condition:
            api.connected:
          then:
            - homeassistant.event:
                event: esphome.tab5_connected

# Plus d'images! image: !include supprimé au profit des polices C++ vectorielles LVGL

packages:
  tab5_hardware: !include Tab5/tab5-hardware.yaml
  tab5_sensors_diagnostics: !include Tab5/tab5-sensors-diagnostics.yaml
  tab5_sensors_domotique: !include Tab5/tab5-sensors-domotique.yaml
  tab5_api_logic: !include Tab5/tab5-api-logic.yaml
  tab5_styles: !include Tab5/tab5-styles.yaml
  tab5_globals: !include Tab5/tab5-globals.yaml
  tab5_scripts: !include Tab5/tab5-scripts.yaml
  tab5_lvgl: !include Tab5/tab5-lvgl.yaml

captive_portal: