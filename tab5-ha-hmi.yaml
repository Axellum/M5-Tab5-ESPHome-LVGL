substitutions:
  # =======================================================
  # ZONE DE CONFIGURATION UTILISATEUR
  # Modifiez les entités ci-dessous pour correspondre à votre Home Assistant
  # =======================================================
  entity_tracker_pc: device_tracker.pc_fix_3
  entity_phone_battery: sensor.pixel_6_pro_battery_level
  
  # --- Lumières ---
  entity_light_chambre: light.h6008_2
  entity_light_salon: light.salon
  entity_light_bureau: light.sonoff_1001700057
  
  # --- Climatisation ---
  entity_climate_salon: climate.daikinap71273_room_temperature
  
  # --- Température & Humidité ---
  entity_temp_salon: sensor.sonoff_a48003dbc9_temperature
  entity_hum_salon: sensor.sonoff_a48003dbc9_humidity
  entity_temp_chambre: sensor.sonoff_a48003ea51_temperature
  entity_hum_chambre: sensor.sonoff_a48003ea51_humidity
  entity_temp_plante: sensor.plant_sensor_8184_temperature
  
  # --- Plantes (Humidité du sol) ---
  entity_plante_1: sensor.plant_sensor_8184_moisture
  entity_plante_2: sensor.plant_sensor_81b8_moisture
  entity_plante_3: sensor.plant_sensor_817a_moisture
  entity_plante_4: sensor.plant_sensor_8189_moisture
  entity_plante_5: sensor.plant_sensor_8173_moisture

esphome:
  name: tab5-ha-hmi
  friendly_name: M5Stack Tab5 Home Assistant HMI
  min_version: 2025.9.3
  includes:
    - Tab5/tab5_custom.h
    - Tab5/tab5_custom.cpp

  on_boot:
    priority: -10
    then:
      - light.turn_on: backlight
      - delay: 1s
      - media_player.volume_set:
          id: speaker_player
          volume: 0.7
      # Allumer l'ampli APRES le media_player pour eviter le bruit I2S
      - switch.turn_on: speaker_enable
      - wait_until:
          api.connected:
      - delay: 500ms
      - homeassistant.event:
          event: esphome.tab5_connected
      - globals.set:
          id: boot_complete
          value: 'true'
      - if:
          condition:
            - switch.is_on: tab5_wake_word_active
          then:
            - micro_wake_word.start:
          else:
            - micro_wake_word.stop:

# Plus d'images! image: !include supprimé au profit des polices C++ vectorielles LVGL

packages:
  tab5_hardware: !include Tab5/tab5-hardware.yaml
  tab5_sensors: !include Tab5/tab5-sensors.yaml
  tab5_api_logic: !include Tab5/tab5-api-logic.yaml
  tab5_styles: !include Tab5/tab5-styles.yaml
  tab5_globals: !include Tab5/tab5-globals.yaml
  tab5_scripts: !include Tab5/tab5-scripts.yaml
  tab5_lvgl: !include Tab5/tab5-lvgl.yaml

captive_portal: